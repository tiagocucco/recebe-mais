- # ====== Plugin: APEX Client-Side PDF ========================
  id: 29333542901264386771
  identification: 
    name: APEX Client-Side PDF
    internal-name: AT.RAMMELHOF.CLIENT-SIDE-PDF
    type: Dynamic Action

  advanced: 
    category: Execute
    quick-pick: false

  source: 
    pl/sql-code: |
      FUNCTION render_dynamic_action(p_dynamic_action IN apex_plugin.t_dynamic_action,
                                     p_plugin         IN apex_plugin.t_plugin)
        RETURN apex_plugin.t_dynamic_action_render_result IS
        --
        -- plugin attributes
        l_result  apex_plugin.t_dynamic_action_render_result;
        l_attr_format p_dynamic_action.attribute_01%TYPE := p_dynamic_action.attribute_01;
        l_attr_orientation p_dynamic_action.attribute_02%TYPE := p_dynamic_action.attribute_02;
        l_attr_margin_left p_dynamic_action.attribute_02%TYPE := p_dynamic_action.attribute_03;
        l_attr_margin_top p_dynamic_action.attribute_02%TYPE := p_dynamic_action.attribute_04;
        l_attr_margin_right p_dynamic_action.attribute_02%TYPE := p_dynamic_action.attribute_05;
        l_attr_margin_bottom p_dynamic_action.attribute_02%TYPE := p_dynamic_action.attribute_06;
        l_attr_body_selector p_dynamic_action.attribute_02%TYPE := p_dynamic_action.attribute_07;
        l_attr_header_selector p_dynamic_action.attribute_02%TYPE := p_dynamic_action.attribute_08;
        l_attr_footer_selector p_dynamic_action.attribute_02%TYPE := p_dynamic_action.attribute_09;
        l_attr_canvas_scale p_dynamic_action.attribute_02%TYPE := p_dynamic_action.attribute_10;
        l_attr_image_quality p_dynamic_action.attribute_02%TYPE := p_dynamic_action.attribute_11;
        l_attr_pageinfo_selector p_dynamic_action.attribute_02%TYPE := p_dynamic_action.attribute_12;
        l_attr_output_format p_dynamic_action.attribute_02%TYPE := p_dynamic_action.attribute_13;
        l_attr_filename p_dynamic_action.attribute_02%TYPE := p_dynamic_action.attribute_14;
        --
      BEGIN
        -- Debug
        IF apex_application.g_debug THEN
          apex_plugin_util.debug_dynamic_action(p_plugin         => p_plugin,
                                                p_dynamic_action => p_dynamic_action);
        END IF;
        -- escape input
        l_attr_body_selector := apex_escape.html(l_attr_body_selector);
        l_attr_header_selector := apex_escape.html(l_attr_header_selector);
        l_attr_footer_selector := apex_escape.html(l_attr_footer_selector);
        l_attr_pageinfo_selector := apex_escape.html(l_attr_pageinfo_selector);
        l_attr_output_format := apex_escape.html(l_attr_output_format);
        l_attr_filename := apex_escape.html(l_attr_filename);
        --
        
        -- add JavaScript files
        apex_javascript.add_library(p_name           => 'clientSidePdf',
                                    p_directory      => p_plugin.file_prefix,
                                    p_version        => NULL,
                                    p_skip_extension => FALSE);
        --
        
        -- function to execute
        l_result.javascript_function := 'function() {
      	clientSidePdf.createPdf({
      		pageFormat: "#pageFormat#", 
      		pageOrientation: "#pageOrientation#", 
      		marginLeft: #marginLeft#, 
      		marginTop: #marginTop#, 
      		marginRight: #marginRight#, 
      		marginBottom: #marginBottom#, 
      		bodySelector: "#bodySelector#", 
      		headerSelector: "#headerSelector#", 
      		footerSelector: "#footerSelector#", 
      		pageInfoSelector: "#pageInfoSelector#", 
      		canvasScale: #canvasScale#, 
      		imageQuality: #imageQuality#,
      		outputFormat: "#outputFormat#",
      		filename: "#filename#"
      		});
        }';
        l_result.javascript_function := replace(l_result.javascript_function,'#pageFormat#', l_attr_format);
        l_result.javascript_function := replace(l_result.javascript_function,'#pageOrientation#', l_attr_orientation);
        l_result.javascript_function := replace(l_result.javascript_function,'#marginLeft#', l_attr_margin_left);
        l_result.javascript_function := replace(l_result.javascript_function,'#marginTop#', l_attr_margin_top);
        l_result.javascript_function := replace(l_result.javascript_function,'#marginRight#', l_attr_margin_right);
        l_result.javascript_function := replace(l_result.javascript_function,'#marginBottom#', l_attr_margin_bottom);
        l_result.javascript_function := replace(l_result.javascript_function,'#bodySelector#', l_attr_body_selector);
        l_result.javascript_function := replace(l_result.javascript_function,'#headerSelector#', l_attr_header_selector);
        l_result.javascript_function := replace(l_result.javascript_function,'#footerSelector#', l_attr_footer_selector);
        l_result.javascript_function := replace(l_result.javascript_function,'#pageInfoSelector#', l_attr_pageinfo_selector);
        l_result.javascript_function := replace(l_result.javascript_function,'#canvasScale#', l_attr_canvas_scale);
        l_result.javascript_function := replace(l_result.javascript_function,'#imageQuality#', l_attr_image_quality);
        l_result.javascript_function := replace(l_result.javascript_function,'#outputFormat#', l_attr_output_format);
        l_result.javascript_function := replace(l_result.javascript_function,'#filename#', l_attr_filename);
        --
        RETURN l_result;
        --
      END render_dynamic_action;

