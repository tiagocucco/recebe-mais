- # ====== List of Values: MOEDAS ==============================
  id: 1779328651305092664
  identification: 
    name: MOEDAS

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      WITH WS AS (SELECT RMAIS_PROCESS_PKG.Get_Response('/api/consultas/v1/currencies') A FROM DUAL)
      SELECT JS.* FROM WS WS,
      json_table(WS.A, '$' COLUMNS(
                  NESTED PATH '$.DATA[*]' COLUMNS(
                  NAME                    VARCHAR2 PATH '$.NAME',
                  CURRENCY_CODE           VARCHAR2(200) PATH '$.CURRENCY_CODE'))) JS;  

  column-mapping: 
    return: CURRENCY_CODE
