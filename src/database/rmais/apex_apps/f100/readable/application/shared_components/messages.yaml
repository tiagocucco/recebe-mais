- # ====== Text Message: APEX.IG.HELP.ACTIONS.INTRO ============
  id: 1819108494285867442
  identification: 
    name: APEX.IG.HELP.ACTIONS.INTRO

  message: 
    text: |
      <p> Uma grade interativa apresenta um conjunto de dados em um relatório pesquisável e personalizável. Você pode realizar várias operações para limitar os registros retornados e alterar a forma como os dados são exibidos. </p>
                                                                                                                                                                             <p> Use o campo Pesquisar para filtrar os registros retornados. Clique em Ações para acessar várias opções para modificar o layout do relatório ou use os menus de Cabeçalho da Coluna nas colunas exibidas. </p>
                                                                                                                                                                             <p> Use as configurações de relatório para salvar suas personalizações em um relatório. Você também pode baixar os dados do relatório para um arquivo externo ou enviar os dados por e-mail para você ou outras pessoas. </p>
                                                                                                                                                                             <p> Para saber mais, consulte Usando grades interativas "no <em> Guia do usuário final do Oracle Application Express </em> </p>

  attributes: 
    language: Portuguese (Brazil) (pt-br)
    used-in-javascript: false

  subscription: 
    version-number: 1

