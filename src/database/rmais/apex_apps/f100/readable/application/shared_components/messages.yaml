- # ====== Text Message: APEX.IG.HELP.COLUMNS ==================
  id: 1819110862587867443
  identification: 
    name: APEX.IG.HELP.COLUMNS

  message: 
    text: |
      <p> Use esta caixa de diálogo para escolher quais colunas serão exibidas e em que ordem. </p>
                                                                                                                                                                       <p> Oculte uma coluna desmarcando-a. <br>
                                                                                                                                                                       Reordene as colunas clicando em Mover para cima (& uarr;) ou Mover para baixo (& darr;). <br>
                                                                                                                                                                       Use o seletor suspenso para listar todas as colunas, colunas exibidas ou colunas não exibidas. </p>
                                                                                                                                                                       <p> Opcionalmente, use o formulário para especificar a largura mínima de uma coluna em pixels. </p>
                                                                                                                                                                       <p> <em> Observação: você também pode reordenar as colunas exibidas clicando na alça de arrastar (no início do título da coluna) e arrastando a coluna para a esquerda ou direita. Você também pode alterar a largura das colunas exibidas selecionando o separador de coluna, entre os títulos, e movendo-o para a esquerda ou direita. </em> </p>
                                                                                                                                                                       <p> Use esta caixa de diálogo para definir colunas adicionais com base em cálculos matemáticos e funcionais realizados em colunas existentes. </p>
                                                                                                                                                                       <p> <strong> Lista de computação </strong> <br>
                                                                                                                                                                       A lista Computação exibe cálculos definidos. Desative um cálculo existente desmarcando-o. <br>
                                                                                                                                                                       Clique em Adicionar (& mais) para adicionar um novo cálculo ou em Excluir (& minus;) para remover um cálculo existente. </p>
                                                                                                                                                                       <p> <strong> Configurações de computação </strong> <br>
                                                                                                                                                                       Use o formulário para definir o cálculo. <br>
                                                                                                                                                                       Insira os detalhes da coluna, como título, rótulo e selecione as configurações de alinhamento. <br>
                                                                                                                                                                       Use a área de texto da Expressão para inserir as colunas e funções associadas para o cálculo. <br>
                                                                                                                                                                       Selecione o tipo de dados apropriado e, opcionalmente, uma máscara de formato para a nova coluna. </p>

  attributes: 
    language: Portuguese (Brazil) (pt-br)
    used-in-javascript: false

  subscription: 
    version-number: 1

