- # ====== Text Message: APEX.IG.HELP.CONTROL_BREAK ============
  id: 1819111425000867443
  identification: 
    name: APEX.IG.HELP.CONTROL_BREAK

  message: 
    text: |
      <p> Use esta caixa de diálogo para definir uma quebra de controle em uma ou mais colunas. </p>
                                                                                                                                                                             <p> <strong> Lista de interrupções de controle </strong> <br>
                                                                                                                                                                             A lista de quebra de controle exibe quebras de controle definidas. Desative uma coluna de quebra de controle existente, desmarcando-a. <br>
                                                                                                                                                                             Clique em Adicionar (& mais) para incluir uma nova coluna na quebra de controle ou em Excluir (& minus;) para remover uma coluna existente da quebra de controle. <br>
                                                                                                                                                                             Para reordenar as colunas, clique em Mover para cima (& uarr;) ou Mover para baixo (& darr;) para mover a coluna selecionada para cima e para baixo em relação às outras colunas. </p>
                                                                                                                                                                             <p> <strong> Configurações de quebra de controle </strong> <br>
                                                                                                                                                                             Use o formulário para definir a coluna de quebra de controle. <br>
                                                                                                                                                                             Selecionou uma coluna de quebra de controle, a direção de classificação e como ordenar colunas nulas (colunas sem valor). </p>
                                                                                                                                                                             <p> <em> Observação: ao visualizar a grade interativa, você pode definir uma quebra de controle clicando em um Título de coluna e selecionando o ícone de quebra de controle. </em> </p>

  attributes: 
    language: Portuguese (Brazil) (pt-br)
    used-in-javascript: false

  subscription: 
    version-number: 1

