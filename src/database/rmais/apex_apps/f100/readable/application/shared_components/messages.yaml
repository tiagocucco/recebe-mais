- # ====== Text Message: APEX.IG.HELP.HIGHLIGHT ================
  id: 1819114202141867444
  identification: 
    name: APEX.IG.HELP.HIGHLIGHT

  message: 
    text: |
      <p> Use esta caixa de diálogo para destacar linhas ou colunas de dados com base na condição inserida. </p>
                                                                                                                                                                         <p> <strong> Lista de destaques </strong> <br>
                                                                                                                                                                         A lista de destaques exibe destaques definidos. Desative um destaque existente, desmarcando-o. <br>
                                                                                                                                                                         Clique em Adicionar (& mais) para criar um novo realce ou em Excluir (& minus;) para remover um realce existente. <br>
                                                                                                                                                                         <p> <strong> Configurações de destaque </strong> <br>
                                                                                                                                                                         Use o formulário para definir as propriedades de destaque. <br>
                                                                                                                                                                         Insira o nome, selecione Linha ou Coluna e selecione os códigos de cores HTML para o plano de fundo e o texto. <br>
                                                                                                                                                                         Selecione o <strong> Tipo de condição </strong> apropriado para destacar dados específicos: <br>
                                                                                                                                                                         & nbsp; & nbsp; & nbsp; Linha - destaque o termo em qualquer coluna. <br>
                                                                                                                                                                         & nbsp; & nbsp; & nbsp; Coluna - destaque em uma coluna específica com base no operador e valor especificados. </p>
                                                                                                                                                                         <p> Use esta caixa de diálogo para salvar as alterações feitas no layout e na configuração da grade atual. <br>
                                                                                                                                                                         Os desenvolvedores de aplicativos podem definir vários layouts de relatório alternativos. Onde for permitido, você e outros usuários finais podem salvar um relatório como Público, o que o torna disponível para todos os outros usuários da grade. Você também pode salvar um relatório como um relatório privado que só você pode ver. </p>
                                                                                                                                                                         <p> Selecione um dos tipos disponíveis e insira um nome para o relatório salvo. </p>

  attributes: 
    language: Portuguese (Brazil) (pt-br)
    used-in-javascript: false

  subscription: 
    version-number: 1

