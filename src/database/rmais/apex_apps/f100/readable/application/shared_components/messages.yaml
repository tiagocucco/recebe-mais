- # ====== Text Message: APEX.IG.HELP.ACTIONS.REPORTING ========
  id: 1819109031302867442
  identification: 
    name: APEX.IG.HELP.ACTIONS.REPORTING

  message: 
    text: |
      <p> Você pode personalizar a grade interativa para exibir dados de várias maneiras diferentes usando os recursos integrados. </p>
                                                                                                                                                                                 <p> Use os menus Título da coluna ou o menu Ações para determinar quais colunas exibir, em que sequência e congelar colunas. Você também pode definir vários filtros de dados e classificar os dados retornados. </p>
                                                                                                                                                                                 <p> Use o botão Exibir (adjacente ao campo Pesquisar) para acessar outras exibições de dados que podem ter sido definidas pelo desenvolvedor do aplicativo. Você também pode criar um gráfico ou visualizar um gráfico existente. </p>
                                                                                                                                                                                 <p> <em> Observação: Clique em <strong> Ajuda </strong> nas caixas de diálogo da grade interativa para obter informações mais detalhadas sobre a função selecionada. </em> </p>

  attributes: 
    language: Portuguese (Brazil) (pt-br)
    used-in-javascript: false

  subscription: 
    version-number: 1

