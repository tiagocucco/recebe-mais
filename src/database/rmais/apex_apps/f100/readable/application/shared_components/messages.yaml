- # ====== Text Message: APEXIR_HELP_AGGREGATE =================
  id: 1818669980144810306
  identification: 
    name: APEXIR_HELP_AGGREGATE

  message: 
    text: |
      Agregados são cálculos matemáticos realizados em uma coluna. Os agregados são exibidos depois de cada interrupção de controle e no final do relatório na coluna onde são definidos. As opções incluem:
      <p>
      </p><ul>
      <li><b>Agregação</b> permite selecionar uma agregação previamente definida para editar.</li>
      <li><b>Função</b> é a função a realizar (por exemplo, SUM, MIN).</li>
      <li><b>Coluna</b> é usado para selecionar a coluna à qual aplicar a função
       matemática. Só são exibidas colunas numéricas.</li>
      </ul>

  attributes: 
    language: Portuguese (Brazil) (pt-br)
    used-in-javascript: false

  subscription: 
    version-number: 1

- # ====== Text Message: APEXIR_HELP_COMPUTE ===================
  id: 1818670281364810307
  identification: 
    name: APEXIR_HELP_COMPUTE

  message: 
    text: |
      Permite que você adicione colunas calculadas a seu relatório. Podem ser cálculos matemáticos (por exemplo, <code>NBR_HOURS/24</code>) ou funções padrão do Oracle
       aplicadas a colunas existentes. Algumas são exibidas como exemplo, outras (como <code>TO_DATE)</code>, também podem ser usadas). As opções incluem:
      <p><p/>
      <ul>
      <li><b>Cálculo</b> permite selecionar um cálculo previamente definido para editar.</li>
      <li><b>Cabeçalho da Coluna</b> é o cabeçalho da nova coluna.</li>
      <li><b>Máscara de Formato</b> é uma máscara de formato do Oracle a ser aplicada à coluna (como S9999).</li>
      <li><b>Cálculo</b> é o cálculo a realizar, onde as colunas são referenciadas usando os aliases exibidos.</li>
      </ul>
      <p>Abaixo do cálculo as colunas em sua consulta são exibidas com
       seus aliases associados. Clicar no nome ou no alias da coluna irá
      escrevê-la no Cálculo. Perto das Colunas há um teclado numérico. Estas funções do teclado numérico são como
       um atalho para as teclas mais usadas. No extremo direito estão as Funções</p>.
      <p>A seguir o exemplo de cálculo demonstra como exibir a remuneração total:</p>
      <pre>CASE WHEN A = 'SALES' THEN B + C ELSE B END</pre>
      (onde A é ORGANIZATION, B é SALARY e C é COMMISSION)</p>
      

  attributes: 
    language: Portuguese (Brazil) (pt-br)
    used-in-javascript: false

  subscription: 
    version-number: 1

