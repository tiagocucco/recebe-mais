- # ====== Text Message: APEXIR_HELP_REPORT_SETTINGS ===========
  id: 1818659169446810303
  identification: 
    name: APEXIR_HELP_REPORT_SETTINGS

  message: 
    text: |
      Se você personalizar um relatório interativo, as configurações do relatório serão exibidas
      abaixo da barra de Pesquisa e acima do relatório. Essa área pode ser contraída e expandida usando o ícone à esquerda.
      <p>
      Para cada definição de relatório, é possível:
      </p><ul>
      <li>Editar uma definição clicando no nome.</li>
      <li>Desativar/Ativar uma definição, desmarcando ou marcando a caixa de seleção Ativar/Desativar. Isso é usado para ativar/desativar temporariamente uma definição.</li>
      <li>Remover uma definição clicando no ícone Remover.</li>
      </ul>
      <p>Se você criou um gráfico ou agrupamento, poderá alternar entre eles
       e o relatório de base usando os links View de Relatório, View de Gráfico, Pivô e
       Agrupar por mostrados à direita. Se estiver exibindo um gráfico ou
       agrupamento, também poderá usar o link Editar para editar as definições.</p>
      

