- # ====== Text Message: APEX.IG.HELP.AGGREGATE ================
  id: 1819109940037867443
  identification: 
    name: APEX.IG.HELP.AGGREGATE

  message: 
    text: |
      <p> Use esta caixa de diálogo para agregar colunas. Os valores agregados são exibidos na parte inferior dos dados, ou se as quebras de controle estiverem definidas, na parte inferior de cada quebra. </p>
                                                                                                                                                                         <p> <strong> Lista de agregação </strong> <br>
                                                                                                                                                                         A lista de agregação exibe agregações definidas. Desative uma agregação existente desmarcando-a. <br>
                                                                                                                                                                         Clique em Adicionar (& plus;) para criar uma nova agregação ou em Excluir (& minus;) para remover uma agregação existente. </p>
                                                                                                                                                                         <p> <strong> Configurações de agregação </strong> <br>
                                                                                                                                                                         Use o formulário à direita para definir a agregação. <br>
                                                                                                                                                                         Selecione o nome da coluna e o tipo de agregação. <br>
                                                                                                                                                                         Opcionalmente, insira uma dica de ferramenta para a agregação. <br>
                                                                                                                                                                         Se você definiu uma quebra de controle, selecionar <strong> Mostrar valor geral </strong> exibe a média geral, total ou valor semelhante na parte inferior dos dados. </p>
                                                                                                                                                                         <p> <em> Observação: acesse a caixa de diálogo Agregação no menu Ações ou clicando no título da coluna e soma (& sum;). </em> </p>

  attributes: 
    language: Portuguese (Brazil) (pt-br)
    used-in-javascript: false

  subscription: 
    version-number: 1

