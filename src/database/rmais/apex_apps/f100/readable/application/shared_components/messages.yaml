- # ====== Text Message: APEXIR_HELP_HIGHLIGHT =================
  id: 1818687073868810311
  identification: 
    name: APEXIR_HELP_HIGHLIGHT

  message: 
    text: |
      <p>Permite a você definir um filtro. As linhas que atendem ao critério do filtro são destacadas usando as características associadas ao filtro. As opções incluem:
      <p/>
      <ul><li><b>Nome</b> é usado apenas para exibição.</li>
      <li><b>Sequência</b> identifica a sequência na qual as regras serão avaliadas.</li>
      <li><b>Ativado</b> identifica se a regra está ativada ou desativada.</li>
      <li><b>Tipo de Destaque</b> identifica se a Linha ou Célula deve ser destacada. Se a Célula for selecionada, a coluna referenciada na Condição de Destaque será destacada.</li>
      <li><b>Cor de Fundo</b> é a nova cor do fundo da área destacada.</li>
      <li><b>Cor do Texto</b> é a nova cor do texto na área destacada.</li>
      <li><b>Condição de Destaque</b> define sua condição de filtro.</li></ul>

  attributes: 
    language: Portuguese (Brazil) (pt-br)
    used-in-javascript: false

  subscription: 
    version-number: 1

