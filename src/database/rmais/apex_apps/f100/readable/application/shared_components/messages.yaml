  id: 1818691575643810313
  identification: 
    name: APEXIR_HELP_GROUP_BY

  message: 
    text: |
      Você pode definir uma view Agrupar por para cada relatório salvo.
      Depois de definido, é possível alternar entre as views e relatórios Agrupar por
      usando ícones de views da barra de Pesquisa. Para criar uma view Agrupar por,
      selecione:
      <p></p><ul>
      <li>as colunas nas quais serão agrupadas</li>
      <li>as colunas a serem agregadas com a função a ser executada (média, soma, contagem etc.)</li>
      </ul>

  attributes: 
