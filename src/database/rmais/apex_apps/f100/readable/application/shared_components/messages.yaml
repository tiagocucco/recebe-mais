- # ====== Text Message: APEXIR_HELP_CHART =====================
  id: 1818651052727810302
  identification: 
    name: APEXIR_HELP_CHART

  message: 
    text: |
      Você pode definir um gráfico por relatório salvo. Depois
       de definido, você pode alternar entre as views de gráfico e de relatório, usando os ícones de view da barra de Pesquisa.
      As opções incluem:
      <p>
      </p><ul>
      <li><b>Tipo de Gráfico</b> identifica o tipo de gráfico a incluir.
      Selecione entre barra horizontal, barra vertical, pizza ou linha.</li>
      <li><b>Label</b> permite selecionar a coluna a ser usada como label.</li>
      <li><b>Título do Eixo do Label</b> é o título exibido no eixo associado à coluna selecionada para
       o Label. Isso não está disponível para gráfico de pizza.</li>
      <li><b>Valor</b> permite selecionar a coluna a usar como o valor. Se sua
       função for COUNT, não é necessário selecionar um Valor.</li>
      <li><b>Título do Eixo do Valor</b> é o título exibido no eixo associado à
       coluna selecionada para Valor. Indisponível para gráfico de pizza.</li>
      <li><b>Função</b> é uma função opcional a ser executada na coluna selecionada para Valor.</li>
      <li><b>Classificação</b> permite classificar o conjunto de resultados.</li></ul>

  attributes: 
    language: Portuguese (Brazil) (pt-br)
    used-in-javascript: false

  subscription: 
    version-number: 1

