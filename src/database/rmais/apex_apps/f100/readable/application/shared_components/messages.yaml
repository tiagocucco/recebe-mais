- # ====== Text Message: APEX.IG.HELP.DOWNLOAD =================
  id: 1819112020296867443
  identification: 
    name: APEX.IG.HELP.DOWNLOAD

  message: 
    text: |
      <p> Use esta caixa de diálogo para baixar todas as linhas atuais para um arquivo externo. O arquivo conterá apenas as colunas exibidas no momento, usando quaisquer filtros e classificações aplicadas aos dados. </p>
                                                                                                                                                                        <p> Selecione o formato do arquivo e clique em Download. <br>
                                                                                                                                                                        Observação: CSV não incluirá formatação de texto, como agregações e quebras de controle. </p>
                                                                                                                                                                        <p> Para enviar o arquivo por e-mail, selecione Enviar como e-mail e insira os detalhes do e-mail (Destinatário, Assunto e Mensagem). </p>

  attributes: 
    language: Portuguese (Brazil) (pt-br)
    used-in-javascript: false

  subscription: 
    version-number: 1

