- # ====== Text Message: APEX.IG.HELP.SORT =====================
  id: 1819114776458867444
  identification: 
    name: APEX.IG.HELP.SORT

  message: 
    text: |
      <p> Use esta caixa de diálogo para definir a ordem de exibição. <p>
                                                                                                                                                                    <p> <strong> Classificar lista </strong> <br>
                                                                                                                                                                    A caixa de diálogo Classificar exibe uma lista de regras de classificação configuradas. <br>
                                                                                                                                                                    Clique em Adicionar (& mais) para criar uma coluna de classificação ou em Excluir (& minus;) para remover uma coluna de classificação. <br>
                                                                                                                                                                    Clique em Mover para cima (& uarr;) e Mover para baixo (& darr;) para mover a coluna de classificação selecionada para cima e para baixo em relação às outras colunas de classificação. </p>
                                                                                                                                                                    <p> <strong> Configurações de classificação </strong> <br>
                                                                                                                                                                    Selecione uma coluna de classificação, a direção da classificação e como ordenar as colunas nulas (colunas sem valor). </p>
                                                                                                                                                                    <p> <em> Nota: Os dados podem ser classificados por colunas que não são exibidas; no entanto, nem todas as colunas podem ser classificáveis. </em> <br>
                                                                                                                                                                    <em> As colunas exibidas podem ser classificadas pressionando as setas para cima (ascendente) ou para baixo (descendente) no final dos cabeçalhos das colunas. Para adicionar uma coluna subsequente a uma classificação existente, mantenha pressionada a tecla Shift e clique na seta para cima ou para baixo. </em> </p>

  attributes: 
    language: Portuguese (Brazil) (pt-br)
    used-in-javascript: false

  subscription: 
    version-number: 1

