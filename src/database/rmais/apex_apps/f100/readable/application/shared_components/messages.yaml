- # ====== Text Message: APEX.IG.HELP.ACTIONS.EDITING ==========
  id: 1819107906418867442
  identification: 
    name: APEX.IG.HELP.ACTIONS.EDITING

  message: 
    text: |
      <p> Você pode inserir, atualizar e excluir dados diretamente nesta grade interativa. </p>
                                                                                                                                                                               <p> Insira uma nova linha clicando no botão Adicionar linha. </p>
                                                                                                                                                                               <p> Edite os dados existentes clicando duas vezes em uma célula específica. Para trabalhos de edição maiores, clique em Editar para entrar no modo de edição. No modo de edição, você pode clicar uma vez ou usar o teclado para editar células específicas. </p>
                                                                                                                                                                               <p> Use o menu Alterar para duplicar e excluir linhas. Para ativar o menu Alterar, use as caixas de seleção para selecionar uma ou mais linhas. </p>
                                                                                                                                                                               <p> Duplique uma linha selecionada clicando no menu Alterar e selecionando Duplicar linhas. Exclua uma linha selecionada clicando no menu Alterar e selecionando Excluir linha. </p>

  attributes: 
    language: Portuguese (Brazil) (pt-br)
    used-in-javascript: false

  subscription: 
    version-number: 1

