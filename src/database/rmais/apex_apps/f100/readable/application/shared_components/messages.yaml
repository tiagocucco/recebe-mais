- # ====== Text Message: APEXIR_HELP_01 ========================
  id: 1818719800879810319
  identification: 
    name: APEXIR_HELP_01

  message: 
    text: |
      As regiões do relatório interativo permitem que os usuários finais personalizem os relatórios. Os usuários podem alterar o layout de dados do relatório, selecionando colunas, aplicando filtros, destacando e classificando. Os usuários também podem definir quebras, agregações, gráficos, agrupar por e adicionar seus próprios cálculos. Os usuários também podem configurar uma inscrição, de forma que uma versão HTML do relatório seja enviada por e-mail para eles em um intervalo designado. Os usuários podem criar variações de um relatório e salvá-las como relatórios nomeados, para visualização pública ou privada.
      <p/>
      As seções a seguir resumem formas de personalizar um relatório interativo. Para saber mais, consulte "Usando Relatórios Interativos" no <a href="http://www.oracle.com/pls/topic/lookup?ctx=E37097_01&id=AEEUG453=AEEUG453" target="_blank"><i>Oracle Application Express End User's Guide</i></a>.

  attributes: 
    language: Portuguese (Brazil) (pt-br)
    used-in-javascript: false

  subscription: 
    version-number: 1

