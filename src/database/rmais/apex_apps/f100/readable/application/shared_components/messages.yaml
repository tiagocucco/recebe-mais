- # ====== Text Message: APEXIR_HELP_COLUMN_HEADING_MENU =======
  id: 1818738060263810324
  identification: 
    name: APEXIR_HELP_COLUMN_HEADING_MENU

  message: 
    text: |
      Clicar em qualquer cabeçalho de coluna expõe um menu do cabeçalho de coluna. As opções incluem:
      <p></p>
      <ul>
      <li><b>Ícone Classificar por Ordem Crescente</b> ordena o relatório pela coluna em ordem crescente.</li>
      <li><b>Ícone Classificar por Ordem Decrescente</b> ordena o relatório pela coluna em ordem decrescente.</li>
      <li><b>Ocultar Coluna</b> oculta a coluna.  Nem todas as colunas podem ser ocultadas. Se uma coluna não puder ser ocultada, o ícone Ocultar Coluna não será exibido.</li>
      <li><b>Quebrar Coluna</b> cria um grupo de quebra na coluna. Isso retira a coluna do relatório como um registro-mestre.</li>
      <li><b>Informações da Coluna</b> exibe texto de ajuda sobre a coluna, se disponível.</li>
      <li><b>Área de Texto</b> é usada para informar critérios de pesquisa que não diferenciam maiúsculas de minúsculas
       (não necessário para caracteres curinga). Informar um valor reduzirá a lista de
      valores na base do menu. Você pode selecionar um valor da
      parte inferior e o valor selecionado será criado como um filtro usando '='
      (por exemplo, <code>coluna = 'ABC'</code>). Como alternativa, você poderá clicar no ícone da Lanterna e informar um valor que será criado
      como um filtro com o modificador 'LIKE'
      (por exemplo, <code>coluna LIKE '%ABC%'</code>).</li>
      <li><b>Lista de Valores Únicos</b> contém os 500 primeiros valores únicos
      que atendem a seus critérios de filtro. Se a primeira coluna for uma data, será
       exibida uma lista de faixas de datas. Se selecionar um valor, será criado um
       filtro usando '=' (por exemplo, <code>coluna = 'ABC'</code>).</li>
      </ul>

  attributes: 
    language: Portuguese (Brazil) (pt-br)
    used-in-javascript: false

  subscription: 
    version-number: 1

