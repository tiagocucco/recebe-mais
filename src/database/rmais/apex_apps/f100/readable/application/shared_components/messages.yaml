- # ====== Text Message: APEXIR_HELP_SAVE_REPORT ===============
  id: 1818675959708810309
  identification: 
    name: APEXIR_HELP_SAVE_REPORT

  message: 
    text: |
      <p>Salva o relatório personalizado para uso futuro. Você fornece um nome e uma descrição opcional e pode tornar o relatório acessível ao público (isto é, todos os usuários que podem acessar o relatório padrão). Você pode salvar quatro tipos de relatórios interativos:</p>
      <ul>
      <li><strong>Padrão Principal</strong> (Somente Desenvolvedor). O Padrão Principal é o relatório que é exibido inicialmente. Os relatórios Padrão Principal não podem ser renomeados ou excluídos.</li>
      <li><strong>Relatório Alternativo</strong> (Somente Desenvolvedor). Permite que os desenvolvedores criem vários layouts de relatório. Somente os desenvolvedores podem salvar, renomear ou excluir um Relatório Alternativo.</li>
      <li><strong>Relatório Público</strong> (Usuário final). Pode ser salvo, renomeado ou excluído pelo usuário final que o criou. Outros usuários podem exibir e salvar o relatório como outro relatório.</li>
      <li><strong>Relatório Privado</strong> (Usuário final). Somente o usuário final que criou o relatório pode exibir, salvar, renomear ou excluir o relatório.</li>
      </ul>
      <p>Se você salvar os relatórios personalizados, um selector de Relatórios é exibido na barra de Pesquisa à esquerda do selector de Linhas (se este recurso for ativado).</p>
      

  attributes: 
    language: Portuguese (Brazil) (pt-br)
    used-in-javascript: false

  subscription: 
    version-number: 1

