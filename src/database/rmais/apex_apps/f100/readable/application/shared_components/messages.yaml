- # ====== Text Message: APEXIR_HELP_FILTER ====================
  id: 1818756991016810328
  identification: 
    name: APEXIR_HELP_FILTER

  message: 
    text: |
      Foca o relatório adicionando ou modificando a cláusula <code>WHERE</code> na consulta. Você pode filtrar por coluna ou por linha.
      <p>Se filtrar por coluna, selecione uma coluna (não precisa ser a que está exibida), selecione um operador Oracle padrão  (=, !=, não em, entre) e informe uma expressão a ser comparada. As expressões não diferenciam maiúsculas e minúsculas. Use  % como curinga (por exemplo, <code>STATE_NAME
      like A%)</code>.</p>
      <p>Se você filtrar por linha, você pode criar cláusulas <code>WHERE</code> complexas usando aliases da coluna e quaisquer funções ou operadores Oracle (por exemplo, <code>G = 'VA' ou G = 'CT'</code>, onde
      <code>G</code> é o alias de <code>CUSTOMER_STATE</code>).</p>
      

  attributes: 
    language: Portuguese (Brazil) (pt-br)
    used-in-javascript: false

  subscription: 
    version-number: 1

