- # ====== Text Message: APEX.IG.HELP.FILTER ===================
  id: 1819112683117867443
  identification: 
    name: APEX.IG.HELP.FILTER

  message: 
    text: |
      <p> Use esta caixa de diálogo para configurar filtros de dados que limitam as linhas retornadas. </p>
                                                                                                                                                                      <p> <strong> Lista de filtros </strong> <br>
                                                                                                                                                                      A lista de filtros exibe os filtros definidos. Desative um filtro existente, desmarcando-o. <br>
                                                                                                                                                                      Clique em Adicionar (& mais) para criar um novo filtro ou Excluir (& minus;) para remover um filtro existente. </p>
                                                                                                                                                                      <p> <strong> Configurações de filtro </strong> <br>
                                                                                                                                                                      Use o formulário para definir as propriedades do filtro. <br>
                                                                                                                                                                      Selecione o tipo de filtro apropriado: <br>
                                                                                                                                                                      & nbsp; & nbsp; & nbsp; Linha - filtre um termo em qualquer coluna filtrável. <br>
                                                                                                                                                                      & nbsp; & nbsp; & nbsp; Coluna - filtre uma coluna específica com um operador e valor especificados. </p>
                                                                                                                                                                      <p> <em> Nota: Ao visualizar a grade interativa, você pode definir filtros de linha digitando diretamente no campo Pesquisar. Clique em Selecionar colunas para pesquisar para limitar a pesquisa a uma coluna específica. Como alternativa, abra um menu Título de coluna e selecione um valor para criar um filtro de coluna. </em> </p>

  attributes: 
    language: Portuguese (Brazil) (pt-br)
    used-in-javascript: false

  subscription: 
    version-number: 1

