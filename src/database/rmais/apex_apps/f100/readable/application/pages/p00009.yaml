- # ====== Dynamic Action: New_2 ===============================
  id: 1790660197517291527
  identification: 
    name: New_2

  execution: 
    sequence: 30
    event-scope: Static
    type: Immediate

  when: 
    event: NATIVE_IG|REGION TYPE|interactivegridselectionchange
    selection-type: Region
    region: Pedidos # 1790361137501809231

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 1790660369737291528
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        var i, i_empid, i_line_location_id,
        
        model = this.data.model;
        
        for ( i = 0; i < this.data.selectedRecords.length; i++ ) {
            
            i_empid = model.getValue( this.data.selectedRecords[i], "PEDIDO");
            i_line_location_id =  model.getValue( this.data.selectedRecords[i], "LINE_LOCATION_ID");   
        }
        
        apex.item( "P9_PO" ).setValue (i_empid);
        apex.item( "P9_LINE_LOCATION_ID" ).setValue (i_line_location_id);

    execution: 
      sequence: 10
      event: New_2 # 1790660197517291527
      fire-when-event-result-is: True
      fire-on-initialization: false

- # ====== Dynamic Action: altera_po ===========================
  id: 1790841584054868897
  identification: 
    name: altera_po

  execution: 
    sequence: 40
    event-scope: Static
    type: Immediate

  when: 
    event: EVENT.EVENT.BROWSER.CLICK
    selection-type: Button
    button: OK # 1790841518663868896

  actions: 
  - # ====== Action: Execute Server-side Code ====================
    id: 1790841699460868898
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        begin
        update rmais_efd_lines
        set source_doc_number = :P9_PO,
            line_location_id  = :P9_LINE_LOCATION_ID,
            status            = 'MANUAL'
        
        
        where efd_line_id = :P9_EFD_LINE_ID;
        exception when others then
        raise_application_error (-20011,'Erro ao inserir PO');
        end;
      items-to-submit: 
      - P9_PO
      - P9_EFD_LINE_ID
      - P9_LINE_LOCATION_ID

    execution: 
      sequence: 10
      event: altera_po # 1790841584054868897
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

