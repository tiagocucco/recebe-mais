processes: 
- # ====== Process: collection =================================
  id: 1790657507978291500
  identification: 
    name: collection
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      BEGIN
        --  APEX_COLLECTION.DELETE_COLLECTION(p_collection_name => 'RMAIS_PO');
        --  APEX_COLLECTION.CREATE_COLLECTION(p_collection_name => 'RMAIS_PO');
          rmais_process_pkg.Set_Po_Array('50603430000176','45246402000109');
      begin
        --
        IF APEX_COLLECTION.COLLECTION_EXISTS (p_collection_name => 'RMAIS_PO') THEN
              APEX_COLLECTION.DELETE_COLLECTION(p_collection_name => 'RMAIS_PO');
              APEX_COLLECTION.CREATE_COLLECTION(p_collection_name => 'RMAIS_PO');
        ELSE
          APEX_COLLECTION.CREATE_COLLECTION(p_collection_name => 'RMAIS_PO');
        END IF;
        
      End;
          for x in (SELECT po_num pedido , 
             po_line_id , 
             line_num , 
             item_description , 
             UOM_CODE , 
             UNIT_PRICE, 
             QUANTITY_LINE , 
             LINE_LOCATION_ID,
             need_by_date,
             promised_date
        FROM TABLE(rmais_process_pkg.Get_Po_Array('50603430000176','45246402000109')) t
        order by po_num,line_num)
        loop
                APEX_COLLECTION.ADD_MEMBER(
                    p_collection_name => 'RMAIS_PO',
                    p_c001            => x.pedido,
                    p_c002            => x.item_description,
                    p_c003            => x.UOM_CODE,
                    p_n003            => x.unit_price,
                    p_n004            => x.quantity_line,
                    p_n005            => x.line_location_id,
                    p_c004            => x.need_by_date,
                    p_c005            => x.promised_date,
                    p_n001            => x.po_line_id,
                    p_n002            => x.line_num
                    );
      
        end loop;
        --
      END;

  execution: 
    sequence: 10
    point: Before Footer
    run-process: Once Per Page Visit (default)

