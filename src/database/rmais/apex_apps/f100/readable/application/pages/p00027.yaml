validations: 
- # ====== Validation: Validação Duplicidade de setup ==========
  id: 1872205564914907176
  identification: 
    name: Validação Duplicidade de setup

  execution: 
    sequence: 10

  validation: 
    type: Function Body (returning Boolean)
    language: PL/SQL
    pl/sql-function-body: |
      declare 
      l_aux number;
      begin
      SELECT 1
      into l_aux
        FROM rmais_cfop_out_in
      WHERE cfop_out = :P27_CFOP_OUT
        AND cfop_in  = :P27_CFOP_IN
        AND utilization_id = :P27_UTILIZATION_ID;
      return false;
      exception when others then
      return true;
      end;
    always-execute: false

  error: 
    error-message: Setup De/Para já cadastrado.
    display-location: Inline with Field and in Notification

