- # ====== Region: NF´s com divergência de impostos ============
  id: 1311469477138789874
  identification: 
    title: NF´s com divergência de impostos
    type: Interactive Grid

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select '<a href="'||apex_util.prepare_url('f?p='||:APP_ID||':7:'||:APP_SESSION||'::'||:DEBUG||':7:P7_PAGE_RETURN,P7_EFD_HEADER_ID:41,'||rmv.efd_header_id)||'"><span title="Visualizar/Editar" aria-hidden="true" class="fa fa-search"></span></a>' LINKS,
             rmv.ACCESS_KEY_NUMBER,
             rmv.LINE_NUMBER,
             rmv.VALOR,
             rmv.IMPOSTO,
             rmv.EFD_LINE_ID,
             rmv.EFD_HEADER_ID,
             rmv.GRUPO_CONDICAO,
             rmv.CODIGO_IMPOSTO,
             rmv.CODIGO_REGIME,
             rmv.TIPO_TAXA,
             rmv.BASE,
             rmv.TAXA,
             rmv.VALOR_IMP,
             rmv.VALOR_NF,
             rmh.document_number,
             rmh.issue_date,
             rmh.receiver_name,
             rmh.receiver_document_number,
             rmh.issuer_name,
             rmh.issuer_document_number,
             rmh.total_amount,
             decode(rmh.document_status,'N','A Receber','V','Válido','I','Inválido','E','Erro','T','Enviado ERP','C','Cancelada','M','Manual','X','Cancelada Após Integração','R','Rejeitado','RW','Rejeitado','W','Cancelada ERP','Status Desconhecido')  document_status,
             rmh.operation_nature natureza_operacao,
             decode(rmh.model,'55','NFe','00','NFse','NF','NF','57','Cte','67','CTEos','06','Energia','21','Comunicação','22','Telecomunicação','Modelo Não suportado')  as model
           
        from RMAIS_TAXES_ERRORS_V rmv,
             rmais_efd_headers rmh
        where rmv.efd_header_id = rmh.efd_header_id
        and     nvl(rmv.valor,0) not between nvl(rmv.valor_imp,0) - 0.1 and nvl(rmv.valor_imp,0) + 0.1

  layout: 
