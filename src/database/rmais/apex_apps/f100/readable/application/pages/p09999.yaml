- # ====== Page Item: P9999_REMEMBER ===========================
  id: 1778985851243770462
  identification: 
    name: P9999_REMEMBER
    type: Checkbox Group

  label: 
    label: Relembrar Usuário
    alignment: Left

  settings: 
    number-of-columns: 1

  layout: 
    sequence: 30
    region: <p><img src="#APP_IMAGES#logo-recebe-mais-simbolo.png" width="60%" height="60%"/></p><p>RecebeMais</p> # 1778983996776770456
