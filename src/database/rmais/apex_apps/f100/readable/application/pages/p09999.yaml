- # ====== Process: New ========================================
  id: 160062634044966535
  identification: 
    name: New
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      begin
          XXRMAIS_UTIL_V2_PKG.alterar_senha(:P9999_USERNAME,'RMAIS','Sua nova senha é ');
      end;

  execution: 
    sequence: 40
    point: Processing
    run-process: Once Per Page Visit (default)

  success-message: 
