- # ====== Validation: Usuario_existente =======================
  id: 160062454094966533
  identification: 
    name: Usuario_existente

  execution: 
    sequence: 10

  validation: 
    type: Rows returned
    sql-query: 'select * from APEX_APPL_ACL_USERS where APPLICATION_ID = :APP_ID and USER_NAME = UPPER(:P9999_USERNAME)'
    always-execute: false

  error: 
    error-message: Usuário não localizado.
    display-location: Inline with Field
    associated-item: P9999_USERNAME # 1778984425829770459

  server-side-condition: 
    when-button-pressed: FORGOT_PASSWORD # 160062509832966534

