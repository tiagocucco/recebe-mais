dynamic-actions: 
- # ====== Dynamic Action: Atualização de campos de validacao ==
  id: 1787036904795389201
  identification: 
    name: Atualização de campos de validacao

  execution: 
    sequence: 10
    event-scope: Static
    type: Immediate

  when: 
    event: NATIVE_IG|REGION TYPE|interactivegridsave
    selection-type: Region
    region: Períodos liberados para entrada # 1787037831707389211

  actions: 
  - # ====== Action: Set Value ===================================
    id: 1787036928124389202
    identification: 
      action: Set Value

    settings: 
      set-type: PL/SQL Function Body
      pl/sql-function-body: |
        DECLARE
        L_RET varchar2(300);
        BEGIN
          --
          SELECT TO_CHAR(MAX(nvl(date_fim+1,sysdate)),'DD-MM-YYYY') 
            INTO L_RET
            FROM rmais_period_entry;
          --
          RETURN L_RET;
        EXCEPTION WHEN OTHERS THEN
        raise_application_error(-20011,'ERRO:'||sqlerrm);
        RETURN to_char(SYSDATE);
        END;
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P25_MAX_DATE

    execution: 
      sequence: 10
      event: Atualização de campos de validacao # 1787036904795389201
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

