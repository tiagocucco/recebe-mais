- # ====== Region: Localização de erros de NFs =================
  id: 1632047898051509972
  identification: 
    title: Localização de erros de NFs
    type: Interactive Grid

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      with erros as (select 'Erro de envio ao Oracle' d, 
       		'%(AP-%' r
      from dual
      
      union
      select 'Inválidas - Pedidos não localizados' d, 
       		'%PO%Não localizada.%' r
      from dual
      union
      select 'Erro de envio ao Oracle' d, 
       		'The value of the attribute File Name isn%' r
               from dual
      union
      select 'Erro de envio ao Oracle' d, 
       		'Error: Entre em contato com o adminitrador do sistema' r
               from dual
      union
      select 'Erro de envio ao Oracle' d, 
       		'%Nota Fiscal%já foi disponíbilizado para pagamento!% ' r
      from dual
      union
      select 'Inválidas - Mais de um pedido para escolha' d, 
       		'%Mais de uma Ordem de Compra encontrada. Favor selecionar manualmente.%' r
      from dual
      union
      select 'Inválidas - Pedido ou recebimento com divergencia de quantidade ou valor' d, 
       		'%Ordem de Compra%com divergência de quantidade%' r
      from dual
      union
      select 'Inválidas - Pedido ou recebimento com divergencia de quantidade ou valor' d, 
       		'%Ordem de Compra %encontrada com divergência de valor%' r
      from dual
      union
      select 'Inválidas - Pedido ou recebimento com divergencia de quantidade ou valor' d, 
       		'%Não foi possível fazer o split automático do recebimento físico, recebimento com valor divergênte da NF Quant de receb:%' r
      from dual
      
      union
      select 'Inválidas - Pedido ou recebimento com divergencia de quantidade ou valor' d, 
       		'%Recebimento com valor divergênte da NF Quant de receb:%' r
      from dual
      union
      select 'Email de fornecedor não localizado' d, 
       		'%Não foi localizado o email do fornecedor, verificar cadastro no ERP.%' r
      from dual	 
      union
      select 'Divergência de imposto' d, 
       		'%Identificado divergência entre cálculo de imposto, verifique o detalhe da linha.%' r
      from dual		 
      union
      select 'Inválidas - Pedido ultrapassou a tolerância'd,
      	'%Pedido ultrapassou a tolerância permitida.%' r
      from dual	
      union
      select 'Avisos'd,
      	'%Ordem de Compra%utilizando tolerância%' r
      from dual	
      union
      select 'Avisos'd,
      	'%Alterado quantidade e valor unitário seguindo o pedido.%' r
      from dual
      union
      select 'Avisos'd,
      	'%Encontrado recebimento físico do documento fiscal.%' r
      from dual
      union
      select 'Avisos'd,
      	'%Os pedidos escolhidos utilizaram %da tolerância de%' r
      from dual
      union
      select 'Avisos'd,
      	'%Ordem de Compra % sem utilização atrelada, utilização derivada pelo tipo fiscal.%' r
      from dual
      union
      select 'Avisos'd,
      	'%Documento inválido pela definição do CFOP do documento fiscal' r
      from dual
      
      union
      select null d,  null r from dual		 )
      --select * from erros;
      
      select distinct rm.*
              
      ,er.message_text --43133
      ,count(*) over (partition by '1') total
      , nvl((select d from erros erb where er.message_text like erb.r),'N/D') error
      ,case when nvl(:P38_FILTRO_ERRO_PO,'N') IN ('RI','INFORMADO','N') then regexp_replace(replace(replace(er.message_text,'PO '), 'Não localizada.'),'[^0-9]') else null end pedido_nf
      from (SELECT   distinct
               h.efd_header_id
              ,h.source_document_type
              ,h.access_key_number
              ,h.document_number document_number
              ,h.series
              ,decode(h.model,'55','NFe','00','NFse','NF','NF','57','Cte','67','CTEos','06','Energia','21','Comunicação','22','Telecomunicação','28','Gás','29','Água','Modelo Não suportado')  as model
              ,h.model model_orig
              ,h.issue_date issue_date
              ,to_char(h.total_amount,'999G999G999G999G990D00') total_amount
              ,decode(h.document_status,'N','A Receber','V','Válido','I','Inválido','E','Erro','T','Enviado ERP','C','Cancelada','M','Manual','X','Cancelada Após Integração','R','Rejeitado','RW','Rejeitado','W','Z','Caixinha','Cancelada ERP','Status Desconhecido')  document_status
              ,initcap(h.issuer_name) issuer_name
              ,h.issuer_document_number
              ,h.issuer_address
              ,initcap(org.nome) receiver_name
              ,org.cnpj receiver_document_number 
              ,nvl((select nvl(def.utilization_code,'COMPRA') utilization_code
                      from --rmais_efd_lines rml,
                          (select cfop_code , utilization_code 
                          from RMAIS_DEFINE_CFOP dcfo
                              ,RMAIS_DEFINE_UTILIZATION_CFOP dut
                          where dcfo.utilization_id = dut.utilization_id) def
      
                          where 1=1----539003
                          and nvl(rml.cfop_from,'1111') = def.cfop_code(+)
                          and rownum = 1
                          --and efd_header_id = h.efd_header_id
                          ),'COMPRA') definicao_cfop
         FROM rmais_efd_headers h
              ,RMAIS_ORGANIZATIONS org
              ,rmais_efd_lines rml
          WHERE org.cnpj = h.receiver_document_number
          and rml.efd_header_id = h.efd_header_id) rm
          ,
          (
      
      SELECT --distinct l.line_number , nvl(ev.type,'Evento') evento, message_text , trunc(ev.creation_date) "Data" 
           distinct case when ev.type||message_text like '%Enviado para ERP%' then null  else l.line_number end line_number
          , nvl(ev.type,'Evento') 
          , message_text
          , trunc(ev.creation_date)
        , ev.efd_header_id 
      FROM rmais_efd_lines l,
           RMAIS_EFD_LIN_VALID ev
      WHERE (ev.efd_header_id = l.efd_header_id)
        AND (  L.efd_line_id  = ev.efd_line_id OR
               ev.efd_line_id IS NULL)   
        and (message_text not in(  'Setup de De/Para de CFOP não localizado.') and
        message_text not like '%selecionada automaticamente pelo sistema%' and
        message_text not like '%Enviado para ERP%' and
        message_text not like 'Split de linhas efetuado automaticamento pelo sistema.' and
        message_text not like 'Split de linhas efetuado automaticamento pelo sistema seguindo recebimento físico.' and
        message_text not like 'Alterado quantidade e valor unitário seguindo o pedido.' and
        message_text not like '%Setup de De/Para de CFOP não localizado. Utilization_code:%'
        )
      ) er
      where er.efd_header_id  = rm.efd_header_id
      and definicao_cfop = 'COMPRA'
      and (((:P38_FILTRO_ERRO is not null)
      and message_text like :P38_FILTRO_ERRO) or :P38_FILTRO_ERRO is null)
      and (:P38_FILTRO_ERRO_PO is null or
      	((:P38_FILTRO_ERRO_PO = 'N_INFORMADO' and message_text = 'PO  Não localizada.') OR
      	(:P38_FILTRO_ERRO_PO = 'INFORMADO' and message_text <> 'PO  Não localizada.')or
      	(:P38_FILTRO_ERRO_PO = 'RI' and message_text <> 'PO  Não localizada.' and
      	length (regexp_replace(replace(replace(message_text,'PO '), 'Não localizada.'),'[^0-9]')) = 6)
      	)) 
      
      
      --AND trunc(issue_date) >= trunc(to_date('06/08/2022','DD/MM/YYYY'))
      AND trunc(issue_date) >= trunc(to_date(nvl(:P38_DATA_DE,'06/08/2022'),'DD/MM/YYYY'))
      and document_status IN ('Inválido','Erro','Válido')
      --order by access_key_number, issue_date 
    page-items-to-submit: 
    - P38_FILTRO_ERRO
    - P38_FILTRO_ERRO_PO
    - P38_DATA_DE

