- # ====== Region: Localização de erros de NFs =================
  id: 13302147123820650686
  identification: 
    title: Localização de erros de NFs
    type: Interactive Grid

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select rmv.*, 
          '' pedido_nf
        from rmais_report_nf_erros_v rmv
        where trunc(issue_date) >= trunc(to_date(nvl(:P38_DATA_DE,'06/08/2022'),'DD/MM/YYYY'))
        
        and MODALIDADE_ERRO = nvl(:P38_FILTRO_ERRO,MODALIDADE_ERRO)
        and case when :P38_FILTRO_ERRO_PO is not null and (case when nvl(:P38_FILTRO_ERRO_PO,'N') IN ('RI','INFORMADO','N') then regexp_replace(replace(replace(rmv.message_text,'PO '), 'Não localizada.'),'[^0-9]') else null end) is not null then
           '1' 
           when :P38_FILTRO_ERRO_PO is null then
           '1'
           when :P38_FILTRO_ERRO_PO = 'N_INFORMADO' and (case when nvl(:P38_FILTRO_ERRO_PO,'N') IN ('RI','INFORMADO','N') then regexp_replace(replace(replace(rmv.message_text,'PO '), 'Não localizada.'),'[^0-9]') else null end) is  null then
           '1'
           else '2' end = '1'
        and MODALIDADE_ERRO <> 'Avisos'
    page-items-to-submit: 
    - P38_FILTRO_ERRO
    - P38_FILTRO_ERRO_PO
    - P38_DATA_DE

  layout: 
    sequence: 20
    parent-region: No Parent
    position: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

