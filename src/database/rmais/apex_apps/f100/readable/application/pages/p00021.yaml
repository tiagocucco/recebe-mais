- # ====== Region: Report 1 ====================================
  id: 1843595264400604870
  identification: 
    title: Report 1
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select cfop.ID,
             cfop.CFOP_OUT,
             cfop.CFOP_IN,
             util.UTILIZATION_NAME,
             decode(cfop.INACTIVE,'Y','Sim',cfop.INACTIVE) inactive,
             cfop.CREATION_DATE,
             cfop.CREATION_BY
        from RMAIS_CFOP_OUT_IN cfop,
             RMAIS_UTILIZATION_CFOP util
         where util.id = cfop.utilization_id

