- # ====== Region: Eventos =====================================
  id: 1476514328771467069
  identification: 
    title: Eventos
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT 'Submisão ERP' evento,
            '' msg,
            last_update_date DATA
        FROM rmais_efd_headers 
       WHERE efd_header_id = :P7_EFD_HEADER_ID
       AND document_status IN ('T','W','RW')
      UNION
      SELECT evento,
             mensagem,
             creation_date 
       FROM RMAIS_INVOICES_EVENTS
      WHERE efd_header_id = :P7_EFD_HEADER_ID
       ORDER BY 3 ASC;
    page-items-to-submit: 
    - P7_EFD_HEADER_ID

