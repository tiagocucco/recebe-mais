    id: 321553868923297565
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        begin
            :P7_MSG_ERROR := rmais_process_pkg.Cancel_NF_ERP(p_header_id => :P7_EFD_HEADER_ID);
            
            if :P7_MSG_ERROR = 'The current action Cancel Invoice has completed successfully.' then
                :P7_MSG_SUCESS := 'Documento cancelado com sucesso no ERP';
                --XXRMAIS_UTIL_V2_PKG.set_workflow(:P7_EFD_HEADER_ID,'Documento cancelado com sucesso no ERP',:app_user);
