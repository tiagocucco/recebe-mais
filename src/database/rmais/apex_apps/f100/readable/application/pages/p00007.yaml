- # ====== Region: Report Validações ===========================
  id: 1792060363940934206
  identification: 
    title: Report Validações
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT --distinct l.line_number , nvl(ev.type,'Evento') evento, message_text , trunc(ev.creation_date) "Data" 
           distinct case when ev.type||message_text like '%Enviado para ERP%' then null  else l.line_number end line_number
          , nvl(ev.type,'Evento') evento
          , message_text 
          , trunc(ev.creation_date) "Data" 
      FROM rmais_efd_lines l,
           RMAIS_EFD_LIN_VALID ev
      WHERE (ev.efd_header_id = l.efd_header_id)
        AND (  L.efd_line_id  = ev.efd_line_id OR
               ev.efd_line_id IS NULL) 
        AND ev.efd_header_id = :P7_EFD_HEADER_ID
        and message_text not like '%tentativa de usar um LOB de uma tabela temporária, cujos dados já foram expurgados%'
      order by 1 asc
    page-items-to-submit: 
    - P7_EFD_HEADER_ID

  layout: 
    sequence: 10
    parent-region: Sumário de Validação # 1782240152253919421
