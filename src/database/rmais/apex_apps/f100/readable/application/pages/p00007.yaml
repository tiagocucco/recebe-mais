- # ====== Validation: Boleto_duplicado ========================
  id: 160060723758966516
  identification: 
    name: Boleto_duplicado

  execution: 
    sequence: 10

  validation: 
    type: Function Body (returning Error Text)
    language: PL/SQL
    pl/sql-function-body-returning-error-text: |
      declare
          bol_exist number;
      begin
          select count(*) into bol_exist 
              from rmais_efd_headers 
              where 
                  :P7_BOLETO_COD is not null and :P7_EFD_HEADER_ID is not null
                  and boleto_cod = nvl(:P7_BOLETO_COD,'0') 
                  and EFD_HEADER_ID != nvl(:P7_EFD_HEADER_ID,'0');
          if bol_exist > 0 then
              return 'Boleto existente.';
          end if;
      end;
    always-execute: false

  error: 
    display-location: Inline with Field and in Notification

- # ====== Validation: Boleto_errado ===========================
  id: 265123926553234807
  identification: 
    name: Boleto_errado

  execution: 
    sequence: 20

  validation: 
    type: Function Body (returning Error Text)
    language: PL/SQL
    pl/sql-function-body-returning-error-text: |
      if (:P7_BOLETO_COD is null or length(regexp_replace(nvl(:P7_BOLETO_COD,0),'[^[:digit:]]')) not in (48,47)) then
