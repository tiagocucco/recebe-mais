        location.reload();

    execution: 
      sequence: 50
      event: Reprocess # 1792058815963934191
      fire-when-event-result-is: True
      fire-on-initialization: false

  - # ====== Action: Refresh =====================================
    id: 1792058947475934192
    identification: 
      action: Refresh

    affected-elements: 
      selection-type: Region
      region: Detalhes NF # 1783437247419575531

    execution: 
      sequence: 30
      event: Reprocess # 1792058815963934191
      fire-when-event-result-is: True
      fire-on-initialization: false

  - # ====== Action: Execute Server-side Code ====================
    id: 1792059243122934195
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        declare
            p_header_id number;
        BEGIN
            if :P7_DOCUMENT_STATUS in ('AU','AP') then
                for rw in (select * from rmais_notas_devolucao where status IN ('AU','AP') and ACCESS_KEY_NUMBER_DEVOLUTION = :P7_ACCESS_KEY_NUMBER) loop
                    
                    begin
                        select efd_header_id into p_header_id from rmais_efd_headers where ACCESS_KEY_NUMBER = rw.ACCESS_KEY_NUMBER_PURCHASE;
                        RMAIS_PROCESS_PKG.Update_devolucao(p_header_id,:P7_EFD_HEADER_ID,rw.id_nd);            
                        exception
                            when no_data_found then                    
                                update rmais_efd_headers set document_status = 'AP' where efd_header_id = :P7_EFD_HEADER_ID;
                                update rmais_notas_devolucao set status = 'AP',DATA_UPDATE = SYSDATE where ID_ND = RW.ID_ND;
                    end;
                end loop;
                commit;
            else
                begin
                    --execute immediate q'[alter session set NLS_NUMERIC_CHARACTERS='.,']';
                    rmais_process_pkg.main(p_header_id => :P7_EFD_HEADER_ID , p_flag_auto => nvl(:P7_CHECK_BOX_DEBUG,'N'), P_SEND_ERP => 'Y');
                    --execute immediate q'[alter session set NLS_NUMERIC_CHARACTERS=',.']';
                    update rmais_efd_headers
                    set  PAYMENT_INDICATOR = :P7_PAYMENT_INDICATOR
                    where efd_header_id = :P7_EFD_HEADER_ID;
                    EXCEPTION WHEN OTHERS THEN
                        raise_application_error (-20011,'Erro ao reprocessar documento '||sqlerrm);
                end;
            end if;
        end;
      items-to-submit: 
      - P7_EFD_HEADER_ID
      - P7_PAYMENT_INDICATOR
      - P7_CHECK_BOX_DEBUG
      - P7_ACCESS_KEY_NUMBER
      - P7_DOCUMENT_STATUS

    execution: 
      sequence: 20
      event: Reprocess # 1792058815963934191
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Execute JavaScript Code =====================
    id: 1792060102819934204
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: var spinner = apex.util.showSpinner();

    execution: 
      sequence: 10
