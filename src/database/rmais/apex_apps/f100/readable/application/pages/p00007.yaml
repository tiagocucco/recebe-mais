javascript: 
  function-and-global-variable-declaration: |
    
    function myFunction() {
      // Get the checkbox
      var checkBox = document.getElementById("myCheck");
    
      // If the checkbox is checked, display the output text
      if (checkBox.checked == true){
        apex.item('P7_CHECK_BOX_DEBUG').setValue('Y');
      } else {
            apex.item('P7_CHECK_BOX_DEBUG').setValue('N');  
      }
    };

css: 
  inline: |
    .switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 34px;
    }
    
    /* Hide default HTML checkbox */
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    /* The slider */
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgb(204, 204, 204);
      -webkit-transition: .4s;
      transition: .4s;
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 26px;
      width: 26px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      -webkit-transition: .4s;
      transition: .4s;
    }
    
    input:checked + .slider {
      background-color: #107210;
    }
    
    input:focus + .slider {
      box-shadow: 0 0 1px #107210;
    }
    
    input:checked + .slider:before {
      -webkit-transform: translateX(26px);
      -ms-transform: translateX(26px);
      transform: translateX(26px);
    }
    
    /* Rounded sliders */
    .slider.round {
      border-radius: 34px;
    }
    
    .slider.round:before {
      border-radius: 50%;
    }
    #P7_FORCE_INVOICE_ERP_CONTAINER {display: inline-block!Important;}
    
    #P7_FILE_ADD_DROPZONE {border-style: var(--a-filedrop-border-style,dashed);border-radius: var(--a-filedrop-border-radius,2px);}
    #P7_FILE_ADD_GROUP {margin: 0;}
    .t-Cards--float .t-Cards-item {max-width: 100%;width: 100%;}
    #img_form .dz-preview-mrs {margin-bottom: 8px;}

