- # ====== Button: Manifetacao =================================
  id: 1145367634046442609
  identification: 
    button-name: Manifetacao
    label: Confir. da Operação

  layout: 
    sequence: 50
    region: Detalhes NF # 1783437247419575531
    position: CLOSE
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    button-template: Text # 1778957344896770372
    hot: false
    template-options: 
    - '#DEFAULT#'

  behavior: 
    action: Submit Page
    execute-validations: true
    warn-on-unsaved-changes: Do Not Check

  server-side-condition: 
    type: Function Body
    language: PL/SQL
    pl/sql-function-body: |
      declare
      l_aux varchar2(1);
      begin
          begin
              SELECT 'Y' 
              into l_aux
              FROM rmais_invoices_events 
              WHERE 1=1
              AND efd_header_id = :P7_EFD_HEADER_ID
              AND evento = 'Manifestação'
              AND mensagem = 'Conclusão de Operação Realizada';
          exception when others then  
            l_aux := 'N';
          end;
      if :P7_DOCUMENT_STATUS = 'T' and l_aux = 'N' and  :P7_TREAT_MODEL_AS = '55' then  
        return true;
      else
        return false;
      end if;
      end;

