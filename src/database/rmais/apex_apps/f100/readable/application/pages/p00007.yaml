            else
                --XXRMAIS_UTIL_V2_PKG.set_workflow(:P7_EFD_HEADER_ID,:P7_MSG_ERROR,:app_user);
                :P7_MSG_SUCESS := '';
            end if;
        end;
      items-to-submit: 
      - P7_EFD_HEADER_ID
      items-to-return: 
      - P7_MSG_ERROR
      - P7_MSG_SUCESS
      suppress-change-event: false

    execution: 
