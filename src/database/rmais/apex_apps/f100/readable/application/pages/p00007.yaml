- # ====== Process: Boletos ====================================
  id: 265124917525245811
  identification: 
    name: Boletos
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      declare
          l_boleto varchar2(20);
          l_body varchar2(4000);
          l_response clob;
      begin
          if length(:P7_BOLETO_COD) = 47 then
              l_boleto := 'BOLETO_EFT';
          else
              l_boleto := 'CONCESSIONARIA_EFT';
          end if;
          UPDATE rmais_efd_headers SET boleto_cod = :P7_BOLETO_COD,first_due_date = :P7_FIRST_DUE_DATE WHERE efd_header_id = :P7_EFD_HEADER_ID;
          commit;    
          select json_object(
                  'InvoiceNumber' value DOCUMENT_NUMBER,
                  'BusinessUnit' value nvl(BU_NAME, 'HDI Seguros S.A. BU'),
                  'Supplier' value nvl(PARTY_NAME,nvl(nvl( (SELECT MAX(l.order_info.VENDOR_NAME)
                                                                        FROM rmais_efd_lines l
                                                                       WHERE l.efd_header_id = efd_header_id),
                                                                  (SELECT DISTINCT PARTY_NAME 
                                                                      from (SELECT DISTINCT PARTY_NAME , PARTY_ID -- into l_aux
                                                                              FROM json_table(replace(replace(issuer_info,'"DATA":{','"DATA": [{'),'}}}','}}]}'), '$' COLUMNS(NESTED         PATH '$.DATA[*]' COLUMNS(                                                                                           
                                                                                                 PARTY_NAME                VARCHAR2(4000)         PATH '$.PARTY_NAME' ,
                                                                                                 PARTY_ID                  VARCHAR2(4000)         PATH '$.PARTY_ID')))
                                                                                      
                                                                                      order by PARTY_ID desc)
                                                                                      where rownum = 1)
                                          ),     'NAO LOCALIZADO')),
                  'SupplierSite'  value nvl(vendor_site_code,issuer_document_number),
                  'InvoiceAmount' value TOTAL_AMOUNT,
                  'PaymentMethod' value l_boleto,
                  'DueDate'       value nvl((select to_char(To_timestamp_tz(json_value(order_info,'$.LINES.LINE_LOCATIONS.NEED_BY_DATE'),'RRRR-MM-DD"T"HH24:MI:SS TZR'),'RRRR-MM-DD') 
                                                      from rmais_efd_lines 
                                                      where efd_header_id = :P7_EFD_HEADER_ID
                                                      and rownum = 1),to_char(nvl(first_due_date,sysdate),'RRRR-MM-DD'))
              ) dados into l_body 
          from rmais_efd_headers where efd_header_id = :P7_EFD_HEADER_ID;
          l_response := rmais_process_pkg.Get_response2(RMAIS_PROCESS_PKG.Get_Parameter('url_update_method_pay'),l_body,'POST');
          if json_value(l_response,'$.code') = '200' then
              RMAIS_PROCESS_PKG.send_boleto(:P7_EFD_HEADER_ID);
              rmais_process_pkg.set_workflow(:P7_EFD_HEADER_ID,'Enviado Boleto',:APP_USER);
              -- Robson 10/07/2023 Start
              delete RMAIS_ATTACHMENTS_BOL where EFD_HEADER_ID = :P7_EFD_HEADER_ID;
              insert into RMAIS_ATTACHMENTS_BOL
                  select  :P7_EFD_HEADER_ID EFD_HEADER_ID,
                          BLOB_CONTENT BLOB_FILE,
                          FILENAME,
                          MIME_TYPE,
                          current_date CREATION_DATE
                  from    apex_application_temp_files;
              --
              RMAIS_PROCESS_PKG.Update_Invoice(
                  p_header_id => :P7_EFD_HEADER_ID,
                  p_att_bol => 1);
              -- Robson 10/07/2023 End
          else
              xxrmais_util_v2_pkg.create_event (:P7_EFD_HEADER_ID,'Boleto','Falha alteração de método de pagamento!','Sistema');
              rmais_process_pkg.set_workflow(:P7_EFD_HEADER_ID,'Falha alteração de método de pagamento!',:APP_USER);
          end if;
          
      end;

  execution: 
    sequence: 50
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: SEND_BOL # 264886613364208391

