  id: 1782240696173919427
  identification: 
    title: Linhas
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select * from (
      SELECT  line_number
      ,'1' link
      ,item_code
      ,nvl(source_document_type,'PO') Type_lin
      ,source_doc_number Pedido
      ,source_doc_line_num
      --,decode(source_doc_line_id,null,'Não Localizado','Localizado') status_op
      /*,CASE WHEN nvl(source_document_type,'PO') = 'PO' and source_doc_line_id is not null then 'PO Localizada'
            when nvl(source_document_type,'PO') = 'PO' and source_doc_line_id is null then 'PO Não Localizada'
            when nvl(source_document_type,'PO') = 'NA' and item_code_efd is not null then 'De/Para de item localizado'
            when nvl(source_document_type,'PO') = 'NA' and item_code_efd is  null then 'De/Para de item Não localizado'
            end status_op*/
      ,item_description
      ,fiscal_classification ncm
      ,icms_cst_from
      ,cfop_from
      ,cfop_to
      ,uom_from
      ,line_quantity
      ,replace(to_char(trunc(line_quantity,4)),',','.') line_quantity_s_t
      ,unit_price
      ,replace(to_char(round(unit_price,4)),',','.') unit_price_s_t
      ,nvl(line_amount,unit_price*line_quantity) line_amount
      ,icms_calc_basis
      ,icms_rate
      ,icms_amount
      ,ipi_amount
      ,efd_line_id
      ,efd_header_id
      ,ipi_calc_basis
      ,ipi_rate
      ,line_location_id line_location_id_1
      ,:P7_TREAT_MODEL_AS model
      ,:P7_ISSUER_DOCUMENT_NUMBER cnpj_fornecedor
      ,:P7_RECEIVER_DOCUMENT_NUMBER cnpj_tomador
      ,replace (item_descr_efd,',',' ') item_descr_efd
      ,item_code_efd
      ,replace(replace(replace(replace(item_description,',',' '),'.',''),'/',''),':','' )item_description_aux,
      /*'<span class="fa '||
        CASE '2'
          WHEN '1' THEN 'fa-exclamation-circle is-open" style="color:red'
          WHEN '2' THEN 'fa-check-circle is-closed" style="color:green'
          WHEN '3' THEN 'fa-exclamation-circle is-holding" style="color:blue'
          WHEN '4' THEN 'fa-exclamation-triangle is-pending" style="color:pink'
        END ||' "></span>' as teste
      ,*/
      '<span class="fa '||
      CASE WHEN nvl(source_document_type,'PO') = 'PO' and (source_doc_line_id is not null) and ((((cfop_to is not  null and :P7_TREAT_MODEL_AS <> ('00'))or :P7_TREAT_MODEL_AS = '00') and destination_type = 'EXPENSE') or (destination_type = 'INVENTORY' AND cfop_to is not  null) OR :P7_TREAT_MODEL_AS IN ('NF','22') ) then 
           'fa-check-circle is-closed" style="color:green'
            when nvl(source_document_type,'PO') = 'PO' and (((source_doc_line_id is null OR cfop_to is  null) and destination_type = 'EXPENSE' )or ((source_doc_line_id is null) and destination_type = 'INVENTORY' ) OR :P7_TREAT_MODEL_AS = 'NF' ) then 
            'fa-exclamation-circle is-open" style="color:red'
            when nvl(source_document_type,'PO') = 'NA' and item_code_efd is not null and (cfop_to is not null and  :P7_TREAT_MODEL_AS <> '00' or :P7_TREAT_MODEL_AS = '00')  then
            'fa-check-circle is-closed" style="color:green'
            when nvl(source_document_type,'PO') = 'NA' and item_code_efd is  null  or (cfop_to is not null and  :P7_TREAT_MODEL_AS <> '00') then 
            'fa-exclamation-circle is-open" style="color:red'
            else
            'fa-exclamation-circle is-open" style="color:red'
            end||' "></span>' status_op,
            item_type
      /*,ex_tip
      ,uom_to
      ,freight_line_amount
      ,insurance_line_amount
      ,other_expenses_line_amount
      ,discount_line_amount
      ,cfop_to
      ,goods_origin_from
      ,goods_origin_to
      ,vehicle_operation_type
      ,vehicle_chassis
      ,med_max_consumer_price
      ,recopi_number
      ,fci_number
      ,ri_icms_type
