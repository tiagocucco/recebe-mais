- # ====== Dynamic Action: SendNf ==============================
  id: 1788266976930573134
  identification: 
    name: SendNf

  execution: 
    sequence: 10
    event-scope: Static
    type: Immediate

  when: 
    event: EVENT.EVENT.BROWSER.CLICK
    selection-type: Button
    button: Submeter # 1785558951843844491

  client-side-condition: 
    type: Item = Value
    item: P7_CTRL_ENTRY
    value: Y

  actions: 
  - # ====== Action: Alert =======================================
    id: 1787039449376389227
    identification: 
      action: Alert

    settings: 
      message: Fora do período de lançamento. Verifique o setup de Período de entrada de NF`s
      style: Default

    execution: 
      sequence: 10
      event: SendNf # 1788266976930573134
      fire-when-event-result-is: False
      fire-on-initialization: false

  - # ====== Action: Execute Server-side Code ====================
    id: 1788267112211573135
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        declare
            l_id number;
            l_flag_retention varchar2(1);
            l_flag_nf_op varchar2(1);
        begin
            --
            execute immediate q'[alter session set NLS_NUMERIC_CHARACTERS='.,']';
            --
            if :P7_REMOVE_SOURCE_DOC_NUMBER = 1 then
                :P7_EXEC_CLEAR_SOURCE_DOC_NUMBER := 1;
            elsif xxrmais_util_v2_pkg.get_period_entry = 'Y' then
                --
                update  rmais_efd_headers
                set     PAYMENT_INDICATOR = :P7_PAYMENT_INDICATOR
                where   efd_header_id = :P7_EFD_HEADER_ID;
                --
                commit;
                --
                if nvl(:P7_FORCE_INVOICE_ERP,0) = 1 then
                    l_flag_retention := 'Y';
                    l_flag_nf_op := 'Y';
                else        
                    select  max(A.FLAG_RETENTION),
                            nvl(max(A.FLAG_NF_OP),'Y')
                    into    l_flag_retention,
                            l_flag_nf_op
                    from    RMAIS_DEFINE_DET_ENTRY A
                    where   A.MODEL = :P7_TREAT_MODEL_AS
                    and     A.TYPE = :P7_DEFINE_DET_ENTRY_TYPE;
                end if;
        
                if l_flag_nf_op = 'Y' or nvl(:P7_FORCE_INVOICE_ERP,0) = 1 then
                    rmais_process_pkg.send_invoice_v2(:P7_EFD_HEADER_ID, l_flag_retention, :APP_USER);
                else
                    rmais_process_pkg.Update_Invoice(:P7_EFD_HEADER_ID);
                end if;
                        /******ENVIANDO SOMENTE AO AP*******/
                       -- if XXRMAIS_UTIL_V2_PKG.get_destination(:P7_EFD_HEADER_ID) = 'EXPENSE' then 
                        --if :P7_MODEL <> '55' then
                            --
                            -- Comentado por Robson em 16/01/2023 rmais_process_pkg.Send_Invoice_v2(:P7_EFD_HEADER_ID);
                            --
                        --else
                            --
                            --
                            --
                        --    xxrmais_util_v2_pkg.send_danfe(:P7_EFD_HEADER_ID);
                            --
                        --end if;
                        --
            else
                raise_application_error('-20032','Fora do setup do período de entrada');
            end if;
            --
            execute immediate q'[alter session set NLS_NUMERIC_CHARACTERS='.,']';
                --
        exception when others then
            raise_application_error (-20023,'Erro no ID:'||:P7_EFD_HEADER_ID||sqlerrm);
        
        end;
      items-to-submit: 
      - P7_EFD_HEADER_ID
      - P7_MODEL
      - P7_TREAT_MODEL_AS
      - P7_PAYMENT_INDICATOR
      - P7_DEFINE_DET_ENTRY_TYPE
      - P7_FORCE_INVOICE_ERP
      - P7_REMOVE_SOURCE_DOC_NUMBER
      items-to-return: 
      - P7_EXEC_CLEAR_SOURCE_DOC_NUMBER
      suppress-change-event: false

    execution: 
      sequence: 40
      event: SendNf # 1788266976930573134
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

