- # ====== Region: Card-pdf ====================================
  id: 457253751953211219
  identification: 
    title: Card-pdf
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select  'Anexo do boleto' CARD_TITLE,
              to_char(A.CREATION_DATE,'DD/MM/YYYY') CARD_SUBTITLE,        
              nvl(round(dbms_lob.getlength(A.BLOB_FILE) / 1024,2),0)||' KB' CARD_SUBTEXT,
              '<div id="img_form" class="dropzone-mrs dz-style1 ">'||
                  '<div class="dz-preview-mrs  dz-image-preview">'||
                      '<div class="dz-image">'||
                          case
                              when nvl(dbms_lob.getlength(A.BLOB_FILE),0) > 0 then
                                  '<iframe  src="f?p=&APP_ID.:0:&SESSION.:APPLICATION_PROCESS=OpenMinPDF_BOL:NO::P7_ID:'||A.EFD_HEADER_ID||'" style="border: none;" type="application/pdf" width="100%" height="100%"></iframe>'
                          end||
                      '</div>'||
                  '</div>'||
                  '<a href="f?p=&APP_ID.:0:&SESSION.:APPLICATION_PROCESS=OpenMinPDF_BOL:NO::P7_ID:'||A.EFD_HEADER_ID||'" target="_blank" class="t-Button">'||A.FILENAME||'</a>'||
              '</div>' CARD_TEXT,
              '' CARD_LINK
      from    RMAIS_ATTACHMENTS_BOL A
      where   A.EFD_HEADER_ID = :P7_EFD_HEADER_ID
    page-items-to-submit: 
    - P7_EFD_HEADER_ID

