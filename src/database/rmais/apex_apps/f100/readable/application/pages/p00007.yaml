      ,efd_line_id_parent
      ,line_amount_original
      ,flag_ipi_base_icms
      ,awt_group_id
      ,icms_exemption_amount
      ,motdesicms*/
      ,utilization_name utilização     
       
       FROM rmais_efd_lines l,
