- # ====== Dynamic Action: Calc_Valor_Liq ======================
  id: 1829005491348923600
  identification: 
    name: Calc_Valor_Liq

  execution: 
    sequence: 130
    event-scope: Static
    type: Immediate

  when: 
    event: EVENT.EVENT.BROWSER.CHANGE
    selection-type: Item(s)
    item(s): 
    - P11_TOTAL_AMOUNT
    - P11_PIS_AMOUNT
    - P11_COFINS_AMOUNT
    - P11_INSS_BASE
    - P11_INSS_TAX
    - P11_INSS_AMOUNT
    - P11_IR_BASE
    - P11_IR_AMOUNT
    - P11_ISS_BASE
    - P11_ISS_TAX
    - P11_CSLL_AMOUNT
    - P11_OTHER_EXPENSES_AMOUNT
    - P11_DISCOUNT_AMOUNT

  actions: 
  - # ====== Action: Set Value ===================================
    id: 1829005382721923599
    identification: 
      action: Set Value

    settings: 
      set-type: PL/SQL Function Body
      pl/sql-function-body: |
        DECLARE
          l NUMBER(15,2);
        BEGIN
        
          l := ( nvl(:P11_TOTAL_AMOUNT, 0) - (nvl(:P11_PIS_AMOUNT, 0) + nvl(:P11_COFINS_AMOUNT, 0) + nvl(:P11_INSS_TAX, 0) + nvl(:P11_INSS_AMOUNT, 0) + nvl(:P11_IR_AMOUNT, 0) + nvl(:P11_ISS_TAX, 0) + nvl(:P11_CSLL_AMOUNT, 0) + nvl(:P11_OTHER_EXPENSES_AMOUNT, 0) + nvl(:P11_DISCOUNT_AMOUNT, 0) ) );
        
          if ( nvl(:P11_TOTAL_AMOUNT, 0) < 1 )
          THEN
            l := 0;
          END IF;
        
          RETURN l;
        
        END;
      items-to-submit: 
      - P11_TOTAL_AMOUNT
      - P11_PIS_AMOUNT
      - P11_COFINS_AMOUNT
      - P11_INSS_TAX
      - P11_INSS_AMOUNT
      - P11_IR_AMOUNT
      - P11_ISS_TAX
      - P11_CSLL_AMOUNT
      - P11_OTHER_EXPENSES_AMOUNT
      - P11_DISCOUNT_AMOUNT
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P11_VAL_LIQ

    execution: 
      sequence: 10
      event: Calc_Valor_Liq # 1829005491348923600
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

