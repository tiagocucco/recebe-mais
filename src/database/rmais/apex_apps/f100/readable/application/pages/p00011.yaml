- # ====== Dynamic Action: refresh linhas ======================
  id: 1773930298995512512
  identification: 
    name: refresh linhas

  execution: 
    sequence: 140
    event-scope: Static
    type: Immediate

  when: 
    event: EVENT.EVENT.FAMEWORK.APEXAFTERCLOSEDIALOG
    selection-type: Region
    region: Forms_Nfs_Manuais # 1797940575789139926

  actions: 
  - # ====== Action: Refresh =====================================
    id: 1773930394797512513
    identification: 
      action: Refresh

    affected-elements: 
      selection-type: Region
      region: Linhas # 1799862362978569124

    execution: 
      sequence: 20
      event: refresh linhas # 1773930298995512512
      fire-when-event-result-is: True
      fire-on-initialization: false

  - # ====== Action: Execute Server-side Code ====================
    id: 1784028351539599195
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        BEGIN
          --
          --execute immediate q'[alter session set NLS_NUMERIC_CHARACTERS='.,']';
          --
          :P11_EFD_HEADER_ID := nvl(:P11_EFD_HEADER_ID,xxrmais_invoices_s.nextval);
          --
          for x in (SELECT descricao,
                             quantidade,
                             unit 
                      FROM rmais_lines_tmp)
          loop
                  APEX_COLLECTION.ADD_MEMBER(
                      p_collection_name => 'RMAIS_LINHAS',
                      p_n001            => :P11_EFD_HEADER_ID,
                      p_n002            => null,
                      p_c001            => null,
                      p_c002            => null,
                      p_n003            => x.quantidade,
                      p_n004            => x.unit,
                      p_n005            => x.unit * x.quantidade,
                      p_c003            => x.descricao
                      );
          :P11_TOTAL_AMOUNT := trunc(nvl(:P11_TOTAL_AMOUNT,0) + x.unit * x.quantidade,2);
          end loop;
          --
          delete rmais_lines_tmp;
          --
          --execute immediate q'[alter session set NLS_NUMERIC_CHARACTERS=',.']';
          --
        exception when others then
          raise_application_error(-20033,'Erro ao buscar PO');
        END;
      items-to-submit: 
      - P11_EFD_HEADER_ID
      items-to-return: 
      - P11_EFD_HEADER_ID
      - P11_TOTAL_AMOUNT
      suppress-change-event: false

    execution: 
      sequence: 10
      event: refresh linhas # 1773930298995512512
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

