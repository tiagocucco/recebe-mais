    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      begin
      --
        select reject_justification
          into :P35_JUSTIFICATIVA
          from rmais_efd_headers 
          where efd_header_id = :P35_EFD_HEADER_ID;
      --
