buttons: 
- # ====== Button: Ok_Rejeicao =================================
  id: 1638234365565230820
  identification: 
    button-name: Ok_Rejeicao
    label: Ok

  layout: 
    sequence: 40
    region: Rejeição # 1638233962898230816
    position: BODY
    start-new-layout: false
    start-new-row: true
    column: 12
    new-column: true
    column-span: Automatic
    alignment: Right

  appearance: 
    button-template: Text # 1778957344896770372
    hot: true
    template-options: 
    - '#DEFAULT#'

  behavior: 
    action: Submit Page
    execute-validations: true
    warn-on-unsaved-changes: Do Not Check

  server-side-condition: 
    type: Function Body
    language: PL/SQL
    pl/sql-function-body: |
      declare
      l_aux rmais_efd_headers.reject_justification%type;
      begin
        --
          select reject_justification
          into l_aux
          from rmais_efd_headers 
          where efd_header_id = :P35_EFD_HEADER_ID;
          --
          if l_aux is null then 
            return true;
          else
            return false;
          end if;
        --
      exception when others then
        --
        return true;
        --
      end;

validations: 
- # ====== Validation: Validacao de tamanha de msg de justofocat
  id: 1476514128059467067
  identification: 
    name: Validacao de tamanha de msg de justofocativa

  execution: 
    sequence: 10

  validation: 
    type: Function Body (returning Boolean)
    language: PL/SQL
    pl/sql-function-body: |
      if LENGTH(:P35_JUSTIFICATIVA) < 15 then
        return false;
      else
        return true;
      end if;
    always-execute: false

  error: 
    error-message: A justificativa tem que ser maior que 15 digitos
    display-location: Inline with Field and in Notification
    associated-item: P35_JUSTIFICATIVA # 1638234224454230819

