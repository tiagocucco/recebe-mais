dynamic-actions: 
- # ====== Dynamic Action: New_1 ===============================
  id: 1741235024457749588
  identification: 
    name: New_1

  execution: 
    sequence: 20
    event-scope: Static
    type: Immediate

  when: 
    event: EVENT.EVENT.BROWSER.CLICK
    selection-type: Button
    button: New # 1741234942194749587

  actions: 
  - # ====== Action: Set Value ===================================
    id: 1741235154794749589
    identification: 
      action: Set Value

    settings: 
      set-type: PL/SQL Function Body
      pl/sql-function-body: "return nvl(:AD_EMAIL,'NUULOI');"
      items-to-submit: 
      - AD_EMAIL
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P6_NEW

    execution: 
      sequence: 10
      event: New_1 # 1741235024457749588
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Refresh =====================================
    id: 1741235299228749590
    identification: 
      action: Refresh

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P6_NEW

    execution: 
      sequence: 20
      event: New_1 # 1741235024457749588
      fire-when-event-result-is: True
      fire-on-initialization: false

