- # ====== Region: Report 2 ====================================
  id: 1784639328686730801
  identification: 
    title: Report 2
    type: Interactive Grid

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      with
          TP_LINES as (
              select  B.EFD_HEADER_ID,
                      max(B.SOURCE_DOCUMENT_TYPE) SOURCE_DOCUMENT_TYPE_LINE_MAX,
                      max(B.item_code_efd) item_code_efd_MAX
              from    RMAIS_EFD_LINES B
              group by
                      B.EFD_HEADER_ID
          )
      SELECT   h.efd_header_id
              ,h.org_id
              ,h.organization_id
              ,h.location_id
              ,h.layout_version
              ,h.operation_type
              ,h.document_type
              ,h.ri_document_type_id
              ,h.source_document_type
              ,h.access_key_number
              ,h.usage_authorization
              ,h.event_code
              ,h.event_type
              ,h.event_date
              ,h.document_number document_number
              ,h.series
              ,decode(h.model,'55','NFe','00','NFse','NF','NF','57','Cte','67','CTEos','06','Energia','21','Comunicação','22','Telecomunicação','28','Gás','29','Água','97','Fatura de Aluguel','Modelo Não suportado')  as model
              ,trunc(h.issue_date) issue_date
              ,h.liable_freight_payment
              ,h.dar_number
              ,h.dar_total_amount
              ,h.dar_payment_date
              ,h.carrier_document_type
              ,h.carrier_address_state
              ,h.carrier_state_inscription
              ,h.carrier_vehicle_plate_number
              ,h.payment_term_id
              ,h.payment_base_date
              ,h.first_due_date
              ,to_char(h.total_amount,'FML999G999G999G999G990D00') total_amount
              ,h.issuing_purpose
              ,h.issuing_type
              ,h.freight_modal
              ,h.gross_weight
              ,h.freight_unit_of_measure
              --Comentado por Robson em 12/01/2023 ,decode(h.document_status,'N','A Receber','V','Válido','I','Inválido','E','Erro','T','Enviado ERP','C','Cancelada','M','Manual','X','Cancelada Após Integração','R','Rejeitado','RW','Rejeitado','W','Cancelada ERP','Status Desconhecido')  document_status
              ,nvl(B.DESC_STATUS_DOCS,'Status Desconhecido') document_status
      --        'colorizedCell ' || CASE WHEN (VALUE = 0 'redCell' ) THEN WHEN (VALUE > 100) THEN 'yellowCell' WHEN (VALUE = 50) THEN 'greenCell' ELSE 'whiteCell' END AS VALUE_DIV_CLASS
              --, document_status
              ,h.additional_information
              ,h.reject_reason
              ,h.reject_justification
              ,h.issuer_taxpayer_id
              ,initcap(h.issuer_name) issuer_name
              ,h.issuer_document_number
              ,h.issuer_address
              ,h.issuer_address_number
              ,h.issuer_address_state
              ,h.issuer_address_complement
              ,h.issuer_address_zip_code
              ,h.issuer_address_city_id
              ,h.issuer_address_city_code
              ,h.issuer_address_city_name
              ,h.receiver_taxpayer_id
              ,initcap(org.nome) receiver_name
              ,org.cnpj receiver_document_number 
             --  ,h.receiver_name
             -- ,h.receiver_document_number
              ,h.receiver_address
              ,h.receiver_address_number
              ,h.receiver_address_city_id
              ,h.receiver_address_city_code
              ,h.receiver_address_city_name
              ,h.receiver_address_state
              ,h.receiver_address_complement
              ,h.receiver_address_zip_code
              ,h.ship_from_document_number
              ,h.ship_from_address_state
              ,h.ship_from_address_city_code
              ,h.ship_from_address_city_name
              ,h.ship_from_address
              ,h.ship_from_address_number
              ,h.ship_from_address_zip_code
              ,h.ship_from_address_complement
              ,h.ship_to_document_number
              ,h.ship_to_address
              ,h.ship_to_address_number
              ,h.ship_to_address_city_code
              ,h.ship_to_address_city_name
              ,h.ship_to_address_state
              ,h.ship_to_address_zip_code
              ,h.ship_to_address_complement
              ,h.freight_amount
              ,h.insurance_amount
              ,h.other_expenses_amount
              ,h.discount_amount
              ,h.tributary_regimen
              ,h.icms_calculation_basis
              ,h.icms_amount
              ,h.icms_st_calculation_basis
              ,h.icms_st_amount
              ,h.ipi_amount
              ,h.pis_amount
              ,h.cofins_amount
              ,h.pis_withhold_amount
              ,h.cofins_withhold_amount
              ,h.ri_importing_indicator
              ,h.file_name
              ,h.email
              ,h.process_date
              ,h.source_type
              ,trunc(h.creation_date) creation_date
              ,h.created_by
              ,h.last_update_date
              ,h.last_updated_by
              ,h.last_update_login
              ,h.program_id
              ,h.program_login_id
              ,h.program_application_id
              ,h.request_id
              ,h.attribute_category
              ,h.attribute1
              ,h.attribute2
              ,h.attribute3
              ,h.attribute4
              ,h.attribute5
              ,h.attribute6
              ,h.attribute7
              ,h.attribute8
              ,h.attribute9
              ,h.attribute10
              ,h.attribute11
              ,h.attribute12
              ,h.attribute13
              ,h.attribute14
              ,h.attribute15
              ,h.carrier_document_number
              ,h.payment_indicator
              ,h.freight_utilization_id
              ,h.icms_fcp_amount
              ,h.icms_sharing_dest_amount
              ,h.icms_sharing_source_amount
              ,h.operation_nature
              ,h.service_taker_type
              ,h.source
              ,h.simple_national_indicator
              ,h.freight_ibge_source
              ,h.freight_city_source_code
              ,h.freight_city_source_id
              ,h.freight_ibge_destination
              ,h.freight_city_dest_code
              ,h.freight_city_dest_id
              ,h.inss_income_code
              ,h.inss_base
              ,h.inss_tax
              ,h.inss_amount
              ,h.sest_senat_income_code
              ,h.sest_amount
              ,h.senat_amount
              ,h.sest_tax
              ,h.senat_tax
              ,h.sest_base_amount
              ,h.senat_base_amount
              ,h.awt_group_id
              ,h.operation
              ,h.sest_senat_base
              ,h.total_fcp_amount
              ,h.total_fcp_st_amount
              ,h.document_shipper_status
              ,h.freight_flag
              ,h.net_amount
              ,h.source_state_code
              ,h.source_ibge_code
              ,h.destination_state_code
              ,h.destination_ibge_code
              ,h.sender_name
              ,h.sender_document_number
              ,h.sender_address_state
              ,h.sender_address_city_code
              ,h.sender_address_city_name
              ,h.sender_address
              ,h.sender_address_number
              ,h.sender_address_complement
              ,h.sender_address_zip_code
              ,h.inss_billed_amount
              ,h.referenced_chcte
              ,h.observation
              ,h.freight_mode
              ,h.ir_amount
              ,h.ir_base
              ,h.ir_categ
              ,h.ir_tax
              ,h.ir_vendor
              ,h.iss_amount
              ,h.iss_tax
              ,h.iss_base
              ,h.iss_city_code
              ,h.iss_city_id
              ,h.checked_flag
              ,h.checked_date
              ,h.checked_by
              ,h.submited_by
              ,h.inss_init_base
              
              ,case when upper(nvl(h.flag_valid_boleto,'N')) = 'Y' then 'Sim' else 'Não' end BOLETO_ASSOCIADO
              ,'<div class="barra-link">'||
                  '<a href="'||apex_util.prepare_url('f?p='||:APP_ID||':7:'||:APP_SESSION||'::'||:DEBUG||':7:P7_PAGE_RETURN,P7_EFD_HEADER_ID:6,'||h.efd_header_id)||'"><span title="Visualizar/Editar" aria-hidden="true" class="fa fa-search"></span></a>'||
                  case
                      when upper(nvl(h.flag_valid_boleto,'N')) = 'Y' then
                          '<a href="'||apex_util.prepare_url('f?p='||:APP_ID||':43:'||:APP_SESSION||'::'||:DEBUG||':43:P43_EFD_HEADER_ID:'||h.efd_header_id, p_triggering_element => 'apex.jQuery(''#report-2'')')||'" ><span title="Informações do Boleto" aria-hidden="true" class="fa fa-barcode"></span></a>'
              end||'</div>' LINKS        
              ,C.SOURCE_DOCUMENT_TYPE_LINE_MAX,
              C.item_code_efd_MAX
              ,nvl(FLAG_VALID_BOLETO,'N') FLAG_VALID_BOLETO
              ,DECODE(NVL(FLAG_VALID_BOLETO,'N'),'Y','fa fa-barcode','') ICONE
      
         FROM rmais_efd_headers h
              ,RMAIS_ORGANIZATIONS org
              ,RMAIS_STATUS_DOCS B
              ,TP_LINES C
          WHERE org.cnpj = h.receiver_document_number
          and   h.document_status is not null
          and   h.document_status not in ('FA','QA')
          and   h.document_status = B.FLAG_STATUS_DOCS (+)
          and   h.EFD_HEADER_ID = C.EFD_HEADER_ID (+)
      

