        $('td[headers="STATUS_ID"]').each(function() {
          {
            $(this).closest('tr').find('td').css({"color":"red"});
          }
          
        });

    execution: 
      sequence: 10
      event: New # 1792061154999934214
      fire-when-event-result-is: True
      fire-on-initialization: false

