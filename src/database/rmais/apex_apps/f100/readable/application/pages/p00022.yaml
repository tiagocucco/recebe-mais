- # ====== Region: Report 1 ====================================
  id: 1867006294838932464
  identification: 
    title: Report 1
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      SELECT distinct l.line_number , nvl(ev.type,'Evento') evento, message_text , trunc(ev.creation_date) "Data" 
      FROM rmais_efd_lines l,
           RMAIS_EFD_LIN_VALID ev
      WHERE (ev.efd_header_id = l.efd_header_id)
        AND (  L.efd_line_id  = ev.efd_line_id)
        AND ev.efd_line_id = :P22_LINE_ID
      order by 1 asc
    page-items-to-submit: 
    - P22_LINE_ID

