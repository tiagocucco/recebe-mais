  - # ====== Column: TYPE_DSP ====================================
    id: 811832723433561835
    identification: 
      column-name: TYPE_DSP
      type: Popup LOV

    heading: 
      heading: Tipo de Combinação
      alignment: start

    settings: 
      display-as: Inline Popup
      initial-fetch: Automatic
      multiple-values: false
      manual-entry: false
      search-as-you-type: false

    layout: 
      sequence: 50
      column-alignment: start
      stretch: Use Report Setting

    accessibility: 
      value-identifies-row: false

    validation: 
      value-required: true
      maximum-length: 100

    list-of-values: 
      type: SQL Query
      sql-query: |
        select * 
          from (select 'Buscar Palavra Chave'd , 'find' from dual
                union
                select 'Considerar Pedido destacado'd , 'find_text_po' from dual
                union
                select 'Item Default'   , 'item_default' from dual
                union
                select 'Buscar pedido antes de considerar item default'   , 'find_po' from dual)
          where :P36_TYPE = 'MT'
        union
        select * 
          from (select 'Buscar Palavra Chave'd , 'find' from dual
                union
                select 'Item Default'   , 'item_default' from dual)
          where :P36_TYPE = 'NA'
          order by 1
          ;
      display-extra-values: true
      display-null-value: true

    cascading-list-of-values: 
      parent-column(s): 
      - P36_TYPE
      items-to-submit: 
      - P36_TYPE
      parent-required: true

    source: 
      type: Database Column
      database-column: TYPE_DSP
      data-type: VARCHAR2
      query-only: false
      primary-key: false

    default: 
      duplicate-copies-existing-value: true

    export-/-printing: 
      include-in-export-/-print: true

    enable-users-to: 
      hide: true

