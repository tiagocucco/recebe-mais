dynamic-actions: 
- # ====== Dynamic Action: Atualizar item de linha escolhida ===
  id: 811831924832561827
  identification: 
    name: Atualizar item de linha escolhida

  execution: 
    sequence: 10
    event-scope: Static
    type: Immediate

  when: 
    event: NATIVE_IG|REGION TYPE|interactivegridselectionchange
    selection-type: Region
    region: Setup de definição Modelos # 811772059959310381

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 811832023451561828
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        var i, i_model, i_type
        model = this.data.model;
        
        for ( i = 0; i < this.data.selectedRecords.length; i++ ) {
            
            i_model = model.getValue( this.data.selectedRecords[i], "MODEL");
            i_type =  model.getValue( this.data.selectedRecords[i], "TYPE");  
            
        }
        apex.item( "P36_MODEL" ).setValue (i_model);
        apex.item( "P36_TYPE" ).setValue (i_type);

    execution: 
      sequence: 10
      event: Atualizar item de linha escolhida # 811831924832561827
      fire-when-event-result-is: True
      fire-on-initialization: false

- # ====== Dynamic Action: Visualização de definicao de escolha 
  id: 811832291324561831
