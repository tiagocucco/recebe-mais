- # ====== Region: Definição de determinante ===================
  id: 810673690716040836
  identification: 
    title: Definição de determinante
    type: Interactive Grid

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select   A.ID
              ,A.PRIORITY
              ,A.TYPE
              ,A.TYPE TYPE_DSP
              ,A.VALUE1
              ,A.ITEM
              ,A.CONTA
              ,A.CREATED_BY
              ,A.CREATION_DATE
              ,A.UPDATED_BY
              ,A.LAST_UPDATE_DATE
              ,A.MODEL
              ,A.SOURCE_DOC
              ,A.FLAG_RETENTION
              ,A.FLAG_NF_OP
              ,A.COMBINACAO_CONTABIL_GER
              ,A.PAYMENTMETHOD
      from    RMAIS_DEFINE_DET_ENTRY A
      where   A.MODEL = :P36_MODEL
      --and     A.TYPE in (case when :P36_TYPE = 'NA' then 'item_default' else type end,case when :P36_TYPE = 'NA' then 'find' else type end)
      and     (:P36_TYPE != 'NA' or (:P36_TYPE = 'NA' and A.TYPE in ('item_default','find')))
      and     A.TYPE != 'PO';
         
    page-items-to-submit: 
    - P36_MODEL
    - P36_TYPE

