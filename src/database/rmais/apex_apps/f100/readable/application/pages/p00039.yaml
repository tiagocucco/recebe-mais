validations: 
- # ====== Validation: Boleto_duplicado ========================
  id: 264761080294140854
  identification: 
    name: Boleto_duplicado

  execution: 
    sequence: 10

  validation: 
    type: Function Body (returning Error Text)
    language: PL/SQL
    pl/sql-function-body-returning-error-text: |
      declare
          bol_exist number;
      begin
          select count(*) into bol_exist 
              from rmais_efd_headers 
              where 
                  :P39_BOLETO_COD is not null and :P39_EFD_HEADER_ID is not null
                  and boleto_cod = nvl(:P39_BOLETO_COD,'0') 
                  and EFD_HEADER_ID != nvl(:P39_EFD_HEADER_ID,'0');
          if bol_exist > 0 then
              return 'Boleto existente.';
          end if;
      end;
    always-execute: false

  error: 
    display-location: Inline with Field and in Notification

  server-side-condition: 
    when-button-pressed: SEND_BOL # 264723848523140829

- # ====== Validation: Boleto_errado ===========================
  id: 264761465957140854
  identification: 
    name: Boleto_errado

  execution: 
    sequence: 20

  validation: 
    type: Function Body (returning Error Text)
    language: PL/SQL
    pl/sql-function-body-returning-error-text: |
      if (:P39_BOLETO_COD is null or length(regexp_replace(nvl(:P39_BOLETO_COD,0),'[^[:digit:]]')) not in (48,47)) then
          return 'Preencha o código de barras do boleto corretamente.'||length(regexp_replace(nvl(:P39_BOLETO_COD,0),'[^[:digit:]]'));
      end if;
    always-execute: false

  error: 
    display-location: Inline with Field
    associated-item: P39_BOLETO_COD # 264724296097140829

  server-side-condition: 
    when-button-pressed: SEND_BOL # 264723848523140829

- # ====== Validation: Vencimento ==============================
  id: 264761818068140854
  identification: 
    name: Vencimento

  execution: 
    sequence: 30

  validation: 
    type: Function Body (returning Error Text)
    language: PL/SQL
    pl/sql-function-body-returning-error-text: |
      if (:P39_FIRST_DUE_DATE is null or to_date(:P39_FIRST_DUE_DATE,'DD/MM/YYYY') < TO_DATE(:P39_ISSUE_DATE,'DD/MM/YYYY')) then
          return 'Verifique se a data de vencimento está preenchida ou se é maior que a data de emissão.';
      end if;
    always-execute: false

  error: 
    display-location: Inline with Field
    associated-item: P39_FIRST_DUE_DATE # 264724646171140829

  server-side-condition: 
    when-button-pressed: SEND_BOL # 264723848523140829

