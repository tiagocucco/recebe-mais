      SELECT 'Submisão ERP' evento,
            '' msg,
            last_update_date DATA
        FROM rmais_efd_headers 
       WHERE efd_header_id = :P39_EFD_HEADER_ID
       AND document_status IN ('T','W','RW')
      UNION
      SELECT evento,
             mensagem,
