- # ====== Dynamic Action: SendNf ==============================
  id: 264766428149140859
  identification: 
    name: SendNf

  execution: 
    sequence: 10
    event-scope: Static
    type: Immediate

  when: 
    event: EVENT.EVENT.BROWSER.CLICK
    selection-type: Button
    button: Submeter # 264598180735140757

  client-side-condition: 
    type: Item = Value
    item: P39_CTRL_ENTRY
    value: Y

  actions: 
  - # ====== Action: Alert =======================================
    id: 264766917286140859
    identification: 
      action: Alert

    settings: 
      message: Fora do período de lançamento. Verifique o setup de Período de entrada de NF`s
      style: Default

    execution: 
      sequence: 10
      event: SendNf # 264766428149140859
      fire-when-event-result-is: False
      fire-on-initialization: false

  - # ====== Action: Disable =====================================
    id: 264767404034140860
    identification: 
      action: Disable

    affected-elements: 
      selection-type: Button
      button: Submeter # 264598180735140757

    execution: 
      sequence: 10
      event: SendNf # 264766428149140859
      fire-when-event-result-is: True
      fire-on-initialization: true

  - # ====== Action: Execute JavaScript Code =====================
    id: 264767960433140860
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        if(apex.item('P39_REMOVE_SOURCE_DOC_NUMBER').getValue() == ''){
            var spinner = apex.util.showSpinner();
        }

    execution: 
      sequence: 30
      event: SendNf # 264766428149140859
      fire-when-event-result-is: True
      fire-on-initialization: false

  - # ====== Action: Execute Server-side Code ====================
    id: 264768425324140861
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        declare
            l_id number;
            l_flag_retention varchar2(1);
            l_flag_nf_op varchar2(1);
        begin
            --
            execute immediate q'[alter session set NLS_NUMERIC_CHARACTERS='.,']';
            --
            if :P39_REMOVE_SOURCE_DOC_NUMBER = 1 then
                :P39_EXEC_CLEAR_SOURCE_DOC_NUMBER := 1;
            elsif xxrmais_util_v2_pkg.get_period_entry = 'Y' then
                --
                update  rmais_efd_headers
                set     PAYMENT_INDICATOR = :P39_PAYMENT_INDICATOR
                where   efd_header_id = :P39_EFD_HEADER_ID;
                --
                commit;
                --
                select  max(A.FLAG_RETENTION),
                        nvl(max(A.FLAG_NF_OP),'Y')
                into    l_flag_retention,
                        l_flag_nf_op
                from    RMAIS_DEFINE_DET_ENTRY A
                where   A.MODEL = :P39_MODEL
                and     A.TYPE = :P39_DEFINE_DET_ENTRY_TYPE;
        
                if l_flag_nf_op = 'Y' or nvl(:P39_FORCE_INVOICE_ERP,0) = 1 then
                    rmais_process_pkg_test.send_invoice_v2(:P39_EFD_HEADER_ID, l_flag_retention);
                else
                    rmais_process_pkg_test.Update_Invoice(:P39_EFD_HEADER_ID);
                end if;
                        /******ENVIANDO SOMENTE AO AP*******/
                       -- if XXRMAIS_UTIL_V2_PKG.get_destination(:P39_EFD_HEADER_ID) = 'EXPENSE' then 
                        --if :P39_MODEL <> '55' then
                            --
                            -- Comentado por Robson em 16/01/2023 rmais_process_pkg_test.Send_Invoice_v2(:P39_EFD_HEADER_ID);
                            --
                        --else
                            --
                            --
                            --
                        --    xxrmais_util_v2_pkg.send_danfe(:P39_EFD_HEADER_ID);
                            --
                        --end if;
                        --
            else
                raise_application_error('-20032','Fora do setup do período de entrada');
            end if;
            --
            execute immediate q'[alter session set NLS_NUMERIC_CHARACTERS='.,']';
                --
        exception when others then
            raise_application_error (-20023,'Erro no ID:'||:P39_EFD_HEADER_ID||sqlerrm);
        
        end;
      items-to-submit: 
      - P39_EFD_HEADER_ID
      - P39_MODEL
      - P39_PAYMENT_INDICATOR
      - P39_DEFINE_DET_ENTRY_TYPE
      - P39_FORCE_INVOICE_ERP
      - P39_REMOVE_SOURCE_DOC_NUMBER
      items-to-return: 
      - P39_EXEC_CLEAR_SOURCE_DOC_NUMBER
      suppress-change-event: false

    execution: 
      sequence: 40
      event: SendNf # 264766428149140859
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Execute JavaScript Code =====================
    id: 264768927511140861
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        if(apex.item('P39_REMOVE_SOURCE_DOC_NUMBER').getValue() == ''){
            $("#apex_wait_overlay").remove();
            $(".u-Processing").remove();
            location.reload();
        }
        

    execution: 
      sequence: 50
      event: SendNf # 264766428149140859
      fire-when-event-result-is: True
      fire-on-initialization: false

