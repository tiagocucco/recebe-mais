- # ====== Process: Boletos ====================================
  id: 264762544310140855
  identification: 
    name: Boletos
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      declare
          l_boleto varchar2(20);
          l_body varchar2(4000);
          l_response clob;
      begin
          if length(:P39_BOLETO_COD) = 47 then
              l_boleto := 'BOLETO_EFT';
          else
              l_boleto := 'CONCESSIONARIA_EFT';
          end if;
          UPDATE rmais_efd_headers SET boleto_cod = :P39_BOLETO_COD,first_due_date = :P39_FIRST_DUE_DATE WHERE efd_header_id = :P39_EFD_HEADER_ID;
          commit;    
          select json_object(
                  'InvoiceNumber' value DOCUMENT_NUMBER,
                  'BusinessUnit' value nvl(BU_NAME, 'HDI Seguros S.A. BU'),
                  'Supplier' value nvl(PARTY_NAME,nvl(nvl( (SELECT MAX(l.order_info.VENDOR_NAME)
                                                                        FROM rmais_efd_lines l
                                                                       WHERE l.efd_header_id = efd_header_id),
                                                                  (SELECT DISTINCT PARTY_NAME 
                                                                      from (SELECT DISTINCT PARTY_NAME , PARTY_ID -- into l_aux
                                                                              FROM json_table(replace(replace(issuer_info,'"DATA":{','"DATA": [{'),'}}}','}}]}'), '$' COLUMNS(NESTED         PATH '$.DATA[*]' COLUMNS(                                                                                           
                                                                                                 PARTY_NAME                VARCHAR2(4000)         PATH '$.PARTY_NAME' ,
                                                                                                 PARTY_ID                  VARCHAR2(4000)         PATH '$.PARTY_ID')))
                                                                                      
                                                                                      order by PARTY_ID desc)
                                                                                      where rownum = 1)
                                          ),     'NAO LOCALIZADO')),
                  'SupplierSite'  value nvl(vendor_site_code,issuer_document_number),
                  'InvoiceAmount' value TOTAL_AMOUNT,
                  'PaymentMethod' value l_boleto
          ) dados into l_body from rmais_efd_headers where efd_header_id = :P39_EFD_HEADER_ID;
          l_response := rmais_process_pkg.Get_response2(RMAIS_PROCESS_PKG.Get_Parameter('url_update_method_pay'),l_body,'POST');
          if json_value(l_response,'$.code') = '200' then
              RMAIS_PROCESS_PKG.send_boleto(:P39_EFD_HEADER_ID);
              
          else
              xxrmais_util_v2_pkg.create_event (:P39_EFD_HEADER_ID,'Boleto','Falha alteração de método de pagamento!','Sistema');
          end if;
      end;

  execution: 
    sequence: 20
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: SEND_BOL # 264723848523140829

