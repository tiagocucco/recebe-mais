- # ====== Dynamic Action: Inserir Linhas ======================
  id: 674963589777684673
  identification: 
    name: Inserir Linhas

  execution: 
    sequence: 20
    event-scope: Static
    type: Immediate

  when: 
    event: EVENT.EVENT.BROWSER.CLICK
    selection-type: Button
    button: Inserir_linha # 674934809363684699

  client-side-condition: 
    type: JavaScript expression
    javascript-expression: |
      $v('P69_DESCRICAO') != '' &&
      $v('P69_QTD') != '' &&
      $v('P69_VALOR_TOTAL_LIN') != '' &&
      $v('P69_VALOR_UNIT') != ''

  actions: 
  - # ====== Action: Set Value ===================================
    id: 674964002032684673
    identification: 
      action: Set Value

    settings: 
      set-type: Static Assignment
      value: 1
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
