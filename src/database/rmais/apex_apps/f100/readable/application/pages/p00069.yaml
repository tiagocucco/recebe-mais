      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

    client-side-condition: 
      type: Item = Value
      item: P69_MODEL
      value: 00

  - # ====== Action: Execute Server-side Code ====================
    id: 674964554314684673
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        BEGIN
          --
          :P69_EFD_HEADER_ID := nvl(:P69_EFD_HEADER_ID,xxrmais_invoices_s.nextval);
          --
         -- execute immediate q'[alter session set NLS_NUMERIC_CHARACTERS='.,']';
          
                  APEX_COLLECTION.ADD_MEMBER(
                      p_collection_name => 'RMAIS_LINHAS',
                      
                        p_n001  => :P69_EFD_HEADER_ID,
                        p_n002  => null,
                        p_c002  => :P69_SERV_CODE,
                        p_n003  => :P69_QTD,
                        p_n004  => :P69_VALOR_UNIT,
                        p_n005  => :P69_VALOR_TOTAL_LIN,
                        p_c003  => :P69_DESCRICAO
                      );
          --
          :P69_TOTAL_AMOUNT := nvl(:P69_TOTAL_AMOUNT,0) + :P69_VALOR_TOTAL_LIN;
        
          select sum(n005) line_amount
            into :P69_TOTAL_AMOUNT 
            from apex_collections 
           where collection_name = 'RMAIS_LINHAS';
          --execute immediate q'[alter session set NLS_NUMERIC_CHARACTERS=',.']';
        --
        exception when others then
          raise_application_error(-20033,'Erro ao buscar Linhas '||sqlerrm);
        END;
      items-to-submit: 
      - P69_EFD_HEADER_ID
      - P69_SERV_CODE
      - P69_VALOR_UNIT
      - P69_QTD
      - P69_VALOR_TOTAL_LIN
      - P69_DESCRICAO
      - P69_TOTAL_AMOUNT
      items-to-return: 
      - P69_TOTAL_AMOUNT
      - P69_EFD_HEADER_ID
      suppress-change-event: false

    execution: 
      sequence: 10
      event: Inserir Linhas # 674963589777684673
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

