- # ====== Dynamic Action: Tomador_dados =======================
  id: 674960698518684675
  identification: 
    name: Tomador_dados

  execution: 
    sequence: 10
    event-scope: Static
    type: Immediate

  when: 
    event: EVENT.EVENT.BROWSER.CHANGE
    selection-type: Item(s)
    item(s): 
    - P69_RECEIVER_DOCUMENT_NUMBER

  client-side-condition: 
    type: Item is not null
    item: P69_RECEIVER_DOCUMENT_NUMBER

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 674961185417684675
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: var spinner = apex.util.showSpinner();

    execution: 
      sequence: 10
      event: Tomador_dados # 674960698518684675
      fire-when-event-result-is: True
      fire-on-initialization: false

  - # ====== Action: Set Value ===================================
    id: 674961696085684674
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: |
        SELECT sys.htf.escape_sc( to_char((initcap(nome)))) nome , 
               endereco , 
               numero , 
               compl , 
               bairro , 
               cidade , 
               estado , 
               replace(cep, '-', '') cep
          FROM RMAIS_ORGANIZATIONS 
          where cnpj = to_char(:P69_RECEIVER_DOCUMENT_NUMBER)
          
      items-to-submit: 
      - P69_RECEIVER_DOCUMENT_NUMBER
      escape-special-characters: false
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P69_RECEIVER_NAME
      - P69_RECEIVER_ADDRESS
      - P69_RECEIVER_ADDRESS_NUMBER
      - P69_RECEIVER_ADDRESS_COMPLEMENT
      - P69_RECEIVER_ADDRESS_CITY_CODE
      - P69_RECEIVER_ADDRESS_CITY_NAME
      - P69_RECEIVER_ADDRESS_STATE
      - P69_RECEIVER_ADDRESS_ZIP_CODE

    execution: 
      sequence: 30
      event: Tomador_dados # 674960698518684675
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Execute Server-side Code ====================
    id: 674962183829684674
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        DECLARE
         l_url VARCHAR2(500) := '/api/report/tomador/getTomador/'||:P69_RECEIVER_DOCUMENT_NUMBER;
         l_reponse VARCHAR2(4000);
        BEGIN
          --
          l_reponse := rmais_process_pkg.Get_Response(l_url);
          :P69_BU_NAME := json_value(l_reponse,'$.DATA.BU_NAME');
          --
        exception when others then
          null;            
        END;
      items-to-submit: 
      - P69_RECEIVER_DOCUMENT_NUMBER
      items-to-return: 
      - P69_BU_NAME
      suppress-change-event: false

    execution: 
      sequence: 40
      event: Tomador_dados # 674960698518684675
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Show ========================================
    id: 674962683489684674
    identification: 
      action: Show

    affected-elements: 
      selection-type: JavaScript Expression
      javascript-expression: |2
         apex.item( "P69_RECEIVER_ADDRESS_ZIP_CODE" ).setValue( 
           apex.item( "P69_RECEIVER_ADDRESS_ZIP_CODE" ).getValue().trim().replaceAll(/\D/g, '')
         , null, true );

    execution: 
      sequence: 50
      event: Tomador_dados # 674960698518684675
      fire-when-event-result-is: True
      fire-on-initialization: true

