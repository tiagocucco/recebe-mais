- # ====== Process: Collection_linhas ==========================
  id: 674951447545684681
  identification: 
    name: Collection_linhas
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      BEGIN
        execute immediate q'[alter session set NLS_NUMERIC_CHARACTERS='.,']';
        begin
        --
        :P69_QTD := 1;
        --
        IF APEX_COLLECTION.COLLECTION_EXISTS (p_collection_name => 'RMAIS_LINHAS') THEN
              APEX_COLLECTION.DELETE_COLLECTION(p_collection_name => 'RMAIS_LINHAS');
              APEX_COLLECTION.CREATE_COLLECTION(p_collection_name => 'RMAIS_LINHAS');
        ELSE
          APEX_COLLECTION.CREATE_COLLECTION(p_collection_name => 'RMAIS_LINHAS');
        END IF;
        
      End;
          for x in (SELECT efd_header_id,
                           efd_line_id,
                           line_number,
                           fiscal_classification,
                           line_quantity,
                           unit_price,
                           line_amount,
                           item_description
      FROM rmais_efd_lines
       where efd_header_id = :P69_EFD_HEADER_ID
       order by  line_number asc)
        loop
                APEX_COLLECTION.ADD_MEMBER(
                    p_collection_name => 'RMAIS_LINHAS',
                    p_n001            => x.efd_header_id,
                    p_n002            => x.efd_line_id,
                    p_c001            => x.line_number,
                    p_c002            => x.fiscal_classification,
                    p_n003            => x.line_quantity,
                    p_n004            => x.unit_price,
                    p_n005            => x.line_amount,
                    p_c003            => x.item_description
                    );
      
        end loop;
        --
        execute immediate q'[alter session set NLS_NUMERIC_CHARACTERS=',.']';
      --
      exception when others then
        raise_application_error(-20033,'Erro ao buscar PO');
      END;

  execution: 
    sequence: 10
    point: Before Header
    run-process: Once Per Page Visit (default)

- # ====== Process: Insert_lines ===============================
  id: 674951829840684681
  identification: 
    name: Insert_lines
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      begin
       --:P69_EFD_HEADER_ID := nvl(:P69_EFD_HEADER_ID,xxrmais_invoices_s.nextval);
      --
      delete rmais_efd_lines where efd_header_id = :P69_EFD_HEADER_ID;
      --
      for regl in (select n001 efd_header_id,
                      n002 efd_line_id,
                      seq_id line_number,
                      c002 fiscal_classification,
                      n003 line_quantity,
                      n004 unit_price,
                      n005 line_amount,
                      c003 item_description
                  from apex_collections 
                  where collection_name = 'RMAIS_LINHAS'
                  order by seq_id asc)
          loop
              INSERT INTO rmais_efd_lines
              (efd_header_id , efd_line_id,creation_date,created_by,last_update_date,last_updated_by,line_number , fiscal_classification , line_quantity , unit_price ,line_amount , item_description )
              VALUES (:P69_EFD_HEADER_ID,rmais_efd_lines_s.nextval,SYSDATE,-1,SYSDATE,-1,regl.line_number,regl.fiscal_classification,regl.line_quantity , regl.unit_price , regl.line_amount , regl.item_description);
          end loop;
      end;

  execution: 
    sequence: 100
    point: After Submit
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

