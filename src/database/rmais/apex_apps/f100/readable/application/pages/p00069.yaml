- # ====== Dynamic Action: Calc_Valor_Liq ======================
  id: 674978465051684667
  identification: 
    name: Calc_Valor_Liq

  execution: 
    sequence: 130
    event-scope: Static
    type: Immediate

  when: 
    event: EVENT.EVENT.BROWSER.CHANGE
    selection-type: Item(s)
    item(s): 
    - P69_TOTAL_AMOUNT
    - P69_PIS_AMOUNT
    - P69_COFINS_AMOUNT
    - P69_INSS_BASE
    - P69_INSS_TAX
    - P69_INSS_AMOUNT
    - P69_IR_BASE
    - P69_IR_AMOUNT
    - P69_ISS_BASE
    - P69_ISS_TAX
    - P69_CSLL_AMOUNT
    - P69_OTHER_EXPENSES_AMOUNT
    - P69_DISCOUNT_AMOUNT

  actions: 
  - # ====== Action: Set Value ===================================
    id: 674978974417684666
    identification: 
      action: Set Value

    settings: 
      set-type: PL/SQL Function Body
      pl/sql-function-body: |
        DECLARE
          l NUMBER(15,2);
        BEGIN
        
          l := ( nvl(:P69_TOTAL_AMOUNT, 0) - (nvl(:P69_PIS_AMOUNT, 0) + nvl(:P69_COFINS_AMOUNT, 0) + nvl(:P69_INSS_TAX, 0) + nvl(:P69_INSS_AMOUNT, 0) + nvl(:P69_IR_AMOUNT, 0) + nvl(:P69_ISS_TAX, 0) + nvl(:P69_CSLL_AMOUNT, 0) + nvl(:P69_OTHER_EXPENSES_AMOUNT, 0) + nvl(:P69_DISCOUNT_AMOUNT, 0) ) );
        
          if ( nvl(:P69_TOTAL_AMOUNT, 0) < 1 )
          THEN
            l := 0;
          END IF;
        
          RETURN l;
        
        END;
      items-to-submit: 
      - P69_TOTAL_AMOUNT
      - P69_PIS_AMOUNT
      - P69_COFINS_AMOUNT
      - P69_INSS_TAX
      - P69_INSS_AMOUNT
      - P69_IR_AMOUNT
      - P69_ISS_TAX
      - P69_CSLL_AMOUNT
      - P69_OTHER_EXPENSES_AMOUNT
      - P69_DISCOUNT_AMOUNT
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P69_VAL_LIQ

    execution: 
      sequence: 10
      event: Calc_Valor_Liq # 674978465051684667
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

- # ====== Dynamic Action: refresh linhas ======================
  id: 674979335860684666
  identification: 
    name: refresh linhas

  execution: 
    sequence: 140
    event-scope: Static
    type: Immediate

  when: 
    event: EVENT.EVENT.FAMEWORK.APEXAFTERCLOSEDIALOG
    selection-type: Region
    region: Forms_Nfs_Manuais # 2472829492287824672

  actions: 
  - # ====== Action: Execute Server-side Code ====================
    id: 674979845997684666
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        BEGIN
          --
          --execute immediate q'[alter session set NLS_NUMERIC_CHARACTERS='.,']';
          --
          :P69_EFD_HEADER_ID := nvl(:P69_EFD_HEADER_ID,xxrmais_invoices_s.nextval);
          --
          for x in (SELECT descricao,
                             quantidade,
                             unit 
                      FROM rmais_lines_tmp)
          loop
                  APEX_COLLECTION.ADD_MEMBER(
                      p_collection_name => 'RMAIS_LINHAS',
                      p_n001            => :P69_EFD_HEADER_ID,
                      p_n002            => null,
                      p_c001            => null,
                      p_c002            => null,
                      p_n003            => x.quantidade,
                      p_n004            => x.unit,
                      p_n005            => x.unit * x.quantidade,
                      p_c003            => x.descricao
                      );
          :P69_TOTAL_AMOUNT := trunc(nvl(:P69_TOTAL_AMOUNT,0) + x.unit * x.quantidade,2);
          end loop;
          --
          delete rmais_lines_tmp;
          --
          --execute immediate q'[alter session set NLS_NUMERIC_CHARACTERS=',.']';
          --
        exception when others then
          raise_application_error(-20033,'Erro ao buscar PO');
        END;
      items-to-submit: 
      - P69_EFD_HEADER_ID
      items-to-return: 
      - P69_EFD_HEADER_ID
      - P69_TOTAL_AMOUNT
      suppress-change-event: false

    execution: 
      sequence: 10
      event: refresh linhas # 674979335860684666
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Refresh =====================================
    id: 674980320838684665
    identification: 
      action: Refresh

    affected-elements: 
      selection-type: Region
      region: Linhas # 2474751279477253870

    execution: 
      sequence: 20
      event: refresh linhas # 674979335860684666
      fire-when-event-result-is: True
      fire-on-initialization: false

