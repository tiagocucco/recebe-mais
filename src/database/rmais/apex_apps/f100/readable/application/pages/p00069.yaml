- # ====== Validation: Boleto_duplicado ========================
  id: 674947127632684683
  identification: 
    name: Boleto_duplicado

  execution: 
    sequence: 110

  validation: 
    type: Function Body (returning Error Text)
    language: PL/SQL
    pl/sql-function-body-returning-error-text: |
      declare
          bol_exist number;
      begin
          select count(*) into bol_exist 
              from rmais_efd_headers 
              where 
                  :p69_BOLETO_COD is not null and :p69_EFD_HEADER_ID is not null
                  and boleto_cod = nvl(:p69_BOLETO_COD,0)
                  and EFD_HEADER_ID != nvl(:p69_EFD_HEADER_ID,'0');
          if bol_exist > 0 then
              return 'Boleto existente.';
          end if;
      end;
    always-execute: true

  error: 
    display-location: Inline with Field and in Notification
    associated-item: P69_BOLETO_COD # 674905397648684715

  server-side-condition: 
    type: Function Body
    language: PL/SQL
    pl/sql-function-body: "return :request in ('SAVE','CREATE') and :P69_MODEL in ('06','21','22','28','29');"

