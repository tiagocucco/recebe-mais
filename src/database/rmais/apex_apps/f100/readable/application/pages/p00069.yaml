- # ====== Dynamic Action: aviso_prefeitura ====================
  id: 674952630130684680
  identification: 
    name: aviso_prefeitura

  execution: 
    sequence: 160
    event-scope: Static
    type: Immediate

  when: 
    event: EVENT.EVENT.BROWSER.CHANGE
    selection-type: Item(s)
    item(s): 
    - P69_ISSUER_ADDRESS_CITY_NAME

  client-side-condition: 
    type: JavaScript expression
    javascript-expression: (apex.item('P69_ISSUER_NAME').getValue().toUpperCase()).includes("PREFEITURA")//PREFEITURA

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 674953125696684679
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        var result = confirm("Esse CNPJ refere-se a uma Prefeitura. Deseja continuar?");
        if (!result){
            apex.item('P69_ISSUER_DOCUMENT_NUMBER').setValue()    
        }
        

    execution: 
      sequence: 10
      event: aviso_prefeitura # 674952630130684680
      fire-when-event-result-is: True
      fire-on-initialization: false

