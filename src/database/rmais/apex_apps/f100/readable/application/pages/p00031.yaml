    - # ====== Series: Series 1 ====================================
      id: 588605198407276606
      identification: 
        name: Series 1

      execution: 
        sequence: 10

      source: 
        location: Local Database
        type: SQL Query
        sql-query: |
          select  case when C.LN = 1 then 'Canc. após Integração' else 'Cancelada' end "Status",
                  sum(case 
                      when C.LN = 1 and B.DOCUMENT_STATUS in('T','UP') then 1 
                      when C.LN = 2 and B.DOCUMENT_STATUS not in('T','UP') then 1 
                      else 0
                  end) "Total"
          from    RMAIS_BLACK_LIST_CANCEL A,
                  RMAIS_EFD_HEADERS B,
                  (select level LN from dual connect by level <= 2) C
          where   A.ACCESS_KEY_NUMBER = B.ACCESS_KEY_NUMBER
          and     poc is null
          and     trunc(A.CREATION_DATE) >= nvl(to_date(:P31_DE,'DD/MM/YYYY'),trunc(A.CREATION_DATE))
          group by C.LN
          order by 2 desc
        page-items-to-submit: 
        - P31_DE
