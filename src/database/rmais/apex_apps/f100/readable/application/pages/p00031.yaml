- # ====== Region: Integrações Erp =============================
  id: 1796022944532562997
  identification: 
    title: Integrações Erp
    type: Chart

  layout: 
    sequence: 100
    parent-region: Dashboards # 1796022325019562991
    position: SUB_REGIONS
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Standard # 1778894801344770340
    template-options: 
    - '#DEFAULT#'
    - t-Region--scrollBody
    render-components: Above Content

  advanced: 
    region-display-selector: false
    exclude-title-from-translation: false

  security: 
    escape-special-characters: false

  server-cache: 
    caching: Disabled

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    id: 1796023055729562998
    chart: 
      type: Area

    appearance: 
      orientation: Vertical
      stack: false

    data-cursor: 
      cursor: Automatic
      behavior: Automatic
      dim-on-hover: true

    multi-series-chart-data: 
      fill-gaps-in-chart-data: true
      sort-order: Label - Ascending
      render-gap-as-zero: true

    settings: 
      time-axis-type: Automatic
      zoom-and-scroll: Live Scroll Only
      initial-zooming: None

    overview: 
      show: true

    animation: 
      on-display: Automatic
      on-data-change: Automatic

    tooltip: 
      show: true
      show-series-name: false
      show-group-name: true
      show-value: true

    legend: 
      show: false

    series: 
    - # ====== Series: Series 1 ====================================
      id: 1796023150152562999
      identification: 
        name: Series 1

      execution: 
        sequence: 10

      source: 
        location: Local Database
        type: SQL Query
        sql-query: |
          with
              TP_CALEND as (
                  select  to_char(to_date(nvl(:P31_DE,sysdate-360),'DD/MM/YYYY') + level - 1,'DD/MM/YY') DATA_CHAR,
                          to_date(nvl(:P31_DE,sysdate-360),'DD/MM/YYYY') + level - 1 DATA
                  from    dual connect by level <= to_date(nvl(:P31_ATE,sysdate),'DD/MM/YYYY') - to_date(nvl(:P31_DE,sysdate-360),'DD/MM/YYYY') +1
              ),
              TP_EFD as (
                  select  A.LAST_UPDATE_DATE,
                          A.DOCUMENT_STATUS,
                          POC
                  from    RMAIS_EFD_HEADERS A
                  where   upper(A.RECEIVER_NAME) like upper('%'||nvl(:P31_TOMADORES,A.RECEIVER_NAME)||'%')
                  and     upper(A.ISSUER_NAME) like upper('%'||nvl(:P31_FORNECEDORES,A.ISSUER_NAME)||'%')
              )
          select  B.DATA_CHAR "Integração",
                  sum(case when A.DOCUMENT_STATUS in('T','UP') then 1 else 0 end) "Total"
          from    TP_EFD A,
                  TP_CALEND B
          where   poc is null
          and     B.DATA = nvl(trunc(A.LAST_UPDATE_DATE (+)),B.DATA)
          and     trunc(B.DATA) between nvl(to_date(:P31_DE,'DD/MM/YYYY'),trunc(B.DATA))
                                                and nvl(to_date(:P31_ATE,'DD/MM/YYYY'),trunc(B.DATA))
          group by
                  B.DATA_CHAR
          order by 
                  to_date(B.DATA_CHAR,'DD/MM/YYYY') asc
          
        page-items-to-submit: 
        - P31_DE
        - P31_ATE
        - P31_TOMADORES
        - P31_FORNECEDORES

      column-mapping: 
        label: Integração
        value: Total
        custom-column: Integração

      appearance: 
        color: '#7d9ec3'
        assigned-to-y2-axis: false

      line: 
        type: Curved

      marker: 
        show: Automatic
        shape: Automatic

      label: 
        show: false

      performance: 
        maximum-rows-to-process: 100

    axes: 
    - # ====== Axis: x =============================================
      id: 1796023264878563000
      identification: 
        name: x
        show-axis: true

      title: 
        font-family: Impact
        font-color: '#c84545'

      value: 
        format: Decimal
        decimal-places: 0
