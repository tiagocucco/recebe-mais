  server-cache: 
    caching: Disabled

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    id: 536413981083973703
    chart: 
      type: Pie

    data-cursor: 
      cursor: Automatic
      behavior: Automatic
      dim-on-hover: true

    settings: 
      pie-selection-effect: Highlight

    value: 
      pie-chart-other-threshold: 0
      format-scaling: Automatic

    animation: 
      on-display: Automatic
      on-data-change: Automatic

    tooltip: 
      show: true
      show-series-name: true
      show-value: true

    legend: 
      show: true
      position: Automatic
      hide-and-show-behavior: Rescale

    series: 
    - # ====== Series: Series 1 ====================================
      id: 536414101168973704
      identification: 
        name: Series 1

      execution: 
        sequence: 10

      source: 
        location: Local Database
        type: SQL Query
        sql-query: |
          select  C.NCM "Ncm",
                  C.TOTAL "Total"
          from    (
                      select  case when b.model = '00' then 
                                substr(lpad(replace(A.FISCAL_CLASSIFICATION,'.'),4,0),1,2)||'.'||substr(lpad(replace(A.FISCAL_CLASSIFICATION,'.'),4,0),3,2)
                              else
                                A.FISCAL_CLASSIFICATION
                              end NCM,
                              count(*) TOTAL
                      from    RMAIS_EFD_LINES A,
                              RMAIS_EFD_HEADERS B
                      where   A.EFD_HEADER_ID = B.EFD_HEADER_ID
                      and     poc is null
                      and     B.MODEL = :P31_FLAG_ITEM_FISCAL
                      group by
                              A.FISCAL_CLASSIFICATION,
                              b.model
                      order by 2 desc
                  ) C
          where rownum <= 10
        page-items-to-submit: 
        - P31_DE
        - P31_ATE
        - P31_TOMADORES
        - P31_FORNECEDORES
        - P31_FLAG_ITEM_FISCAL

      column-mapping: 
        label: Ncm
        value: Total

      label: 
        show: true
        position: Automatic
        display-as: Label - Value

      performance: 
        maximum-rows-to-process: 20

