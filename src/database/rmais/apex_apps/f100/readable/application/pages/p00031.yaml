    series: 
    - # ====== Series: Series 1 ====================================
      id: 536414341757973707
      identification: 
        name: Series 1

      execution: 
        sequence: 10

      source: 
        location: Local Database
        type: SQL Query
        sql-query: |
          select  A.TOTAL_AMOUNT "Total",
                  A.FORNEC "Fornecedor"
          from    (
                      select  --to_char(A.TOTAL_AMOUNT,'FML999G999G999G999G990D00') TOTAL_AMOUNT,
                              A.TOTAL_AMOUNT,
                              replace(initcap(utl_raw.cast_to_varchar2(NLSSORT(A.ISSUER_NAME, 'nls_sort=binary_ai'))),chr(0),'') FORNEC
                      from    RMAIS_EFD_HEADERS A
                      where   poc is null
                      and     trunc(A.ISSUE_DATE) between nvl(to_date(:P31_DE,'DD/MM/YYYY'),trunc(A.ISSUE_DATE))
                                                      and nvl(to_date(:P31_ATE,'DD/MM/YYYY'),trunc(A.ISSUE_DATE))
                      and     upper(A.RECEIVER_NAME) like upper('%'||nvl(:P31_TOMADORES,A.RECEIVER_NAME)||'%')
                      and     upper(A.ISSUER_NAME) like upper('%'||nvl(:P31_FORNECEDORES,A.ISSUER_NAME)||'%')
                      and     A.TOTAL_AMOUNT is not null
                      order by A.TOTAL_AMOUNT desc
                  ) A
          where   rownum <= 10
          order by 1 desc
        page-items-to-submit: 
        - P31_DE
        - P31_ATE
        - P31_TOMADORES
        - P31_FORNECEDORES

      column-mapping: 
        label: Fornecedor
