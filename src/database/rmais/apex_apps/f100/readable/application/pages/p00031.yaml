    - # ====== Series: Series 1 ====================================
      id: 1795534380043124776
      identification: 
        name: Series 1

      execution: 
        sequence: 10

      source: 
        location: Local Database
        type: SQL Query
        sql-query: |
          select  distinct
                  (
                      (count(*) over (partition by B.CNPJ,initcap(B.NOME))) / 
                      (count(*) over ())
                  ) * 100 "Total", 
                  B.CNPJ||' - '|| initcap(B.NOME) "Tomador"
          from    RMAIS_EFD_HEADERS A,
                  RMAIS_ORGANIZATIONS B
          where   poc is null
          and     B.CNPJ = A.RECEIVER_DOCUMENT_NUMBER
          and     trunc(A.ISSUE_DATE) between nvl(to_date(:P31_DE,'DD/MM/YYYY'),trunc(A.ISSUE_DATE))
                                          and nvl(to_date(:P31_ATE,'DD/MM/YYYY'),trunc(A.ISSUE_DATE))
          and     upper(A.RECEIVER_NAME) like upper('%'||nvl(:P31_TOMADORES,A.RECEIVER_NAME)||'%')
          and     upper(A.ISSUER_NAME) like upper('%'||nvl(:P31_FORNECEDORES,A.ISSUER_NAME)||'%')
          order by 1 desc
        page-items-to-submit: 
        - P31_DE
