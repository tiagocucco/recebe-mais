- # ====== Dynamic Action: click_Exportar ======================
  id: 588601048879276565
  identification: 
    name: click_Exportar

  execution: 
    sequence: 20
    event-scope: Static
    type: Immediate

  when: 
    event: EVENT.EVENT.BROWSER.CLICK
    selection-type: Button
    button: Exportar # 1787039934922389232

  actions: 
  - # ====== Action: APEX Client-Side PDF ========================
    id: 335975645026165548
    identification: 
      action: APEX Client-Side PDF

    settings: 
      format: A4
      orientation: Portrait
      margin-left: 50
      margin-top: 50
      margin-right: 50
      martin-bottom: 50
      pdf-body-jquery-selector: .pdf-Body
      pdf-header-jquery-selector: .pdf-Header
      pdf-footer-jquery-selector: .pdf-Footer
      pdf-page-info-selector: .pdf-PageInfoContainer
      canvas-scale: 2
      image-quality: 0.95
      output-format: Download
      filename: filename.pdf

    execution: 
      sequence: 20
      event: click_Exportar # 588601048879276565
      fire-when-event-result-is: True
      fire-on-initialization: false

    client-side-condition: 
      type: JavaScript expression
      javascript-expression: 1==2

  - # ====== Action: Execute JavaScript Code =====================
    id: 588603873865276593
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        const x = window.screen.width;
        switch (true){
            case x >= 800 && x < 1024:
                document.body.style.zoom = "70%";
                break;
            case x >= 1024 && x < 1120:
                document.body.style.zoom = "75%";
                break;
            case x >= 1120 && x < 1152:
                document.body.style.zoom = "80%";
                break;
            case x >= 1152 && x < 1280:
                document.body.style.zoom = "83%";
                break;
            case x >= 1280 && x < 1344:
                document.body.style.zoom = "94%";
                break;
            case x >= 1344 && x < 1366:
                document.body.style.zoom = "97%";
                break;
            case x >= 1366 && x < 1360:
                document.body.style.zoom = "98%";
                break;
            case x >= 1360 && x < 1440:
                document.body.style.zoom = "98%";
                break;
            case x >= 1440 && x < 1536:
                document.body.style.zoom = "104%";
                break;
            case x >= 1536 && x < 1600:
                document.body.style.zoom = "111%";
                break;  
            case x >= 1536 && x < 1600:
                document.body.style.zoom = "111%";
                break; 
            case x < 1600:
                document.body.style.zoom = "116%";
                break;    
            default:
                document.body.style.zoom = "150%";
        }
        
        if (!nIntervId) {
            nIntervId = setInterval(AtivaTimer, 500);
        }
        
        

    execution: 
      sequence: 10
      event: click_Exportar # 588601048879276565
      fire-when-event-result-is: True
      fire-on-initialization: false

