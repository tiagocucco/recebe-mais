    - # ====== Series: Series 1 ====================================
      id: 536413735704973701
      identification: 
        name: Series 1

      execution: 
        sequence: 10

      source: 
        location: Local Database
        type: SQL Query
        sql-query: |
          select  count(*) "Total",
                  replace(initcap(utl_raw.cast_to_varchar2(NLSSORT(A.ISSUER_ADDRESS_CITY_NAME, 'nls_sort=binary_ai'))),chr(0),'') "Prefeitura"
          from    RMAIS_EFD_HEADERS A
          where   poc is null
          and     trunc(A.ISSUE_DATE) between nvl(to_date(:P31_DE,'DD/MM/YYYY'),trunc(A.ISSUE_DATE))
                                          and nvl(to_date(:P31_ATE,'DD/MM/YYYY'),trunc(A.ISSUE_DATE))
          and     upper(A.RECEIVER_NAME) like upper('%'||nvl(:P31_TOMADORES,A.RECEIVER_NAME)||'%')
          and     upper(A.ISSUER_NAME) like upper('%'||nvl(:P31_FORNECEDORES,A.ISSUER_NAME)||'%')
          group by
                  replace(initcap(utl_raw.cast_to_varchar2(NLSSORT(A.ISSUER_ADDRESS_CITY_NAME, 'nls_sort=binary_ai'))),chr(0),'')
          order by 1 desc
