      hide-and-show-behavior: Rescale

    series: 
    - # ====== Series: Series 1 ====================================
      id: 335974370579165535
      identification: 
        name: Series 1

      execution: 
        sequence: 10

      source: 
        location: Local Database
        type: SQL Query
        sql-query: |
          select  count(*) "Total",
                  nvl(B.DESC_STATUS_DOCS,'Não definido') "Status"
          from    RMAIS_EFD_HEADERS A,
                  RMAIS_STATUS_DOCS B
          where   A.DOCUMENT_STATUS = B.FLAG_STATUS_DOCS (+)
          and     poc is null
          and     trunc(A.ISSUE_DATE) between nvl(to_date(:P31_DE,'DD/MM/YYYY'),trunc(A.ISSUE_DATE))
                                          and nvl(to_date(:P31_ATE,'DD/MM/YYYY'),trunc(A.ISSUE_DATE))
          and     upper(A.RECEIVER_NAME) like upper('%'||nvl(:P31_TOMADORES,A.RECEIVER_NAME)||'%')
          and     upper(A.ISSUER_NAME) like upper('%'||nvl(:P31_FORNECEDORES,A.ISSUER_NAME)||'%')
          group by
                  B.DESC_STATUS_DOCS
          order by 1 desc
        page-items-to-submit: 
        - P31_DE
        - P31_ATE
        - P31_TOMADORES
        - P31_FORNECEDORES

      column-mapping: 
        label: Status
        value: Total

      label: 
        show: true
        position: Automatic
        display-as: Label - Percentage ( Value )

      performance: 
        maximum-rows-to-process: 20

