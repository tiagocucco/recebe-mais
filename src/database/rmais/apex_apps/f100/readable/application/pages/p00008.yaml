    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        begin
            select  c001,
                    n001,
                    replace(to_char(n004),'.',','),
                    n005,
                    c009,
                    c006,
                    c007,
                    c008,
                    c012,
