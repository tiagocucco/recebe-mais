  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 1879894813984414053
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        var i, i_item , i_descr , i_uom , i_catalog_code , i_ncm , i_inv , i_uom_desc
        model = this.data.model;
        
        for ( i = 0; i < this.data.selectedRecords.length; i++ ) {
            
            i_item = model.getValue( this.data.selectedRecords[i], "ITEM_NUMBER");
            i_descr = model.getValue( this.data.selectedRecords[i], "DESCRIPTION");
            i_uom = model.getValue( this.data.selectedRecords[i], "UNIT_OF_MEASURE");
            i_catalog_code = model.getValue( this.data.selectedRecords[i], "CATALOG_CODE");
            i_ncm = model.getValue( this.data.selectedRecords[i], "NCM");
            i_inv = model.getValue( this.data.selectedRecords[i], "INVENTORY_ITEM_FLAG");
            i_uom_desc = model.getValue( this.data.selectedRecords[i], "UOM_DESC");
        }
        
        apex.item( "P8_ITEM_ERP" ).setValue (i_item);
        apex.item( "P8_ITEM_DESCR_ERP" ).setValue (i_descr);
        apex.item( "P8_UOM_ERP" ).setValue (i_uom);
        apex.item( "P8_CATALOG_CODE_NCM_ERP" ).setValue (i_catalog_code);
        apex.item( "P8_NCM_ERP" ).setValue (i_ncm);
        apex.item( "P8_INVENTORY_ITEM_FLAG" ).setValue (i_inv);
        apex.item( "P8_UOM_DESC" ).setValue (i_uom_desc);

    execution: 
      sequence: 10
      event: atribiicao_item # 1879894875598414054
