- # ====== Dynamic Action: change_P8_CTRL_A_4 ==================
  id: 344928364838656718
  identification: 
    name: change_P8_CTRL_A_4

  execution: 
    sequence: 360
    event-scope: Static
    type: Immediate

  when: 
    event: EVENT.EVENT.BROWSER.CHANGE
    selection-type: Item(s)
    item(s): 
    - P8_CTRL_A

  client-side-condition: 
    type: Item = Value
    item: P8_CTRL_A
    value: 4

  actions: 
  - # ====== Action: Execute Server-side Code ====================
    id: 344928498227656720
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        declare
            l_row rmais_efd_lines%rowtype;
        begin        
            select  * 
            into    l_row
            from    rmais_efd_lines 
            where   efd_line_id = :P8_LINE_ID;
        
            update  rmais_efd_lines
            set     source_document_type     = 'NA',
                    status                   = 'MANUAL',
                    source_doc_number        = '',
                    source_doc_line_id       = '',
                    source_doc_id            = '',
                    line_location_id         = '',
                    order_info               = '',
                    item_code_efd            = nvl(:P8_ITEM_ERP,:P8_ITEM_OK),
                    item_descr_efd           = nvl(:P8_ITEM_DESCR_ERP,:P8_ITEM_DESC_OK),
                    item_info                = '',
                    uom_to                   = nvl(nvl(:P8_UOM_ERP,uom_to),uom_to),
                    uom_to_desc              = nvl(:P8_UOM_DESC,uom_to_desc),
                    source_doc_line_num      = '',
                    DESTINATION_TYPE         = decode(:P8_SOURCE2,'FDC','INVENTORY','AP','EXPENSE',:P8_SOURCE2),
                    fiscal_classification_to = nvl(:P8_NCM_ERP,fiscal_classification_to),
                    catalog_code_ncm         = nvl(:P8_CATALOG_CODE_NCM_ERP,catalog_code_ncm),
                    ITEM_TYPE                = nvl(:P8_ITEM_TYPE,ITEM_TYPE),
                    receipt_num              = :P8_RECEIPT_NUM,      
                    receipt_line_num         = :P8_RECEIPT_LINE_NUM
            where   efd_line_id = :P8_LINE_ID;
        
            update  rmais_efd_headers 
            set     document_type   = 'NA',
                    document_status = 'I',
                    define_det_entry_type = nvl((select max(A.TYPE) from RMAIS_DEFINE_DET_ENTRY A where A.ITEM = :P8_ITEM_OK),define_det_entry_type)
            where   efd_header_id = :P8_EFD_HEADER_ID;
            --
            update  rmais_efd_lines
            set     source_document_type    = 'NA',
                    status                  = 'MANUAL'
            where   efd_header_id = :P8_EFD_HEADER_ID;
            --
            if nvl(:P8_REPLICAR_ITEM_ALL,'N') = 'Y' then  
                --
                update  rmais_efd_lines
                set     source_document_type = 'NA',
                        status            = 'MANUAL',
                        source_doc_number   = '',
                        source_doc_line_id  = '',
                        source_doc_id       = '',
                        line_location_id    = '',
                        order_info          = '',
                        item_code_efd       = nvl(:P8_ITEM_ERP,:P8_ITEM_OK),
                        item_descr_efd      = nvl(:P8_ITEM_DESCR_ERP,:P8_ITEM_DESC_OK),
                        item_info           = '',
                        uom_to              = nvl(nvl(:P8_UOM_ERP,uom_to),l_row.uom_to),
                        uom_to_desc         = nvl(:P8_UOM_DESC,uom_to_desc),
                        source_doc_line_num = '',
                        DESTINATION_TYPE    = decode(:P8_SOURCE2,'FDC','INVENTORY','AP','EXPENSE',:P8_SOURCE2),
                        fiscal_classification_to = nvl(:P8_NCM_ERP,:P8_NCM),
                        catalog_code_ncm    = nvl(:P8_CATALOG_CODE_NCM_ERP,catalog_code_ncm),
                        ITEM_TYPE           = nvl(:P8_ITEM_TYPE,ITEM_TYPE)
                where   efd_header_id = :P8_EFD_HEADER_ID;
            end if;
        
        exception when others then
            raise_application_error (-20011,'Erro ao inserir PO: '||sqlerrm);
        end;
      items-to-submit: 
      - P8_PO
      - P8_LINE_LOCATION_ID
      - P8_PO_LINE_ID
      - P8_INPSOURCE__NUMBERFO
      - null
      - P8_DESCR
      - P8_INFO_ITEM
      - P8_INFO_SHIP
      - P8_TERM_INFO
      - P8_PO_HEADER_ID
      - P8_SOURCE_DOC_LINE_NUM
      - P8_TYPE_LIN
      - P8_MODEL
      - P8_DESTINATION_TYPE
      - P8_UNIT_PRICE_PO
      - P8_NCM
      - P8_REPLICA_PO
      - P8_CFOP_IN
      - P8_REPLICAR_CFOPS
      - P8_CFOP_OUT
      - P8_UOM_DESC
      - P8_UOM_DESC_PO
      - P8_RECEIPT_NUM
      - P8_RECEIPT_LINE_NUM
      - P8_ITEM_NUMBER
      - P8_ITEM_OK

    execution: 
      sequence: 30
      event: change_P8_CTRL_A_4 # 344928364838656718
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
