  id: 1635315671718485910
  identification: 
    title: Pedido Linha
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select source_doc_number ,
            source_doc_line_num, 
        --  source_doc_line_id ,
          --source_doc_id      ,
          --line_location_id    = :P8_LINE_LOCATION_ID,
          --order_info          = :P8_INFO,
          item_code_efd       ,
          item_descr_efd      ,
          --item_info           = :P8_INFO_ITEM,
          uom_to              ,
          --uom_to_desc         = decode(:P8_SOURCE,'FDC',:P8_UOM_DESC,'AP',:P8_UOM_DESC_PO,uom_to_desc),
          --shipto_info         = :P8_INFO_SHIP,
          
          --source_document_type = :P8_TYPE_LIN,
          destination_type,     --= :P8_DESTINATION_TYPE,
          fiscal_classification_to NCM
      from rmais_efd_lines
      where efd_line_id = :P8_LINE_ID;
      
