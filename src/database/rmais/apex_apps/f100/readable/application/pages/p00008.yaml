                    :P8_UOM_DESC_PO,
                    :P8_RECEIPT_NUM,
                    :P8_RECEIPT_LINE_NUM,
                    :P8_UNIT_PRICE_PO
            from    apex_collections
            where   collection_name = 'RMAIS_PO_OK'
            and     SEQ_ID = :P8_ID_B;
        end;
      items-to-submit: 
      - P8_ID_B
