dynamic-actions: 
- # ====== Dynamic Action: Verifica sem pedido =================
  id: 169204570894556733
  identification: 
    name: Verifica sem pedido

  execution: 
    sequence: 14
    event-scope: Static
    type: Immediate

  when: 
    event: EVENT.EVENT.BROWSER.CLICK
    selection-type: Button
    button: Ok # 1791805711586456329

  client-side-condition: 
    type: JavaScript expression
    javascript-expression: apex.item('P8_TYPE_LIN').getValue() == 'NA'

  actions: 
  - # ====== Action: Execute Server-side Code ====================
    id: 169205669289556744
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        if  :P8_ITEM_OK is null or 
            :P8_ITEM_DESC_OK is null then
            --
            :P8_MSG_ALERT := 'Item não informado!';
            --
        else
            --
            :P8_CTRL_A := 4;
            --
        end if;
        
      items-to-submit: 
      - P8_ITEM_OK
      - P8_ITEM_DESC_OK
      - P8_COND_PAG
      - P8_MOEDA
      - P8_SOURCE
      - P8_ITEM_TYPE
      items-to-return: 
      - P8_CTRL_A
      - P8_MSG_ALERT
      suppress-change-event: false

    execution: 
      sequence: 10
      event: Verifica sem pedido # 169204570894556733
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

- # ====== Dynamic Action: Validacao V unit new ================
  id: 321552416977297551
  identification: 
    name: Validacao V unit new

  execution: 
    sequence: 310
    event-scope: Static
    type: Immediate

  when: 
    event: EVENT.EVENT.BROWSER.CHANGE
    selection-type: Item(s)
    item(s): 
    - P8_UNIT_PRICE_PO

  client-side-condition: 
    type: JavaScript expression
    javascript-expression: |
      apex.item('P8_UNIT_PRICE_PO').getValue() != '' &&
      apex.item('P8_UNIT_PRICE_PO').getValue() != apex.item('P8_UNIT_PRICE_LIN').getValue()
      

  actions: 
  - # ====== Action: Execute Server-side Code ====================
    id: 321552583311297552
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        declare
            vFLAG varchar2(1);
        begin
            :P8_MSG_ALERT := RMAIS_PROCESS_PKG.Validate_Line_Selection(
                                    p_model             => :P8_MODEL,
                                    p_type_lin          => :P8_TYPE_LIN,
                                    p_unit_prince_po    => :P8_UNIT_PRICE_PO,
                                    p_quant_po          => :P8_QUANT_PO,
                                    p_quant_lin         => :P8_QUANT_LIN,
                                    p_unit_price_lin    => :P8_UNIT_PRICE_LIN,
                                    p_flag_acao         => vFLAG);
            
            if :P8_MSG_ALERT is null then
                :P8_FLAG_PO_SEL := 1;
        
            end if;
        end;
        
        
      items-to-submit: 
      - P8_UNIT_PRICE_PO
      - P8_QUANT_PO
      - P8_QUANT_LIN
      - P8_UNIT_PRICE_LIN
      - P8_MODEL
      - P8_TYPE_LIN
      items-to-return: 
      - P8_FLAG_PO_SEL
      - P8_MSG_ALERT
      suppress-change-event: false

    execution: 
      sequence: 10
      event: Validacao V unit new # 321552416977297551
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

- # ====== Dynamic Action: change_P8_MSG_ALERT =================
  id: 321552814690297555
