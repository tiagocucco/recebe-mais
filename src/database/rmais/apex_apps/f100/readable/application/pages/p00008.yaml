- # ====== Dynamic Action: atribiicao_item =====================
  id: 1879894875598414054
  identification: 
    name: atribiicao_item

  execution: 
    sequence: 50
    event-scope: Static
    type: Immediate

  when: 
    event: NATIVE_IG|REGION TYPE|interactivegridselectionchange
