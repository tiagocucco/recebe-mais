- # ====== Process: Collection =================================
  id: 1790844177042868923
  identification: 
    name: Collection
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      begin
          execute immediate q'[alter session set NLS_NUMERIC_CHARACTERS='.,']';
          --  APEX_COLLECTION.DELETE_COLLECTION(p_collection_name => 'RMAIS_PO_OK');
          --  APEX_COLLECTION.CREATE_COLLECTION(p_collection_name => 'RMAIS_PO_OK');
          --  rmais_process_pkg.Set_Po_Array(:P8_CNPJ_FORNECEDOR,:P8_CNPJ_TOMADOR);
          begin
              --
              if APEX_COLLECTION.COLLECTION_EXISTS (p_collection_name => 'RMAIS_PO_OK') THEN
                  APEX_COLLECTION.DELETE_COLLECTION(p_collection_name => 'RMAIS_PO_OK');
                  APEX_COLLECTION.CREATE_COLLECTION(p_collection_name => 'RMAIS_PO_OK');
              else
                  APEX_COLLECTION.CREATE_COLLECTION(p_collection_name => 'RMAIS_PO_OK');
              end if;
          end;
          for x in (
              select  distinct
                      a.po_num pedido, 
                      a.po_line_id, 
                      a.line_num, 
                      a.item_description, 
                      --case when nvl(destination_type_code,destination_type_dist)  = 'EXPENSE' then UOM_CODE_PO else primary_uom_code end uom_code,
                      --case when nvl(destination_type_code,destination_type_dist)  = 'EXPENSE' then UOM_CODE_PO else UOM_CODE_PO end uom_code,
                      nvl(a.primary_uom_code,max(a.primary_uom_code) over (partition by a.LINE_LOCATION_ID)) UOM_CODE, 
                      nvl(a.UOM_CODE_PO, max(a.UOM_CODE_PO) over (partition by a.LINE_LOCATION_ID)) UOM_DESC,
                      a.UNIT_PRICE, 
                      a.QUANTITY_LINE, 
                      a.LINE_LOCATION_ID,
                      to_char(a.need_by_date) need_by_date,
                      to_char(a.promised_date)  promised_date,
                      a.po_header_id,
                      to_char(a.info_po) info_po,
                      nvl(a.item_number,max(a.item_number) over (partition by a.LINE_LOCATION_ID)) item_number,
                      nvl(a.description,max(a.description) over (partition by a.LINE_LOCATION_ID)) descr,
                      to_char(a.info_term) info_term,
                      to_char(a.info_item) info_item,
                      a.task_number, --"TRANSACTION_ID","CNPJ","RECEIVER","TOTAL_PO","PO_HEADER_ID","PO_NUM","PO_TYPE","TOMADOR","TOMADOR_CNPJ","PRC_BU_ID","VENDOR_NAME","VENDOR_ID","VENDOR_SITE_ID","VENDOR_SITE_CODE","FORNECEDOR_CNPJ","CURRENCY_CODE","INFO_DOC","INFO_TERM","PO_SEQ","INFO_PO","INFO_ITEM","INFO_SHIP","PO_LINE_ID","LINE_TYPE_ID","LINE_NUM","ITEM_ID","CATEGORY_ID","ITEM_DESCRIPTION","UOM_CODE","UNIT_PRICE","QUANTITY_LINE","PRC_BU_ID_LIN","REQ_BU_ID_LIN","TAXABLE_FLAG_LIN","ORDER_TYPE_LOOKUP_CODE","PURCHASE_BASIS","MATCHING_BASIS","LINE_LOCATION_ID","DESTINATION_TYPE_CODE","TRX_BUSINESS_CATEGORY","PRC_BU_ID_LOC","REQ_BU_ID_LOC","PRODUCT_TYPE","ASSESSABLE_VALUE","QUANTITY_SHIP","QUANTITY_RECEIVED","QUANTITY_ACCEPTED","QUANTITY_REJECTED","QUANTITY_BILLED","QUANTITY_CANCELLED","SHIP_TO_LOCATION_ID","NEED_BY_DATE","PROMISED_DATE","LAST_ACCEPT_DATE","PRICE_OVERRIDE","TAXABLE_FLAG","RECEIPT_REQUIRED_FLAG","SHIP_TO_ORGANIZATION_ID","SHIPMENT_NUM","SHIPMENT_TYPE","FUNDS_STATUS","DESTINATION_TYPE_DIST","PRC_BU_ID_DIST","REQ_BU_ID_DIST","ENCUMBERED_FLAG","UNENCUMBERED_QUANTITY","AMOUNT_BILLED","AMOUNT_CANCELLED","QUANTITY_FINANCED","AMOUNT_FINANCED","QUANTITY_RECOUPED","AMOUNT_RECOUPED","RETAINAGE_WITHHELD_AMOUNT","RETAINAGE_RELEASED_AMOUNT","TAX_ATTRIBUTE_UPDATE_CODE","PO_DISTRIBUTION_ID","BUDGET_DATE","CLOSE_BUDGET_DATE","DIST_INTENDED_USE","SET_OF_BOOKS_ID","CODE_COMBINATION_ID","QUANTITY_ORDERED","QUANTITY_DELIVERED","CONSIGNMENT_QUANTITY","REQ_DISTRIBUTION_ID","DELIVER_TO_LOCATION_ID","DELIVER_TO_PERSON_ID","RATE_DATE","RATE","ACCRUED_FLAG","ENCUMBERED_AMOUNT","UNENCUMBERED_AMOUNT","DESTINATION_ORGANIZATION_ID","PJC_TASK_ID","TASK_NUMBER","TASK_ID","LOCATION_ID","COUNTRY","POSTAL_CODE","LOCAL_DESCRIPTION","EFFECTIVE_START_DATE","EFFECTIVE_END_DATE","BUSINESS_GROUP_ID","ACTIVE_STATUS","SHIP_TO_SITE_FLAG","RECEIVING_SITE_FLAG","BILL_TO_SITE_FLAG","OFFICE_SITE_FLAG","INVENTORY_ORGANIZATION_ID","ACTION_OCCURRENCE_ID","LOCATION_CODE","LOCATION_NAME","STYLE","ADDRESS_LINE_1","ADDRESS_LINE_2","ADDRESS_LINE_3","ADDRESS_LINE_4","REGION_1","REGION_2","TOWN_OR_CITY","LINE_SEQ","INVENTORY_ITEM_ID","PRIMARY_UOM_CODE","ITEM_TYPE","INVENTORY_ITEM_FLAG","TAX_CODE","ENABLED_FLAG","ITEM_NUMBER","DESCRIPTION","LONG_DESCRIPTION","SEQ" FROM (
                      nvl(a.destination_type_code,a.destination_type_dist) destination_type, 
                      a.NCM,
                      a.match_option,
                      nvl(a.RECEIPT_NUM,max(a.RECEIPT_NUM) over (partition by a.LINE_LOCATION_ID)) RECEIPT_NUM,
                      nvl(a.RECEIPT_LINE_NUM,max(a.RECEIPT_LINE_NUM) over (partition by a.LINE_LOCATION_ID)) RECEIPT_LINE_NUM,
                      nvl(a.RECEIPT_QUANTITY_DELIV,max(a.RECEIPT_QUANTITY_DELIV) over (partition by a.LINE_LOCATION_ID)) RECEIPT_QUANTITY_DELIV
              from    (
                          select  p.transaction_id,
                                  d.fornecedor_cnpj cnpj,
                                  d.tomador_cnpj receiver,
                                  --SUM(NVL(nls_num_char(d.price_override) * nls_num_char(quantity_ship),nls_num_char(d.unit_price) * nls_num_char(d.quantity_line))) OVER (PARTITION BY po_header_id) total_po
                                  d.*,
                                  row_number() over (partition by d.po_header_id, d.po_line_id order by d.po_line_id, d.shipment_num) seq
                          from    rmais_ws_info p,
                                  json_table(
                                      replace(
                                          replace(
                                              replace(
                                                  replace(
                                                       xxrmais_util_pkg.base64decode(p.clob_info),
                                                      '"RECEIPT":{',
                                                      '"RECEIPT":[{'
                                                  ),
                                                  '"DESTINATION_TYPE_CODE":"RECEIVING"}}',
                                                  '"DESTINATION_TYPE_CODE":"RECEIVING"}]}'
                                              ),
                                              '"LINE_LOCATIONS":{',
                                              '"LINE_LOCATIONS":[{'
                                          ),
                                          '},"ITEM":'
                                          ,'}],"ITEM":'
                                      ),
                                      '$' columns(
                                          nested path '$.HEADER[*]' columns(
                                              po_header_id number path '$.PO_HEADER_ID',
                                              po_num varchar2(500) path '$.PO_NUM',
                                              po_type varchar2(500) path '$.PO_TYPE',
                                              tomador varchar2(300) path '$.TOMADOR',
                                              tomador_cnpj varchar2(200) path '$.TOMADOR_CNPJ',
                                              prc_bu_id number path '$.PRC_BU_ID',
                                              vendor_name varchar2(300) path '$.VENDOR_NAME',
                                              vendor_id number path '$.VENDOR_ID',
                                              vendor_site_id number path '$.VENDOR_SITE_ID',
                                              vendor_site_code varchar2(100) path '$.VENDOR_SITE_CODE',
                                              fornecedor_cnpj varchar2(200) path '$.FORNECEDOR_CNPJ',
                                              currency_code varchar2(100) path '$.CURRENCY_CODE',
                                              info_doc varchar2(4000) format json with wrapper path '$',
                                              info_term varchar2(4000) format json with wrapper path '$.TERM',
                                              po_seq FOR ORDINALITY,
                                              nested path '$.LINES[*]' columns(
                                                  info_po varchar2(4000) format json with wrapper path '$',
                                                  info_item varchar2(4000) format json with wrapper path '$.ITEM',
                                                  info_ship varchar2(4000) format json with wrapper path '$.LINE_LOCATIONS',
                                                  po_line_id number path '$.PO_LINE_ID',
                                                  line_type_id number path '$.LINE_TYPE_ID',
                                                  line_num number path '$.LINE_NUM',
                                                  item_id number path '$.ITEM_ID',
                                                  category_id number path '$.CATEGORY_ID',
                                                  item_description varchar2(300) path '$.ITEM_DESCRIPTION',
                                                  uom_code_po varchar2(100) path '$.UOM_CODE',
                                                  unit_price number path '$.UNIT_PRICE',
