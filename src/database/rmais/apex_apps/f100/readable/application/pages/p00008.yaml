- # ====== Dynamic Action: change_P8_ARR_A =====================
  id: 367006970657460918
  identification: 
    name: change_P8_ARR_A

  execution: 
    sequence: 480
    event-scope: Static
    type: Immediate

  when: 
    event: EVENT.EVENT.BROWSER.CHANGE
    selection-type: Item(s)
    item(s): 
    - P8_ARR_A

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 367007050635460919
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: $('#P8_SOMA_SPLIT').css('border-color','rgb(223, 223, 223)');

    execution: 
      sequence: 10
      event: change_P8_ARR_A # 367006970657460918
      fire-when-event-result-is: True
      fire-on-initialization: false

  - # ====== Action: Execute Server-side Code ====================
    id: 367007126232460920
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        begin
            with 
                TP_SPLIT as (
                    select :P8_ARR_A SEQ_ID from dual
                ),
                TP_SPLIT_A as (
                    select  regexp_substr(A.SEQ_ID, '[^,]+', 1, level) SEQ_ID
                    from    TP_SPLIT A connect by level <= regexp_count(A.SEQ_ID, ',') + 1
                ),
                TP_RESULT as (
                    select  sum(nvl(nls_num_char(A.c010) * nls_num_char(A.n004),0)) TOTAL_SEL
                    from    apex_collections A,
                            TP_SPLIT_A B
                    where   A.collection_name = 'RMAIS_PO_OK'
                    and     A.SEQ_ID = B.SEQ_ID
                )
            select  A.TOTAL_SEL,
                    case 
                        when A.TOTAL_SEL > (nls_num_char(:P8_TOTAL_LINHA)) then 10 
                        when :P8_CTRL_A = 11 and A.TOTAL_SEL < (nls_num_char(:P8_TOTAL_LINHA)) then 13
                        when :P8_CTRL_A = 11 then 12
                    end
            into    :P8_SOMA_SPLIT,
                    :P8_CTRL_A
            from    TP_RESULT A;
        
         end;
         
      items-to-submit: 
      - P8_ARR_A
      - P8_CTRL_A
      items-to-return: 
      - P8_SOMA_SPLIT
      - P8_CTRL_A
      suppress-change-event: false

    execution: 
      sequence: 20
      event: change_P8_ARR_A # 367006970657460918
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

