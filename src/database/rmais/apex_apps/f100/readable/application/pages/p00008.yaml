- # ====== Region: Pedidos Disponíveis new =====================
  id: 344931460189656749
  identification: 
    title: Pedidos Disponíveis new
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |2
       SELECT 
              c001   pedido,
              c002   item_description,
              c003   UOM_CODE,
              c010   unit_price,
              n004   quantity_line,
              
              to_date(substr(c004,1,10),'YYYY-MM-DD')   need_by_date,
              to_date(substr(c005,1,10),'YYYY-MM-DD')   promised_date,
              n002   line_num,
              c007   item_number,
              c014   destination_type,
              c017   match_option,
              decode(c017,'P','NA',c018)   RECEIPT_NUM,
              decode(c017,'P','',c019)   RECEIPT_LINE_NUM,
              c020   RECEIPT_QUANTITY_DELIV,
              case
                  when nvl(:P8_SPLIT,'N') = 'N' then
                      to_char(nvl(c020,n004))
                  else
                      'Disponível ('||nvl(c020,n004)||') '||
                      apex_item.text(
                          p_idx => 1,
                          p_value => n004,
                          p_attributes => ' data-d1="'||seq_id||'" id="it-qt-'||seq_id||'" class="input-new-qt text_field rmais-item-text" style="text-align: right;width: 100%;" '
                      ) 
              end QT_EDIT,
              case
                  when nvl(:P8_SPLIT,'N') = 'N' then
                      apex_item.radiogroup(
                          p_idx => 2,
                          p_attributes => 'class="simple-sel" '||
                                      'data-d1="'||seq_id||'" '
                                      )
                  else
                      apex_item.checkbox(
                          p_idx => 2,
                          p_attributes => 'class="mult-sel" '||
                                      'data-d1="'||seq_id||'"  '
                                      )
              end COL_SELECTION
      FROM apex_collections 
       where collection_name = 'RMAIS_PO_OK';
    page-items-to-submit: 
    - P8_SPLIT
    - P8_QUANT_LIN

