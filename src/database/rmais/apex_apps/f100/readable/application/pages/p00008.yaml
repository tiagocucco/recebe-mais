- # ====== Dynamic Action: change_input-new-qt =================
  id: 357989224128029041
  identification: 
    name: change_input-new-qt

  execution: 
    sequence: 470
    event-scope: Dynamic
    static-container-(jquery-selector): '#form-po-disp'
    type: Immediate

  when: 
    event: EVENT.EVENT.BROWSER.CHANGE
    selection-type: jQuery Selector
    jquery-selector: .input-new-qt

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 357989361317029042
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        apex.item('P8_ID_A').setValue($(this.triggeringElement).data('d1'));
        apex.item('P8_VAL_A').setValue(this.triggeringElement.value);
        

    execution: 
      sequence: 10
      event: change_input-new-qt # 357989224128029041
      fire-when-event-result-is: True
      fire-on-initialization: false

  - # ====== Action: Execute Server-side Code ====================
    id: 357989572177029044
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        begin
            :P8_MSG_ALERT := '';
            for C in ( 
                select  A.SEQ_ID,
                        nvl(A.c019,A.n004) QUANT_LINE_ORIGINAL
                from    apex_collections A
                where   collection_name = 'RMAIS_PO_OK'
                and     A.SEQ_ID = :P8_ID_A
            ) loop
                if nls_num_char(:P8_VAL_A) > nls_num_char(C.QUANT_LINE_ORIGINAL) then
                    :P8_MSG_ALERT := 'A quantidade informada ultrapassa a quantidade disponível no pedido Rec: '||:P8_VAL_A||' Dsp: '||C.QUANT_LINE_ORIGINAL;
                    :P8_VAL_A := C.QUANT_LINE_ORIGINAL;
                else
                    apex_collection.update_member_attribute (
                            p_collection_name => 'RMAIS_PO_OK',
                            p_seq => C.SEQ_ID,
                            p_attr_number    => 4,
                            p_number_value   => nls_num_char(:P8_VAL_A)
                    );
                end if;
            end loop;
        end;
      items-to-submit: 
      - P8_VAL_A
      - P8_ID_A
      items-to-return: 
      - P8_VAL_A
      - P8_MSG_ALERT
      suppress-change-event: false

    execution: 
      sequence: 20
      event: change_input-new-qt # 357989224128029041
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Execute JavaScript Code =====================
    id: 357990064546029049
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        this.triggeringElement.value = apex.item('P8_VAL_A').getValue();
        $(this.triggeringElement).focus();

    execution: 
      sequence: 30
      event: change_input-new-qt # 357989224128029041
      fire-when-event-result-is: True
      fire-on-initialization: false

    client-side-condition: 
      type: Item is not null
      item: P8_MSG_ALERT

- # ====== Dynamic Action: change_mult-sel =====================
  id: 357990189045029051
  identification: 
    name: change_mult-sel

  execution: 
    sequence: 430
    event-scope: Dynamic
    type: Immediate

  when: 
    event: EVENT.EVENT.BROWSER.CHANGE
    selection-type: jQuery Selector
    jquery-selector: .mult-sel

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 367006855216460917
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        let i,x,a,v;
        
        i = apex.item('P8_ARR_A').getValue();
        x = $(this.triggeringElement).data('d1');
        if ($(this.triggeringElement).is(':checked') ) {
            i += i!=''?',':'';
            i += x;
            $('#it-qt-'+x).attr('disabled',true);
        } else {
            a = i.split(',');
            v = a.indexOf(x.toString());
            a.splice(v,1);
            i = a.toString();
            $('#it-qt-'+x).attr('disabled',false);
        }
        apex.item('P8_ARR_A').setValue(i);
        
        

    execution: 
      sequence: 20
      event: change_mult-sel # 357990189045029051
      fire-when-event-result-is: True
      fire-on-initialization: false

