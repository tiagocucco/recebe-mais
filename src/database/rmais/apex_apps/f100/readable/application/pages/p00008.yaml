- # ====== Dynamic Action: Validacao V unit ====================
  id: 1805624692315991213
  identification: 
    name: Validacao V unit

  execution: 
    sequence: 140
    event-scope: Static
    type: Immediate

  when: 
    event: EVENT.EVENT.BROWSER.CHANGE
    selection-type: Item(s)
    item(s): 
    - P8_UNIT_PRICE_PO

  client-side-condition: 
    type: JavaScript expression
    javascript-expression: |
      (
      	(
      		(
      			(
      				(
                          //tratamento para pedidos com valor mais que 1 e quantidade maior que 1
      					Number($v('P8_UNIT_PRICE_PO') ) != 1 
      				) ||
                      (
                          //tratamento para pedidos com valor mais que 1 e quantidade maior que 1
      					Number($v('P8_QUANT_PO')) < Number($v('P8_QUANT_LIN')) &&
      					Number($v('P8_UNIT_PRICE_PO') ) != 1 
      				) ||
      				(
                          //tratamento Po guardachuva
      					( ( ( ( Number($v('P8_UNIT_PRICE_PO') ) * Number($v('P8_QUANT_PO')) ) ) ) < (Number($v('P8_UNIT_PRICE_LIN') ) * Number($v('P8_QUANT_LIN')) ) ) &&
      					$v('P8_UNIT_PRICE_PO') == '1'
      				)
      			) ||
      			(
                      //tratamento pelo valor total da linha
      				Number($v('P8_UNIT_PRICE_PO')) * Number($v('P8_QUANT_PO')) != (Number($v('P8_UNIT_PRICE_LIN')) * Number($v('P8_QUANT_LIN'))) &&
      				Number($v('P8_QUANT_LIN').replaceAll(',','.')) > 1 && 
                      Number($v('P8_QUANT_PO').replaceAll(',','.') ) == 1 &&
                      $v('P8_UNIT_PRICE_PO') == '1'
      			) ||
      			(
                      //tratamento guarda chuva com quantidade igual 1
      				Number($v('P8_UNIT_PRICE_PO')) != Number($v('P8_UNIT_PRICE_LIN')) &&
      				Number($v('P8_UNIT_PRICE_PO')) != '' && 
      				Number($v('P8_QUANT_PO')) == 1 && 
      				Number($v('P8_QUANT_LIN')) == 1
      			)
      		)
      	)
      )
      

  server-side-condition: 
    type: Never

  actions: 
  - # ====== Action: Hide ========================================
    id: 1635316823549485922
    identification: 
      action: Hide

    affected-elements: 
      selection-type: Button
      button: Ok_escolha_PO # 1635315767108485911

