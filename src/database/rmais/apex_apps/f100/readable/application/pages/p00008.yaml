- # ====== Dynamic Action: Update S/ Po  OLD_06_02_2023 ========
  id: 1825213178820365098
  identification: 
    name: Update S/ Po  OLD_06_02_2023

  execution: 
    sequence: 180
    event-scope: Static
    type: Immediate

  when: 
    event: EVENT.EVENT.BROWSER.CLICK
    selection-type: Button
    button: Ok # 1791805711586456329

  client-side-condition: 
    type: JavaScript expression
    javascript-expression: |
      ((($v('P8_TYPE_LIN') == 'NA')&&($v('P8_SOURCE2') == 'AP')
      ) && 
      (//$v('P8_ITEM_OK') != '' &&
       $v('P8_ITEM_DESC_OK') != '' &&
       //$v('P8_COND_PAG') != '' &&
       //$v('P8_MOEDA') != '' &&
       $v('P8_SOURCE') != '' 
       //&& $v('P8_ITEM_TYPE') != ''
       ) //&& $v('P8_CFOP_IN') != '' 
       ) ||
       ((($v('P8_TYPE_LIN') == 'NA')&&($v('P8_SOURCE2') == 'FDC')) && 
      ($v('P8_ITEM_OK') != '' &&
       $v('P8_ITEM_DESC_OK') != '' &&
       $v('P8_SOURCE') != ''))

  server-side-condition: 
    type: Never

  actions: 
  - # ====== Action: Execute Server-side Code ====================
    id: 1825213077910365097
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        declare
            l_row rmais_efd_lines%rowtype;
        begin
            if  (:P8_TYPE_LIN = 'NA' and :P8_SOURCE2 = 'AP' and :P8_ITEM_DESC_OK is not null and :P8_SOURCE is not null) or
                (:P8_TYPE_LIN = 'NA' and :P8_SOURCE2 = 'FDC' and :P8_ITEM_OK is not null and 
                 :P8_ITEM_DESC_OK is not null and :P8_SOURCE is not null) then
                select  * 
                into    l_row
                from    rmais_efd_lines 
                where   efd_line_id = :P8_LINE_ID;
                if :P8_LINE_ID is not null then
                    update  rmais_efd_lines
                    set     source_document_type     = 'NA',
                            status                   = 'MANUAL',
                            source_doc_number        = '',
                            source_doc_line_id       = '',
                            source_doc_id            = '',
                            line_location_id         = '',
                            order_info               = '',
                            item_code_efd            = nvl(:P8_ITEM_ERP,:P8_ITEM_OK),
                            item_descr_efd           = nvl(:P8_ITEM_DESCR_ERP,:P8_ITEM_DESC_OK),
                            item_info                = '',
                            uom_to                   = nvl(nvl(:P8_UOM_ERP,uom_to),uom_to),
                            uom_to_desc              = nvl(:P8_UOM_DESC,uom_to_desc),
                            source_doc_line_num      = '',
                            DESTINATION_TYPE         = decode(:P8_SOURCE2,'FDC','INVENTORY','AP','EXPENSE',:P8_SOURCE2),
                            fiscal_classification_to = nvl(:P8_NCM_ERP,fiscal_classification_to),
                            catalog_code_ncm         = nvl(:P8_CATALOG_CODE_NCM_ERP,catalog_code_ncm),
                            ITEM_TYPE                = nvl(:P8_ITEM_TYPE,ITEM_TYPE),
                            receipt_num              = :P8_RECEIPT_NUM,      
                            receipt_line_num         = :P8_RECEIPT_LINE_NUM
                    where   efd_line_id = :P8_LINE_ID;
        
                    update  rmais_efd_headers 
                    set     document_type   = 'NA',
                            document_status = 'I'
                    where   efd_header_id = :P8_EFD_HEADER_ID;
                    --
                    update  rmais_efd_lines
                    set     source_document_type    = 'NA',
                            status                  = 'MANUAL'
                    where   efd_header_id = :P8_EFD_HEADER_ID;
                    --
                    if nvl(:P8_REPLICAR_ITEM_ALL,'N') = 'Y' then  
                        --
                        update  rmais_efd_lines
                        set     source_document_type = 'NA',
                                status            = 'MANUAL',
                                source_doc_number   = '',
                                source_doc_line_id  = '',
                                source_doc_id       = '',
                                line_location_id    = '',
                                order_info          = '',
                                item_code_efd       = nvl(:P8_ITEM_ERP,:P8_ITEM_OK),
                                item_descr_efd      = nvl(:P8_ITEM_DESCR_ERP,:P8_ITEM_DESC_OK),
                                item_info           = '',
                                uom_to              = nvl(nvl(:P8_UOM_ERP,uom_to),l_row.uom_to),
                                uom_to_desc         = nvl(:P8_UOM_DESC,uom_to_desc),
                                source_doc_line_num = '',
                                DESTINATION_TYPE    = decode(:P8_SOURCE2,'FDC','INVENTORY','AP','EXPENSE',:P8_SOURCE2),
                                fiscal_classification_to = nvl(:P8_NCM_ERP,:P8_NCM),
                                catalog_code_ncm    = nvl(:P8_CATALOG_CODE_NCM_ERP,catalog_code_ncm),
                                ITEM_TYPE           = nvl(:P8_ITEM_TYPE,ITEM_TYPE)
                        where   efd_header_id = :P8_EFD_HEADER_ID;
                    end if;
                else
                    raise_application_error (-20013,'PO_LINE_ID é nula');
                end if;
            end if;
            exception when others then
                raise_application_error (-20011,'Erro ao inserir PO: '||sqlerrm);
        end;
