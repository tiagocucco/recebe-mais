- # ====== Process: Get infos lines ============================
  id: 1599713050452079716
  identification: 
    name: Get infos lines
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      :G_TRANSACTION_ID := null;
      --
      SELECT  item_descr_efd
             ,item_code_efd
             ,INTENDED_USE
             ,user_defined  
             ,product_category
             ,fiscal_classification_to
             ,source_doc_line_id
             ,source_doc_number
             ,source_doc_id
             ,line_location_id
             ,order_info
             ,item_code_efd
             ,item_descr_efd
             ,item_info
             ,uom_to
             ,uom_to_desc
             ,source_doc_line_num
             ,source_document_type
             ,fiscal_classification_to
             ,cfop_to
             ,destination_type
             ,replace(to_char(nvl(unit_price_original,unit_price)),',','.')
             ,replace(to_char(nvl(quantity_original,line_quantity)),',','.')
             ,replace(to_char(round(nls_num_char(nvl(unit_price_original,unit_price)) + ((nvl(ipi_amount,0) + nvl(icms_st_amount,0)+ nvl(FREIGHT_LINE_AMOUNT,0))/nls_num_char(nvl(quantity_original,line_quantity))),2)),',','.')
             ,replace(to_char((nls_num_char(nvl(unit_price_original,unit_price)) * nvl(quantity_original,line_quantity)) + nvl(ipi_amount,0) + nvl(icms_st_amount,0)+ nvl(FREIGHT_LINE_AMOUNT,0)),',','.')
        into :P8_ITEM_DESC_OK
             ,:P8_ITEM_OK
             ,:P8_USO_PRETENTIDO
             ,:P8_USER_DEFINED
             ,:P8_PRODUCTCATEGORY
             ,:P8_NCM_COD_SERV
             ,:P8_PO_LINE_ID
             ,:P8_PO
             ,:P8_PO_HEADER_ID
             ,:P8_LINE_LOCATION_ID
             ,:P8_INFO
             ,:P8_ITEM_NUMBER
             ,:P8_DESCR
             ,:P8_INFO_ITEM
             ,:P8_UOM
             ,:P8_UOM_DESC_PO
             ,:P8_SOURCE_DOC_LINE_NUM
             ,:P8_TYPE_LIN
             ,:P8_NCM
             ,:P8_CFOP_IN
             ,:P8_SOURCE
             ,:P8_UNIT_PRICE_PO
             ,:P8_QUANT_LIN
             ,:P8_UNIT_PRICE_LIN
             ,:P8_TOTAL_LINHA
       FROM rmais_efd_lines l,
            rmais_utilization_cfop util
      where 1=1--efd_header_id = :P7_EFD_HEADER_ID
        and l.utilization_id  = util.id (+)
        AND l.efd_line_id = :P8_LINE_ID;
      --
      :P8_TYPE2 := 'Goods';
      --
      select Withholding 
        into :P8_WITHHOLD
        from rmais_efd_headers 
       where efd_header_id = :P8_EFD_HEADER_ID;
      

  execution: 
    sequence: 30
    point: Before Header
    run-process: Once Per Page Visit (default)

