      - P8_CFOP_IN

    execution: 
      sequence: 10
      event: Atualiza CFOP IN or UTILIZACAO # 1870188797099166258
      fire-when-event-result-is: False
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Set Value ===================================
    id: 1870188728241166257
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: |
        SELECT case when :P8_UF_ORIGEM <> :P8_UF_DESTINO then '2' else '1' end|| cfop.cfop_in --, cfop.utilization_id
         FROM RMAIS_CFOP_OUT_IN cfop,
              rmais_utilization_cfop util
          WHERE cfop.utilization_id = util.id
            AND cfop.cfop_out = substr(:P8_CFOP_OUT,2,3)
            and cfop.utilization_id = :P8_UTILIZACAO
      items-to-submit: 
      - P8_CFOP_OUT
      - P8_UTILIZACAO
      - P8_UF_ORIGEM
      - P8_UF_DESTINO
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P8_CFOP_IN

    execution: 
      sequence: 10
      event: Atualiza CFOP IN or UTILIZACAO # 1870188797099166258
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

