                    decode(c017,'P','NA',c018),
                    decode(c017,'P','',c019),
                    to_char(round(to_number(replace(c010,'.',',')),4))
            into    :P8_PO,
                    :P8_PO_LINE_ID,
                    :P8_QUANT_PO,
                    :P8_LINE_LOCATION_ID,
