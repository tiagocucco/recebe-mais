              c001   pedido,
              c002   item_description,
              c003   UOM_CODE,
              c010   unit_price,
              to_char(round(to_number(replace(c010,'.',',')),4)) unit_price_po_s_t,
              n004   quantity_line,
              replace(to_char(n004),'.',',') line_quantity_po_s_t,
              n005   line_location_id,
              c004   need_by_date,
              c005   promised_date,
              n001   po_line_id,
              n002   line_num,
              c009   po_header_id,
              c006   info_po,
              c007   item_number,
              c008   description,
              c011   term_info,
              c012   item_info,
              c013   task_number,
              c014   destination_type,
              c015   NCM,
              c016   UOM_DESC,
              c017   match_option,
              decode(c017,'P','',c018)   RECEIPT_NUM,
              decode(c017,'P','',c019)   RECEIPT_LINE_NUM,
              c020   RECEIPT_QUANTITY_DELIV,
              apex_item.text(
                          p_idx => 1,
                          p_value => n004,
                          p_attributes => 'class="text_field apex-item-text" style="width: 100%;text-align: right;"') QT_EDIT
      FROM apex_collections a
       where collection_name = 'RMAIS_PO_OK'

