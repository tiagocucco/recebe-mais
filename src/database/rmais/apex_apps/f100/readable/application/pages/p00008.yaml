            cfop_to     = :P8_CFOP_IN,
            /*unit_price          = case when :P8_MODEL = '55' then :P8_UNIT_PRICE_PO else :P8_UNIT_PRICE_PO end, 
            line_quantity     = case when :P8_MODEL = '55' then line_amount 
                                                            + ipi_amount
                                                            + NVL(freight_line_amount,0) 
                                                            - NVL(discount_LINE_amount,0) 
                                                            + NVL(INSURANCE_LINE_AMOUNT,0)
                                                            + NVL(ICMS_ST_AMOUNT,0)
                                ELSE to_number(:P8_QUANT_PO) end,*/
            quantity_original    = nvl(quantity_original,unit_price),
            unit_price_original  = nvl(unit_price_original,line_quantity),    
            unit_price           = 1,
            line_quantity        = LINE_AMOUNT,   
            source_document_type = :P8_TYPE_LIN,
            destination_type     = :P8_DESTINATION_TYPE,
            receipt_num         = :P8_RECEIPT_NUM,      
            receipt_line_num         = :P8_RECEIPT_LINE_NUM,
            status            = 'MANUAL'
        where efd_line_id = :P8_LINE_ID;
          --and cfop_from = :P8_CFOP_OUT;
        end if;
        null;
        update rmais_efd_headers 
        set term_info = :P8_TERM_INFO,
            document_type = 'PO',
            document_status = 'I'
        where efd_header_id = :P8_EFD_HEADER_ID;
