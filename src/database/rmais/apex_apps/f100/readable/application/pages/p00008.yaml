- # ====== Region: Impostos ====================================
  id: 1785561843393844520
  identification: 
    title: Impostos
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select  A.efd_line_id,
              A.grupo_condicao,
              A.codigo_imposto,
              A.codigo_regime,
              A.tipo_taxa,
              A.taxa,
              A.base,
              A.valor_imp valor,
              A.IMPOSTO Tax_nf,
              A.valor_NF,
              '<span class="fa '||
                  case
                      when (nvl(A.valor_imp,0) between nvl(A.valor_nf,0) - 0.1 and nvl(A.valor_nf,0) + 0.1) then 
                          'fa-check-circle is-closed" style="color:green"'
                      else
                          'fa fa-warning" style="color:orange"'
                  end||
              '></span>' status
      from    RMAIS_TAXES_ERRORS_V A
      where   A.EFD_LINE_ID = :P8_LINE_ID
      
      
      /*with pline (shuttle_item,receipt_num--,utilization_code
              ) as
              (select nvl(rh.inss_amount,0)||':'||nvl(nvl(rl.ipi_amount,rh.ipi_amount),0)||':'||case when rh.model = '55' then nvl(rl.pis_amount,0) else nvl(nvl(rl.pis_amount,rh.pis_amount),0) end||':'||case when rh.model = '55' then nvl(rl.cofins_amount,0) else nvl(nvl(rl.cofins_amount,rh.cofins_amount),0)end||':'||case when rh.model = '55' then nvl(rl.FCP_AMOUNT,0) else nvl(nvl(rl.FCP_AMOUNT,rh.TOTAL_FCP_AMOUNT),0)end||':'||nvl(rh.IR_AMOUNT,0)||':'||case when rh.iss_ret_flag = 'Y' then nvl(rh.ISS_AMOUNT,0) else 0 end||':'||nvl(rh.CSLL_AMOUNT,0)||':'||to_char(nvl(nvl(rl.pis_amount,rh.pis_amount),0) + nvl(nvl(rl.cofins_amount,rh.cofins_amount),0) + nvl(rh.CSLL_AMOUNT,0))||':'||nvl(rl.icms_amount,0)||':'||nvl(rl.icms_st_amount,0), 'INSS:IPI:PIS:COFINS:FCP:IR:ISS:CSLL:CSRF:ICMS:ICMS_ST'
             -- ,utilization_code
      from rmais_efd_headers rh,
           rmais_efd_lines rl
       where rl.efd_header_id = rh.efd_header_id
        and efd_line_id = :P8_LINE_ID--4394761
        ),
        line AS (SELECT distinct rtx.efd_line_id
             ,rtx.condition_group_code grupo_condicao
             ,rtx.tax_rate_code codigo_imposto
             ,rtx.tax_regime_code codigo_regime
             ,rtx.tax_rate_code  tipo_taxa
             ,rtx.percentage_rate taxa
             --,(rmh.total_amount) + ((rmh.total_amount * nvl(base_rate,0))/100)  base
             -- ,ROUND(((rmh.total_amount) + ((rmh.total_amount * nvl(base_rate,0))/100))*(rtx.percentage_rate/100),2)  valor
             ,(nvl(rml.line_amount,rmh.total_amount)) + ((nvl(rml.line_amount,rmh.total_amount) * nvl(base_rate,0))/100)  base
              ,ROUND(((nvl(rml.line_amount,rmh.total_amount)) + ((nvl(rml.line_amount,rmh.total_amount) * nvl(base_rate,0))/100))*(rtx.percentage_rate/100),2)  valor
             -- ,rml.utilization_code utilization_code2
        FROM RMAIS_EFD_TAXES rtx
             ,rmais_efd_lines rml
             ,rmais_efd_headers rmh
        WHERE rml.efd_line_id = rtx.efd_line_id
          AND rml.efd_header_id = rmh.efd_header_id
          AND rml.efd_line_id = :P8_LINE_ID)
      SELECT * FROM (
      SELECT bs.* , 
      '<span class="fa '||
      CASE WHEN nvl(valor,0) BETWEEN nvl(valor_nf,0) - 0.1 AND nvl(valor_nf,0) + 0.1 then 
           'fa-check-circle is-closed" style="color:green'
            else
            'fa fa-warning" style="color:orange'
            end
         ||' "></span>' status
      
       FROM (    
          SELECT-- l.*
          l.efd_line_id
             ,l.grupo_condicao
             ,l.codigo_imposto
             ,l.codigo_regime
             ,l.tipo_taxa
             ,l.taxa
             ,l.base
             ,l.valor
          
          
          , imp.tax Tax_nf, to_number(imp.amount) valor_NF --, utilization_code --, utilization_code
            FROM line l,
                 (select  nvl(regexp_substr(receipt_num, '[^:]+', 1, level),'NA') tax
                                       ,regexp_substr(shuttle_item, '[^:]+', 1, level) amount
                --                       ,utilization_code
                                      
                                from pline
                                connect by level <= regexp_count(shuttle_item, ':') + 1
                                order by 2 desc) imp
            WHERE l.codigo_imposto LIKE '%'||imp.tax||'%'
            UNION
            SELECT to_number(:P8_LINE_ID) --id
                    ,cast(null as VARCHAR2(100)) --GP
                   ,cast(null as VARCHAR2(100)) --CI
                   ,cast(null as VARCHAR2(100)) --CR
                   ,cast(null as VARCHAR2(100)) --TT
                   ,cast(null as NUMBER) --T
                   ,cast(null as NUMBER) --B
      --             , NULL
                   ,cast(null as number) --valor
                   , imp.tax Tax_nf, to_number(imp.amount) valor_NF
                  -- , imp.utilization_code           
            FROM (select  nvl(regexp_substr(receipt_num, '[^:]+', 1, level),'NA') tax
                                       ,regexp_substr(shuttle_item, '[^:]+', 1, level) amount
                                      -- ,utilization_code
                                      
                                from pline
                                connect by level <= regexp_count(shuttle_item, ':') + 1
                                order by 2 desc) imp
            WHERE NOT EXISTS (SELECT 1 FROM line l1 WHERE l1.codigo_imposto LIKE '%'||imp.tax||'%')) bs
             WHERE --(nvl(bs.valor,0) > 0) OR (nvl(bs.valor_nf,0) > 0)
            (bs.codigo_imposto is not null  OR (nvl(bs.valor_nf,0) > 0))
            and  ((:P8_MODEL = '00' and Tax_nf  NOT IN ('FCP','IPI'))
             OR   
            (:P8_MODEL <> '00' and Tax_nf  NOT IN ('CSRF'))
            )
            order by case when codigo_imposto is not null then 1 else 2 end , Tax_nf asc)
            */
    page-items-to-submit: 
    - P8_LINE_ID
    - P8_MODEL

