  id: 1870188797099166258
  identification: 
    name: Atualiza CFOP IN or UTILIZACAO

  execution: 
    sequence: 210
    event-scope: Static
    type: Immediate

  when: 
    event: EVENT.EVENT.BROWSER.CHANGE
    selection-type: Item(s)
    item(s): 
    - P8_UTILIZACAO

  client-side-condition: 
    type: JavaScript expression
    javascript-expression: |
      $v('P8_UTILIZACAO') != '' 
      

  actions: 
  - # ====== Action: Set Value ===================================
    id: 1867705077309644880
    identification: 
      action: Set Value

    settings: 
      set-type: Static Assignment
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
