  execution: 
    sequence: 100
    event-scope: Static
    type: Immediate

  when: 
    event: EVENT.EVENT.BROWSER.CLICK
    selection-type: Button
    button: Ok # 1791805711586456329

  client-side-condition: 
    type: JavaScript expression
    javascript-expression: |
      (((($v('P8_UNIT_PRICE_PO') == $v('P8_UNIT_PRICE_LIN')) &&
      $v('P8_UNIT_PRICE_PO') != '' ) &&
      (Number($v('P8_QUANT_PO') ) >=($v('P8_QUANT_LIN'))) &&
      $v('P8_TYPE_LIN') == 'PO') &&
      (($v('P8_NCM') != '') || ($v('P8_NCM_ERP') != ''))) &&
      (($v('P8_CFOP_IN') != '') && ($v('P8_MODEL') == '55') )

  server-side-condition: 
    type: Never

  actions: 
  - # ====== Action: Execute Server-side Code ====================
    id: 1791805962382456331
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        begin
        if :P8_PO_LINE_ID is not null then
        update rmais_efd_lines
        set source_doc_number   = :P8_PO,
            source_doc_line_id  = :P8_PO_LINE_ID,
            source_doc_id       = :P8_PO_HEADER_ID,
            line_location_id    = :P8_LINE_LOCATION_ID,
            order_info          = :P8_INFO,
            item_code_efd       = :P8_ITEM_NUMBER,
            item_descr_efd      = :P8_DESCR,
            item_info           = :P8_INFO_ITEM,
            uom_to              = :P8_UOM,
            uom_to_desc         = decode(:P8_SOURCE,'FDC',:P8_UOM_DESC,'AP',:P8_UOM_DESC_PO,uom_to_desc),
            --shipto_info         = :P8_INFO_SHIP,
            source_doc_line_num = :P8_SOURCE_DOC_LINE_NUM,
            source_document_type = :P8_TYPE_LIN,
            destination_type     = :P8_DESTINATION_TYPE,
            fiscal_classification_to = :P8_NCM,
            cfop_to     = :P8_CFOP_IN,
            receipt_num         = :P8_RECEIPT_NUM,      
            receipt_line_num         = :P8_RECEIPT_LINE_NUM,
            status            = 'MANUAL'
        where efd_line_id = :P8_LINE_ID;
        end if;
        null;
        
        if nvl(:P8_REPLICAR_CFOPS,'N') = 'Y' and :P8_CFOP_IN is not null then
            update rmais_efd_lines 
            set cfop_to = :P8_CFOP_IN
            where efd_header_id = :P8_EFD_HEADER_ID
            and cfop_from = :P8_CFOP_OUT;
            --
            --rmais_process_pkg.main(:P8_EFD_HEADER_ID);
            --
        end if;
        if nvl(:P8_REPLICA_PO,'N') = 'Y' then
               update rmais_efd_lines 
            set source_doc_number = :P8_PO
               ,source_doc_line_id = ''
               ,source_doc_id      =''
               ,line_location_id   =''
               ,item_code_efd =''
               ,item_descr_efd =''
           where efd_header_id = :P8_EFD_HEADER_ID
           and efd_line_id <> :P8_LINE_ID;
            commit;
           /* BEGIN
              rmais_process_pkg.main(:P8_EFD_HEADER_ID);
            exception when others then
            null;
            END;*/
            --
            --rmais_process_pkg.main(:P8_EFD_HEADER_ID);
            --
        end if;
        
        
        update rmais_efd_headers 
        set term_info = :P8_TERM_INFO,
            document_type = 'PO',
            document_status = 'I'
        where efd_header_id = :P8_EFD_HEADER_ID;
        
        --P8_INFO_ITEM,P8_INFO_SHIP,P8_TERM_INFO
        
        exception when others then
        raise_application_error (-20011,'Erro ao inserir PO');
        end;
      items-to-submit: 
      - P8_PO
      - P8_LINE_LOCATION_ID
      - P8_PO_LINE_ID
      - P8_INFO
      - P8_ITEM_NUMBER
      - P8_DESCR
      - P8_INFO_ITEM
