      event: Validacao V unit # 1805624692315991213
      fire-when-event-result-is: False
      fire-on-initialization: false

  - # ====== Action: Execute Server-side Code ====================
    id: 1635317332221485927
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        --
        SELECT  item_descr_efd
               ,item_code_efd
               ,fiscal_classification_to
               ,source_doc_line_id
               ,source_doc_number
               ,source_doc_id
               ,line_location_id
