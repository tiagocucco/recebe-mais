- # ====== Computation: P8_UTILIZACAO ==========================
  id: 1867705237322644881
  identification: 
    item-name: P8_UTILIZACAO

  execution: 
    sequence: 10
    point: Before Header

  computation: 
    type: SQL Query (return single value)
    sql-query: |
      SELECT cfop.utilization_id --, cfop.utilization_id
       FROM RMAIS_CFOP_OUT_IN cfop,
            rmais_utilization_cfop util
        WHERE cfop.utilization_id = util.id
          AND cfop.cfop_out = substr(:P8_CFOP_OUT,2,3)
          and cfop.cfop_in = substr(:P8_CFOP_IN,2,3)

