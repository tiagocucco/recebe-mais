- # ====== Dynamic Action: Processo comum ======================
  id: 1754629424252498406
  identification: 
    name: Processo comum

  execution: 
    sequence: 10
    event-scope: Static
    type: Immediate

  when: 
    event: EVENT.EVENT.BROWSER.CLICK
    selection-type: Button
    button: Ok # 1791805711586456329

  actions: 
  - # ====== Action: Execute Server-side Code ====================
    id: 1754629607950498407
    identification: 
      action: Execute Server-side Code

    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        begin
            update  rmais_efd_headers
            set     Withholding = :P8_WITHHOLD
            where   efd_header_id = :P8_EFD_HEADER_ID;
            --
            update  rmais_efd_lines
            set     destination_type = decode(:P8_SOURCE,'FDC','INVENTORY','AP','EXPENSE',:P8_SOURCE),
                    source_document_type = :P8_TYPE_LIN
            where   efd_header_id = :P8_EFD_HEADER_ID;
            --
            if nvl(:P8_REPLICAR_INFOS,'N') = 'Y' then 
                update rmais_efd_lines
                set     source_document_type = :P8_TYPE_LIN,
                        INTENDED_USE         = :P8_USO_PRETENTIDO,
                        USER_DEFINED         = :P8_USER_DEFINED,
                        PRODUCT_CATEGORY     = :P8_PRODUCTCATEGORY
                where   efd_header_id = :P8_EFD_HEADER_ID;
            else
                update  rmais_efd_lines
                set     source_document_type = :P8_TYPE_LIN,
                        INTENDED_USE         = :P8_USO_PRETENTIDO,
                        USER_DEFINED         = :P8_USER_DEFINED,
                        PRODUCT_CATEGORY     = :P8_PRODUCTCATEGORY
                where   efd_line_id = :P8_LINE_ID;
            end if;
            --
        end;
      items-to-submit: 
      - P8_COND_PAG
      - P8_EFD_HEADER_ID
      - P8_MOEDA
      - P8_SOURCE
      - P8_TYPE_LIN
      - P8_USO_PRETENTIDO
      - P8_USER_DEFINED
      - P8_PRODUCTCATEGORY
      - P8_REPLICAR_INFOS
      - P8_LINE_ID
      - P8_WITHHOLD

    execution: 
      sequence: 10
      event: Processo comum # 1754629424252498406
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

- # ====== Dynamic Action: atribuicao_linhas_po ================
  id: 1791805219540456324
  identification: 
    name: atribuicao_linhas_po

  execution: 
    sequence: 40
    event-scope: Static
    type: Immediate

  when: 
    event: NATIVE_IG|REGION TYPE|interactivegridselectionchange
    selection-type: Region
    region: Pedidos Disponíveis_1 # 1806871818128099007

  client-side-condition: 
    type: Item / Column = Value
    component-type: Item
    item: P8_SPLIT
    value: N

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 1791805278669456325
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        var i, i_empid, i_po_line_id, i_unit_po , i_line_location_id , i_po_header_id , i_info_po , i_item_number , i_descr , i_uom
        , i_info_item , i_term_info , i_term_ship , l_term_po_lin , i_quant_po , i_dest_type, i_ncm , i_uom_desc_po , i_receipt_num , i_receipt_line_num
        model = this.data.model;
        
        for ( i = 0; i < this.data.selectedRecords.length; i++ ) {
            
            i_empid = model.getValue( this.data.selectedRecords[i], "PEDIDO_1");
            i_po_line_id =  model.getValue( this.data.selectedRecords[i], "PO_LINE_ID");   
            i_unit_po =  model.getValue( this.data.selectedRecords[i], "UNIT_PRICE_PO_S_T");
            i_unit_po = i_unit_po.replace(",", ".");
            i_line_location_id =  model.getValue( this.data.selectedRecords[i], "LINE_LOCATION_ID_1");
            i_po_header_id  =  model.getValue( this.data.selectedRecords[i], "PO_HEADER_ID");
            i_info_po  =  model.getValue( this.data.selectedRecords[i], "INFO_PO");
            i_item_number =  model.getValue( this.data.selectedRecords[i], "ITEM_NUMBER");
            i_descr =  model.getValue( this.data.selectedRecords[i], "DESCRIPTION");
            i_info_item = model.getValue( this.data.selectedRecords[i], "ITEM_INFO");
            i_term_info = model.getValue( this.data.selectedRecords[i], "TERM_INFO");
            i_term_ship = model.getValue( this.data.selectedRecords[i], "SHIP_INFO"); // Não encontrado do IG
            l_term_po_lin = model.getValue( this.data.selectedRecords[i], "LINE_NUM");
            i_uom = model.getValue( this.data.selectedRecords[i], "UOM_CODE");
            i_quant_po = model.getValue( this.data.selectedRecords[i], "LINE_QUANTITY_PO_S_T");
            i_quant_po = i_quant_po.replace(",", ".");
            i_dest_type = model.getValue( this.data.selectedRecords[i], "DESTINATION_TYPE");
            i_ncm = model.getValue( this.data.selectedRecords[i], "NCM");
            i_uom_desc_po = model.getValue( this.data.selectedRecords[i], "UOM_DESC");
            i_receipt_num = model.getValue( this.data.selectedRecords[i], "RECEIPT_NUM");
            i_receipt_line_num = model.getValue( this.data.selectedRecords[i], "RECEIPT_LINE_NUM");
        }
        
        apex.item( "P8_PO" ).setValue (i_empid);
        apex.item( "P8_PO_LINE_ID" ).setValue (i_po_line_id);
        apex.item( "P8_QUANT_PO" ).setValue (i_quant_po);
        apex.item( "P8_LINE_LOCATION_ID" ).setValue (i_line_location_id);
        apex.item( "P8_PO_HEADER_ID" ).setValue (i_po_header_id);
        apex.item( "P8_INFO" ).setValue (i_info_po);
        apex.item( "P8_ITEM_NUMBER" ).setValue (i_item_number);
        apex.item( "P8_DESCR" ).setValue (i_item_number);
        apex.item( "P8_INFO_ITEM" ).setValue (i_info_item);
        apex.item( "P8_TERM_INFO" ).setValue (i_term_info);
        apex.item( "P8_INFO_SHIP" ).setValue (i_term_ship);
        apex.item( "P8_SOURCE_DOC_LINE_NUM" ).setValue (l_term_po_lin);
        apex.item( "P8_UOM" ).setValue (i_uom);
        apex.item( "P8_DESTINATION_TYPE" ).setValue (i_dest_type);
        apex.item( "P8_NCM" ).setValue (i_ncm);
        apex.item( "P8_UOM_DESC_PO" ).setValue (i_uom_desc_po);
        apex.item( "P8_RECEIPT_NUM" ).setValue (i_receipt_num);
        apex.item( "P8_RECEIPT_LINE_NUM" ).setValue (i_receipt_line_num);
        apex.item( "P8_UNIT_PRICE_PO" ).setValue (i_unit_po);
        
        
        

    execution: 
      sequence: 10
      event: atribuicao_linhas_po # 1791805219540456324
      fire-when-event-result-is: True
      fire-on-initialization: false

