          begin
              --
              if APEX_COLLECTION.COLLECTION_EXISTS (p_collection_name => 'RMAIS_PO_OK') THEN
                  APEX_COLLECTION.DELETE_COLLECTION(p_collection_name => 'RMAIS_PO_OK');
                  APEX_COLLECTION.CREATE_COLLECTION(p_collection_name => 'RMAIS_PO_OK');
              else
                  APEX_COLLECTION.CREATE_COLLECTION(p_collection_name => 'RMAIS_PO_OK');
              end if;
          end;
          r$po := RMAIS_PROCESS_PKG.Cursor_PO_Line(p_transaction_id => :G_TRANSACTION_ID);
          for x in (
              select  a.po_num pedido, 
                      a.po_line_id, 
                      a.line_num, 
                      a.item_description,
                      a.UOM_CODE, 
                      a.UOM_DESC,
                      a.UNIT_PRICE, 
                      a.QUANTITY_LINE, 
                      a.LINE_LOCATION_ID,
                      a.need_by_date,
                      a.promised_date,
                      a.po_header_id,
                      a.info_po,
                      a.item_number,
                      a.description,
                      a.info_term,
                      a.info_item,
                      a.task_number,
                      a.destination_type, 
                      a.NCM,
                      a.match_option,
                      a.RECEIPT_NUM,
                      a.RECEIPT_LINE_NUM,
                      a.RECEIPT_QUANTITY_DELIV
              from    table(r$po) a
          ) loop
              null;
              apex_collection.add_member(
                  p_collection_name   => 'RMAIS_PO_OK',
                  p_c001              => x.pedido,
                  p_c002              => x.item_description,
                  p_c003              => x.UOM_CODE,
                  p_c010              => nls_num_char(to_char(x.unit_price)),
                  p_n004              => nls_num_char(x.quantity_line),
                  p_n005              => x.line_location_id,
                  p_c004              => x.need_by_date,
                  p_c005              => x.promised_date,
                  p_n001              => x.po_line_id,
                  p_n002              => x.line_num,
                  p_c009              => to_char(x.po_header_id),
                  p_c006              => x.info_po,
                  p_c007              => x.item_number,
                  p_c008              => x.description,
                  p_c011              => x.info_term,
                  p_c012              => x.info_item,
                  p_c013              => x.task_number,
                  p_c014              => x.destination_type,
                  p_c015              => x.ncm,
                  p_c016              => x.UOM_DESC,
                  p_c017              => x.match_option,
                  p_c018              => x.RECEIPT_NUM,
                  p_c019              => x.RECEIPT_LINE_NUM,
                  p_c020              => x.RECEIPT_QUANTITY_DELIV
              );
          end loop;
          --
          execute immediate q'[alter session set NLS_NUMERIC_CHARACTERS=',.']';
          --
      exception when others then
          raise_application_error(-20033,'Erro ao buscar PO: '||sqlerrm);
      end;

