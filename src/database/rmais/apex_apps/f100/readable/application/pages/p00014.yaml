processes: 
- # ====== Process: CLEAN_FIELDS ===============================
  id: 1829005519410923601
  identification: 
    name: CLEAN_FIELDS
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      BEGIN
      
        :P14_XMLF := null;
        :P14_XMLP := null;
        :P14_PDF  := null;
        :P14_XML  := null;
      
      END;

  execution: 
    sequence: 10
    point: Before Header
    run-process: Once Per Page Visit (default)

- # ====== Process: LOAD_DATA_INTO =============================
  id: 1829006624138923612
  identification: 
    name: LOAD_DATA_INTO
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      BEGIN
      
        --:P14_XMLF := '';
        --:P14_XMLP := '';
        --:P14_PDF  := '';
        --:P14_XML  := '';
      
        BEGIN
          SELECT NVL(BLOB_FILENAME,pdf_filename),
               xml_filename
          INTO   :P14_PDF,
               :P14_XML
          FROM   RMAIS_EFD_HEADERS
          WHERE  efd_header_id = :P14_EFD_HEADER_ID
            AND  nvl(pdf_filename,BLOB_FILENAME) is not null;
        EXCEPTION WHEN OTHERS THEN 
          NULL;
        END;
      
        BEGIN
      
          SELECT numero
            INTO :P14_XMLF
            FROM rmais_ctrl_docs ct
               , rmais_efd_headers rh
           WHERE rh.doc_id = ct.id
             AND rh.model IN( '55', '57','67')
             AND rh.efd_header_id = :P14_EFD_HEADER_ID;
      
        EXCEPTION WHEN OTHERS THEN 
          NULL;
        END;
      
        :P14_XMLP := xxrmais_util_v2_pkg.get_link_nfse(:P14_EFD_HEADER_ID);
      
      END;
      
      

  execution: 
    sequence: 10
    point: After Header
    run-process: Once Per Page Visit (default)

