- # ====== Region: Card-pdf ====================================
  id: 457255200507211234
  identification: 
    title: Card-pdf
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select  'Anexo em PDF' CARD_TITLE,
              '' CARD_SUBTITLE,        
              nvl(round(dbms_lob.getlength(nvl(A.BLOB_FILE,A.PDF_FILE)) / 1024,2),0)||' KB' CARD_SUBTEXT,
              '<div id="img_form" class="dropzone-mrs dz-style1 ">'||
                  '<div class="dz-preview-mrs  dz-image-preview">'||
                      '<div class="dz-image">'||
                          case
                              when nvl(dbms_lob.getlength(nvl(A.BLOB_FILE,A.PDF_FILE)),0) > 0 then
                                  '<iframe  src="f?p=&APP_ID.:0:&SESSION.:APPLICATION_PROCESS=OpenMinPDF_HEADER:NO::P14_ID:'||A.EFD_HEADER_ID||'" style="border: none;" type="application/pdf" width="100%" height="100%"></iframe>'
                          end||
                      '</div>'||
                  '</div>'||
                  --'<a href="f?p=&APP_ID.:0:&SESSION.:APPLICATION_PROCESS=OpenMinPDF_HEADER:NO::P14_ID:'||A.EFD_HEADER_ID||'" target="_blank" class="bt-card-anexo t-Button">'||nvl(A.BLOB_FILENAME,PDF_FILENAME)||'</a>'||
              '</div>' CARD_TEXT,
              '' CARD_LINK,
              'card-anexo' CARD_MODIFIERS
      from    RMAIS_EFD_HEADERS A
      where   A.EFD_HEADER_ID = :P14_EFD_HEADER_ID
    page-items-to-submit: 
    - P14_EFD_HEADER_ID

