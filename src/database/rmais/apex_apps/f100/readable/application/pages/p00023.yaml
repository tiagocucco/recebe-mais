validations: 
- # ====== Validation: Validação para verificação de utilização 
  id: 1868704978238905781
  identification: 
    name: Validação para verificação de utilização cadastrada

  execution: 
    sequence: 10

  validation: 
    type: Function Body (returning Boolean)
    language: PL/SQL
    pl/sql-function-body: |
      declare
      l_aux number;
      begin
        --
        SELECT DISTINCT 1 into l_aux FROM rmais_cfop_out_in WHERE utilization_id = :P23_ID;
        --
        return false;
      exception when others then
        --
        return true;
        --
      end;
    always-execute: false

  error: 
    error-message: Não é possível deletar uma utilização que possui regra de CFOP vs. Utilização
    display-location: Inline with Field and in Notification

  server-side-condition: 
    when-button-pressed: DELETE # 1872102963659885432

